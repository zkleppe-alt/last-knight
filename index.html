        if(Math.hypot(kcx-(b.x+TILE/2),kcy-(b.y+TILE/2))<TILE*0.85) abaddonHurtKnight(14+b.phase*3);
        if(b.timer<=0){ b.state='idle'; b.timer=38; b.anchorx=(ABADDON_W/2|0)*TILE; b.anchory=1.5*TILE; }
      }
      else if(b.state==='slam'){ b.timer--;
        if(b.timer<=0 && b.ring===0){ b.ring=1; b.ringR=0; }
        if(b.ring){ b.ringR += (b.move.ringSpeed||5); const rd=Math.hypot(kcx-(b.x+TILE/2),kcy-(b.y+TILE/2));
          if(Math.abs(rd-b.ringR)<TILE*0.55) abaddonHurtKnight(10+b.phase*3);
          if(b.ringR>(b.move.ringMax||150)){ b.ring=0; b.state='idle'; b.timer=40; } }
      }
      // contact
      if(Math.hypot(kcx-bcx,kcy-bcy)<TILE*0.8) abaddonHurtKnight(8+b.phase*2);
    }
    // projectiles
    b.projectiles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--;
      if(p.x<0||p.x>ABADDON_W*TILE||p.y<0||p.y>ABADDON_H*TILE) p.life=0;
      if(p.life>0 && Math.hypot(p.x-kcx,p.y-kcy)<TILE*0.5){ p.life=0; abaddonHurtKnight(6+b.phase*2); } });
    b.projectiles=b.projectiles.filter(p=>p.life>0);
    // adds chase; destroying all breaks the shield
    b.adds.forEach(a=>{ if(!a.alive)return; const acx=a.x+TILE/2,acy=a.y+TILE/2,m=Math.hypot(kcx-acx,kcy-acy)||1;
      a.x+=(kcx-acx)/m*a.speed; a.y+=(kcy-acy)/m*a.speed; if(a.hurt>0)a.hurt--;
      if(Math.hypot(kcx-acx,kcy-acy)<TILE*0.7) abaddonHurtKnight(6); });
    b.adds=b.adds.filter(a=>a.alive);
    if(b.shield && b.adds.length===0){ b.shield=false; showBanner('🛡️💥 The shield shatters! Strike Abaddon now!', 1800); }
  }
  // 👑 the victory beat plays out in the arena after the killing blow
  if(place.kind==='abaddon' && abaddon.victory) abaddonVictoryTick(dt);
  // ── CROPS grow over time (advance through 4 stages) ──
  for(const key in crops){ const c=crops[key];
    if(c.stage<3){ const elapsed=ts-c.plantedAt; const st=Math.min(3, Math.floor(elapsed/CROP_GROW_MS));
      if(st!==c.stage){ c.stage=st; if(st===3){ const[cxx,cyy]=key.split(',').map(Number);
        if(place.kind==='overworld' && Math.hypot(player.x-cxx*TILE,player.y-cyy*TILE)<TILE*12) showBanner('🌾 A crop is ripe for harvest!', 1100); } } }
  }
  // ── FISHING cast timer ──
  if(fishing){
    fishing.t++;
    // cancel if you walk away from the water you cast into
    const ptx=Math.floor((player.x+TILE/2)/TILE), pty=Math.floor((player.y+TILE/2)/TILE);
    if(Math.abs(ptx-fishing.fx)>2 || Math.abs(pty-fishing.fy)>2){ fishing=null; }
    else if(fishing.phase==='wait' && fishing.t>=fishing.biteAt){ fishing.phase='bite'; fishing.t=0; showBanner('❗ A bite! Press Ⓐ to reel it in!', 1500); }
    else if(fishing.phase==='bite' && fishing.t>45){ showBanner('🎣 The fish got away...', 1100); fishing=null; }  // ~0.75s window
  }
  if(bannerT>0){ bannerT-=dt; if(bannerT<=0) banner.style.display='none'; }
  document.getElementById('loc').textContent = regionName();
  let carried=0; for(const it in inventory) carried+=inventory[it];
  const comboStr = player.combo>0 ? ` · 🔥${player.combo}/3` : '';
  if(player.mounted && place.kind!=='overworld') player.mounted=false;
  if(player.boating && place.kind!=='overworld') player.boating=false;
  updateMountBtn();
  document.getElementById('hint').textContent = `Lv ${player.level} · ❤ ${player.hp}/${player.maxHp} · ✦ ${player.xp}/${player.xpNext} · 🪙 ${gold}` + comboStr + (carried?` · 🎒 ${carried}`:'');
  document.getElementById('hpbar').style.width = (player.hp/player.maxHp*100)+'%';
  draw();
  drawMinimap();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════════════
//  MINIMAP — a downscaled overview with towns + player position
// ════════════════════════════════════════════════════════════════
let _miniBase=null;   // pre-rendered static world (built once)
const MINI_TOWNS=[
  ['Hearthvale',33,22],['Homestead',108,18],['Ironhold',31,63],['Saltmere',33,210],
  ['Thornwood',91,157],['Dusthaven',92,69],['Crystalpeak',153,68],['Ashfield',158,150],
  ['Stormgate',172,213],['Shadowmere',217,147],['Hellgate',225,19]
];
function buildMiniBase(){
  const off=document.createElement('canvas'); off.width=WORLD_W; off.height=WORLD_H;
  const o=off.getContext('2d');
  // color per tile family
  const COL={0:'#5fa860',2:'#bd9a5e',3:'#2f5a86',4:'#78b46e',5:'#6b6275',6:'#b9b2a4',7:'#3f8a4e',
    8:'#bd9a5e',19:'#e8d6a0',20:'#5fb0c8',21:'#3f8ec0',22:'#eaf2f7',23:'#bfe0ec',24:'#7fcad8',
    25:'#6a6258',26:'#ff6a1a',27:'#5a4a42',28:'#3a4038',30:'#788a8a',31:'#6b4a2e',32:'#eef4f8',33:'#6e6a78',34:'#dfeaf2',36:'#6e4a2c',37:'#6e4a2c',38:'#6e4a2c'};
  for(let y=0;y<WORLD_H;y++)for(let x=0;x<WORLD_W;x++){ const t=WORLD[y][x]; o.fillStyle=COL[t]||'#5fa860'; o.fillRect(x,y,1,1); }
  _miniBase=off;
}
// ── THE WORLD MAP (☰ → Map): fog-of-war chart of Luminar ──
function initBigMap(){
  const mc=document.getElementById('bigmap'); if(!mc) return;
  if(!_miniBase) buildMiniBase();
  const g=mc.getContext('2d'); g.imageSmoothingEnabled=false;
  g.fillStyle='#0a0712'; g.fillRect(0,0,WORLD_W,WORLD_H);
  g.drawImage(_miniBase,0,0);
  // FOG: until Abaddon falls, lands you haven't walked stay hidden
  if(!abaddon.won){
    g.fillStyle='rgba(7,4,13,0.97)';
    const CW=Math.ceil(WORLD_W/CHUNK), CH=Math.ceil(WORLD_H/CHUNK);
    for(let cy=0;cy<CH;cy++)for(let cx=0;cx<CW;cx++)
      if(!explored.has(cx+','+cy)) g.fillRect(cx*CHUNK,cy*CHUNK,CHUNK,CHUNK);
  }
  const vis=(tx,ty)=> abaddon.won || explored.has(Math.floor(tx/CHUNK)+','+Math.floor(ty/CHUNK));
  // town markers — only where the fog has lifted
  MINI_TOWNS.forEach(([name,tx,ty])=>{ if(!vis(tx,ty)) return;
    const ti=TOWN_DATA.findIndex(t=>t.name===name);
    const col = ti<0 ? '#ffe04a' : (chapelProgress[ti] ? '#6fdf8a' : '#ff6a7a');
    g.fillStyle='#1a1410'; g.fillRect(tx-3,ty-3,7,7);
    g.fillStyle=col;       g.fillRect(tx-2,ty-2,5,5);
    g.fillStyle='#fff';    g.fillRect(tx,ty,1,1);
  });
  // the knight — a red marker with a white core
  const ptx=Math.floor((player.x+TILE/2)/TILE), pty=Math.floor((player.y+TILE/2)/TILE);
  g.fillStyle='#fff'; g.fillRect(ptx-3,pty-3,7,7);
  g.fillStyle='#ff4a4a'; g.fillRect(ptx-2,pty-2,5,5);
  // hover / tap a town for its name (green = cleansed, red = still bound)
  const tip=document.getElementById('maptip');
  const pick=(ev)=>{
    const r=mc.getBoundingClientRect();
    const px2=((ev.touches?ev.touches[0].clientX:ev.clientX)-r.left)/r.width*WORLD_W;
    const py2=((ev.touches?ev.touches[0].clientY:ev.clientY)-r.top)/r.height*WORLD_H;
    let best=null, bd=14;
    MINI_TOWNS.forEach(([name,tx,ty])=>{ if(!vis(tx,ty)) return;
      const d=Math.hypot(tx-px2,ty-py2); if(d<bd){ bd=d; best=[name,tx,ty]; } });
    if(!best){ tip.style.display='none'; return; }
    const ti=TOWN_DATA.findIndex(t=>t.name===best[0]);
    const done = ti<0 ? null : !!chapelProgress[ti];
    tip.textContent = best[0] + (done===null ? '' : (done ? ' ✓ cleansed' : ' ✗ bound'));
    const col = done===null ? '#ffe04a' : (done ? '#6fdf8a' : '#ff6a7a');
    tip.style.color=col; tip.style.borderColor=col;
    tip.style.left=(best[1]/WORLD_W*100)+'%';
    tip.style.top =(best[2]/WORLD_H*100)+'%';
    tip.style.transform='translate(-50%,-150%)';
    tip.style.display='block';
  };
  mc.addEventListener('mousemove',pick);
  mc.addEventListener('click',pick);
  mc.addEventListener('touchstart',pick,{passive:true});
  mc.addEventListener('mouseleave',()=>{ tip.style.display='none'; });
}
function drawMinimap(){
  const mc=document.getElementById('minimap'); if(!mc) return;
  if(place.kind!=='overworld'){ mc.style.display='none'; return; } mc.style.display='block';
  revealAround();                                    // walking the land lifts the map fog
  const g=mc.getContext('2d');
  if(!_miniBase) buildMiniBase();
  const W=mc.width, H=mc.height;
  g.imageSmoothingEnabled=false;
  // view window: follow player, show a region around them (zoomed overview)
  const span=120;  // tiles shown across the minimap
  let px0 = Math.floor((player.x/TILE) - span/2), py0 = Math.floor((player.y/TILE) - span/2);
  px0 = Math.max(0, Math.min(WORLD_W-span, px0)); py0 = Math.max(0, Math.min(WORLD_H-span, py0));
  g.clearRect(0,0,W,H);
  g.drawImage(_miniBase, px0, py0, span, span, 0, 0, W, H);
  const sc=W/span;
  // town markers
  g.font='6px monospace'; g.textAlign='center';
  for(const [name,tx,ty] of MINI_TOWNS){ const mx=(tx-px0)*sc, my=(ty-py0)*sc;
    if(mx<0||my<0||mx>W||my>H) continue;
    g.fillStyle='#ffe04a'; g.fillRect(mx-1.5,my-1.5,3,3); g.fillStyle='#1a1410'; g.fillRect(mx-0.5,my-0.5,1,1);
  }
  // player dot (pulsing)
  const pmx=(player.x/TILE-px0)*sc, pmy=(player.y/TILE-py0)*sc;
  g.fillStyle='#ff4a4a'; g.beginPath(); g.arc(pmx,pmy,2.4,0,7); g.fill();
  g.strokeStyle='#fff'; g.lineWidth=0.8; g.beginPath(); g.arc(pmx,pmy,2.4,0,7); g.stroke();
}

// ════════════════════════════════════════════════════════════════
//  RENDERING — ground tiles + faked-3D buildings + sprites
// ════════════════════════════════════════════════════════════════
function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function drawCrop(x,y,stage){
  if(stage===0){ px(x+6,y+10,4,3,'#5a3e26'); px(x+7,y+9,2,1,'#3a8a4a'); return; }
  if(stage===1){ px(x+7,y+7,2,6,'#3a8a4a'); px(x+5,y+9,2,2,'#46a05a'); px(x+9,y+9,2,2,'#46a05a'); return; }
  if(stage===2){ for(const dx of [3,7,11]){ px(x+dx,y+5,1,8,'#3a8a4a'); px(x+dx-1,y+6,1,2,'#46a05a'); } return; }
  for(const dx of [3,7,11]){ px(x+dx,y+3,1,10,'#c8a83a'); px(x+dx-1,y+3,3,3,'#e8d068'); px(x+dx-1,y+4,1,1,'#a8842a'); }
}
function draw(){
  const m=activeGrid(), vw=VIEW_TW*TILE, vh=VIEW_TH*TILE;
  let camX=player.x-vw/2+TILE/2, camY=player.y-vh/2+TILE/2;
  const mx=m.w*TILE-vw, my=m.h*TILE-vh;
  camX = mx<0 ? mx/2 : Math.max(0,Math.min(camX,mx));
  camY = my<0 ? my/2 : Math.max(0,Math.min(camY,my));
  ctx.clearRect(0,0,cv.width,cv.height);
  // ── ABADDON arena ──
  if(place.kind==='abaddon'){
    const b=abaddon;
    ctx.fillStyle='#0a040e'; ctx.fillRect(0,0,cv.width,cv.height);
    // floor (dark infernal tiles), centered (arena smaller than viewport so clamp cam to 0)
    const camX2=0, camY2=0;
    for(let y=0;y<ABADDON_H;y++)for(let x=0;x<ABADDON_W;x++){ const sx=x*TILE, sy=y*TILE;
      px(sx,sy,TILE,TILE,(x+y)%2?'#1a0e22':'#22122c'); }
    // creeping shadow margin (shrinking safe zone)
    if(b.shrink>0.1){ const m=b.shrink*TILE; ctx.fillStyle='rgba(40,0,30,0.66)';
      ctx.fillRect(0,0,ABADDON_W*TILE,m); ctx.fillRect(0,ABADDON_H*TILE-m,ABADDON_W*TILE,m);
      ctx.fillRect(0,0,m,ABADDON_H*TILE); ctx.fillRect(ABADDON_W*TILE-m,0,m,ABADDON_H*TILE);
      ctx.strokeStyle='#ff2a6a'; ctx.lineWidth=1; ctx.globalAlpha=0.5; ctx.strokeRect(m,m,ABADDON_W*TILE-2*m,ABADDON_H*TILE-2*m); ctx.globalAlpha=1; }
    // telegraphs
    const bcx=b.x+TILE/2, bcy=b.y+TILE/2;
    if(b.state==='telegraph'){ const pulse=0.4+0.5*Math.abs(Math.sin(Date.now()*0.02)); ctx.globalAlpha=0.25+pulse*0.35; ctx.fillStyle=bossCfg().phases[b.phase].color; ctx.strokeStyle=bossCfg().phases[b.phase].color;
      if(b.kind==='charge'){ ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(bcx,bcy); ctx.lineTo(bcx+b.aimx*TILE*9,bcy+b.aimy*TILE*9); ctx.stroke(); }
      else if(b.kind==='slam'){ ctx.lineWidth=2; ctx.beginPath(); ctx.arc(bcx,bcy,TILE*1.4,0,7); ctx.stroke(); }
      else if(b.kind==='shield'){ ctx.lineWidth=3; ctx.beginPath(); ctx.arc(bcx,bcy,TILE,0,7); ctx.stroke(); }
      else { ctx.beginPath(); ctx.arc(bcx,bcy,TILE,0,7); ctx.fill(); }
      ctx.globalAlpha=1; }
    if(b.ring){ ctx.strokeStyle=bossCfg().phases[b.phase].color; ctx.globalAlpha=0.7; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(b.anchorx+TILE/2,b.anchory+TILE/2,b.ringR,0,7); ctx.stroke(); ctx.globalAlpha=1; }
    // projectiles
    b.projectiles.forEach(p=>{ ctx.fillStyle='#ff3a8a'; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,7); ctx.fill(); ctx.fillStyle='#ffd0e8'; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,7); ctx.fill(); });
    // adds
    b.adds.forEach(a=>{ if(!a.alive)return; const body=a.hurt>0?'#ffb0c8':'#6a1a4a'; px(a.x+3,a.y+4,10,10,body); px(a.x+5,a.y+7,2,2,'#ff8'); px(a.x+9,a.y+7,2,2,'#ff8'); });
    // ABADDON himself — large, winged, glowing
    if(!b.dead){ const ax=Math.round(b.x), ay=Math.round(b.y); ctx.save();
      if(b.shield){ ctx.strokeStyle='#8fd0ff'; ctx.globalAlpha=0.5+0.3*Math.abs(Math.sin(Date.now()*0.01)); ctx.lineWidth=3; ctx.beginPath(); ctx.arc(ax+TILE/2,ay+TILE/2,TILE*1.1,0,7); ctx.stroke(); ctx.globalAlpha=1; }
      ctx.shadowColor=bossCfg().phases[b.phase].color; ctx.shadowBlur=14;
      if(abaddon.who==='pretender'){
        if(b.hurt>0){ ctx.globalAlpha=0.55; ctx.fillStyle='#ffd0c0'; ctx.fillRect(ax-4,ay-6,TILE+8,TILE+10); ctx.globalAlpha=1; }
        drawDemonKing(ax-2, ay-6);                          // the 16x20 usurper sprite, centred on the boss tile
      } else {
        const body=b.hurt>0?'#ffd0e0':'#2a0a2e';
        px(ax-2,ay+2,TILE+4,TILE+2,body);                 // bulk
        px(ax-6,ay-2,5,8,'#5a1a4a'); px(ax+TILE+1,ay-2,5,8,'#5a1a4a');  // wings
        px(ax-1,ay-5,4,6,'#7a1a2a'); px(ax+TILE-3,ay-5,4,6,'#7a1a2a');  // horns
        px(ax+3,ay+5,3,3,'#ff3a3a'); px(ax+TILE-6,ay+5,3,3,'#ff3a3a');  // eyes
      }
      ctx.restore();
      if(b.pop){ b.pop.t--; drawDmgPop(ax,ay,b.pop); if(b.pop.t<=0)b.pop=null; }
    }
    // 👑 VICTORY BEAT: Abaddon dissolves, a shaft of holy light, then Sir Aldric walks up
    if(abaddon.victory){ const v=abaddon.victory; const ax=Math.round(b.x), ay=Math.round(b.y);
      if(v.phase==='death'){
        if(v.t<420){ ctx.fillStyle=`rgba(255,255,255,${0.75*(1-v.t/420)})`; ctx.fillRect(0,0,cv.width,cv.height); }   // death flash
        const al=Math.max(0, 1-v.t/2000);
        if(al>0){ ctx.globalAlpha=al; const sy=ay+Math.round((v.t/2600)*TILE*1.4);   // sink as he fades
          if(abaddon.who==='pretender') drawDemonKing(ax-2, sy-6);
          else { px(ax-2,sy+2,TILE+4,TILE+2,'#2a0a2e'); px(ax-6,sy-2,5,8,'#5a1a4a'); px(ax+TILE+1,sy-2,5,8,'#5a1a4a');
            px(ax-1,sy-5,4,6,'#7a1a2a'); px(ax+TILE-3,sy-5,4,6,'#7a1a2a'); px(ax+3,sy+5,3,3,'#ff3a3a'); px(ax+TILE-6,sy+5,3,3,'#ff3a3a'); }
          ctx.globalAlpha=1; }
        for(const m of abaddon.deathMotes){ ctx.globalAlpha=m.life; px(Math.round(m.x),Math.round(m.y),2,2,'#b026ff'); } ctx.globalAlpha=1;
        ctx.globalAlpha=0.18*Math.min(1,v.t/1100); ctx.fillStyle='#fff7d8'; ctx.fillRect(b.x-TILE, 0, TILE*3, ABADDON_H*TILE); ctx.globalAlpha=1;  // shaft of light
      }
      if(v.phase==='father'||v.phase==='transition'){
        drawAldric(Math.round(cutAldric.x), Math.round(cutAldric.y), {dir:cutAldric.dir, moving:(v.phase==='father'&&cutAldric.y>(ABADDON_H-2)*TILE+1), frame:cutAldric.frame});
      }
      if(v.phase==='transition'){ ctx.fillStyle=`rgba(0,0,0,${v.fade||0})`; ctx.fillRect(0,0,cv.width,cv.height); }
    }
    drawKnight(Math.round(player.x),Math.round(player.y));
    // boss HP bar (top) + phase name
    if(!abaddon.victory){ const P=bossCfg().phases[b.phase];
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(8,6,cv.width-16,8);
    ctx.fillStyle=P.color; ctx.fillRect(8,6,Math.round((cv.width-16)*Math.max(0,b.hp/b.maxHp)),8);
    ctx.fillStyle='#fff'; ctx.font='6px monospace'; ctx.textAlign='center';
    ctx.fillText((abaddon.who==='pretender'?'👑 THE PRETENDER — ':'👑 ABADDON — ')+P.name, cv.width/2, 21); ctx.textAlign='left'; }
    return;
  }
  // ── 👑 STORMGATE KEEP: the walkable throne hall ──
  if(place.kind==='keep'){
    drawThroneScene(camX, camY, Date.now(), true);   // quiet mode: hall + King + guards, no crowd/confetti
    // tournament champions loitering in the hall, once the Demon Hunt is done
    if(hunt.done) for(const k of KEEP_KNIGHTS){
      const kx=Math.round(k.tx*TILE-camX), ky=Math.round(k.ty*TILE-camY);
      drawVillager(kx, ky, {outfit:'soldier', dir:k.dir, moving:false, frame:0});
      ctx.fillStyle='#ffe04a'; ctx.font='7px monospace'; ctx.textAlign='center'; ctx.fillText('\u2694', kx+TILE/2, ky-2); ctx.textAlign='left';
    }
    drawKnight(Math.round(player.x-camX), Math.round(player.y-camY));
    const pty=Math.floor((player.y+TILE/2)/TILE);
    if(pty>=THALL.H-3){ ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='7px sans-serif'; ctx.textAlign='center'; ctx.fillText('\u2b07 head down the hall to leave', cv.width/2, cv.height-6); ctx.textAlign='left'; }
    return;
  }
  // ── DUNGEON: its own tile vocabulary (0 floor,1 wall,2 stairs,5 chest,7 general,8 entrance) ──
  if(place.kind==='dungeon'){
    ctx.fillStyle='#0a0610'; ctx.fillRect(0,0,cv.width,cv.height);
    for(let y=0;y<DH;y++)for(let x=0;x<DW;x++){
      const sx=Math.round(x*TILE-camX), sy=Math.round(y*TILE-camY);
      drawDungeonTile(dungeon.grid[y][x], sx, sy, x, y);
    }
    ctx.textAlign='left';
    // boss telegraphs (drawn under the actors)
    demons.forEach(d=>{ if(!d.alive||!d.boss) return; const bx=Math.round(d.x-camX), by=Math.round(d.y-camY); const bcx=bx+TILE/2, bcy=by+TILE/2;
      if(d.state==='telegraph'){ const p=1-d.telegraph/d.telMax; const pulse=0.4+0.5*Math.abs(Math.sin(d.t*0.4));
        ctx.globalAlpha=0.25+pulse*0.3;
        if(d.kind==='charge'){ // warning line in the aim direction
          ctx.strokeStyle=d.col; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(bcx,bcy); ctx.lineTo(bcx+d.aimx*TILE*7, bcy+d.aimy*TILE*7); ctx.stroke();
        } else if(d.kind==='slam'){ ctx.strokeStyle=d.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(bcx,bcy,TILE*1.2,0,7); ctx.stroke();
        } else { ctx.fillStyle=d.col; ctx.beginPath(); ctx.arc(bcx,bcy,TILE*0.9,0,7); ctx.fill(); }
        ctx.globalAlpha=1;
      }
      if(d.ring){ ctx.strokeStyle=d.col; ctx.globalAlpha=0.7; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(d.anchorx+TILE/2-camX, d.anchory+TILE/2-camY, d.ringR, 0,7); ctx.stroke(); ctx.globalAlpha=1; }
    });
    // projectiles
    dungeon.projectiles.forEach(p=>{ const px2=Math.round(p.x-camX), py2=Math.round(p.y-camY);
      ctx.fillStyle='#ff5a6a'; ctx.beginPath(); ctx.arc(px2,py2,4,0,7); ctx.fill();
      ctx.fillStyle='#ffd0d8'; ctx.beginPath(); ctx.arc(px2,py2,1.6,0,7); ctx.fill(); });
    // demons then adds then knight
    demons.forEach(d=>{ if(d.alive||d.dying>0||d.pop) drawDemon(Math.round(d.x-camX), Math.round(d.y-camY), d); });
    dungeon.adds.forEach(a=>{ if(!a.alive)return; const ax=Math.round(a.x-camX), ay=Math.round(a.y-camY);
      const body=a.hurt>0?'#ffb0b8':'#8a3a6a'; px(ax+4,ay+5,8,8,body); px(ax+5,ay+7,2,2,'#ff8'); px(ax+9,ay+7,2,2,'#ff8'); });
    drawKnight(Math.round(player.x-camX), Math.round(player.y-camY));
    // ── TORCHLIGHT vignette on maze floors: darkness presses in beyond your light ──
    if(dungeon.floors[dungeon.floorIdx]<=1 || dungeon.floors[dungeon.floorIdx]===4){
      const lx=Math.round(player.x-camX)+TILE/2, ly=Math.round(player.y-camY)+TILE/2;
      const grad=ctx.createRadialGradient(lx,ly,TILE*2.6, lx,ly,TILE*6.2);
      grad.addColorStop(0,'rgba(6,3,12,0)'); grad.addColorStop(1,'rgba(6,3,12,0.72)');
      ctx.fillStyle=grad; ctx.fillRect(0,0,cv.width,cv.height);
    }
    // ── THE FOG OF DISILLUSIONMENT: in the forest maze, darkness drinks the light ──
    if(dungeon.disillusion && !dungeon.inGlade){
      const pcx=Math.round(player.x-camX)+TILE/2, pcy=Math.round(player.y-camY)+TILE/2;
      const lamp=!!player.hasLamp;
      const rClear=(lamp?5.0:3.0)*TILE, rFade=(lamp?8.0:5.4)*TILE;
      const dark=lamp?0.80:0.96;       // max darkness out in the fog
      // ONE radial gradient covering the whole view: fully TRANSPARENT at the player,
      // smoothly ramping to dark by rFade and staying dark beyond (the last color stop
      // extends outward). A single fill — no seams, no compositing.
      const fg=ctx.createRadialGradient(pcx,pcy,0, pcx,pcy,rFade);
      fg.addColorStop(0, 'rgba(5,6,10,0)');                       // center: clear
      fg.addColorStop(rClear/rFade, 'rgba(5,6,10,0)');           // still clear out to rClear
      fg.addColorStop(1, 'rgba(5,6,10,'+dark+')');               // dark by rFade (and beyond)
      ctx.fillStyle=fg; ctx.fillRect(0,0,cv.width,cv.height);
      if(lamp){
        const lgr=ctx.createRadialGradient(pcx,pcy,2, pcx,pcy,rClear);
        lgr.addColorStop(0,'rgba(255,196,90,0.18)'); lgr.addColorStop(1,'rgba(255,196,90,0)');
        ctx.fillStyle=lgr; ctx.fillRect(0,0,cv.width,cv.height);
      }
    }
    return;
  }
  const t0x=Math.floor(camX/TILE), t0y=Math.floor(camY/TILE);
  // ground
  for(let ry=-1;ry<=VIEW_TH;ry++) for(let rx=-1;rx<=VIEW_TW;rx++){
    const tx=t0x+rx, ty=t0y+ry;
    const sx=Math.round(rx*TILE-(camX-t0x*TILE)), sy=Math.round(ry*TILE-(camY-t0y*TILE));
    drawTile(tileAt(tx,ty), sx, sy, tx, ty);
  }
  // ── ELEVATION: draw cliff faces & lit top edges so height reads in 2.5D ──
  // Reference style: warm brown rock built from chunky blocks with lit tops,
  // and a grass/snow fringe overhanging the lip of each drop.
  if(place.kind==='overworld' && elevActive){
    for(let ry=-1;ry<=VIEW_TH+1;ry++) for(let rx=-1;rx<=VIEW_TW;rx++){
      const tx=t0x+rx, ty=t0y+ry; const h=elevAt(tx,ty); if(h<=0) continue;
      const sx=Math.round(rx*TILE-(camX-t0x*TILE)), sy=Math.round(ry*TILE-(camY-t0y*TILE));
      const hS=elevAt(tx,ty+1);   // tile to the south (toward camera/bottom)
      const tBelow=WORLD[ty+1]&&WORLD[ty+1][tx];
      if(hS<h && tBelow!==10 && tBelow!==11){ const drop=h-hS; const faceH=Math.min(TILE, 6+drop*5);
        const fy=sy+TILE;
        // warm rock face
        px(sx, fy, TILE, faceH, '#6b4f38');
        px(sx, fy, TILE, 1, '#96714e');                          // catch-light at the lip
        // chunky blocks: 2 courses of deterministic stones, each with a lit top + dark gap
        for(let i=0;i<4;i++){
          const ch=((tx*31+ty*17+i*47)>>>0);
          const bw=4+(ch%4), bx2=sx+((ch>>2)%(TILE-bw));
          const by2=fy+2+((ch>>5)%Math.max(1,faceH-6));
          px(bx2,by2,bw,3,'#7d5e44'); px(bx2,by2,bw,1,'#9c7752'); px(bx2,by2+3,bw,1,'#46321f');
        }
        px(sx, fy+faceH-2, TILE, 2, '#3c2c1c');                  // deep shadow at the base
        // overhanging fringe: grass or snow spills over the lip from the surface above
        const tt=WORLD[ty]&&WORLD[ty][tx];
        if(tt===22||tt===34||tt===23){ for(let fx2=0;fx2<TILE;fx2+=3) px(sx+fx2, fy, 2, 2+((tx+fx2)%2), '#e8f0f6'); }
        else if(tt===25||tt===27){ for(let fx2=0;fx2<TILE;fx2+=4) px(sx+fx2, fy, 2, 1+((tx+fx2)%2), '#7a7268'); }
        else { for(let fx2=0;fx2<TILE;fx2+=3) px(sx+fx2, fy, 2, 2+((tx+fx2)%2), '#4f9050'); }
      }
      // lit top edge on the raised tile's north side (sun from top-left)
      const hN=elevAt(tx,ty-1);
      if(hN<h){ const tt=WORLD[ty]&&WORLD[ty][tx];
        const tN=WORLD[ty-1]&&WORLD[ty-1][tx];
        if(tN!==10 && tN!==11) px(sx, sy-1, TILE, 1, '#2e2216');   // crisp silhouette on the lower side
        px(sx, sy, TILE, 1, (tt===22||tt===34)?'#ffffff':'#cfe2c8'); }
      // side edges (sun from top-left), RUN-AWARE: full treatment only where the
      // side wall runs 2+ tiles vertically (straight terraces); isolated diagonal
      // steps (curved boundaries like Crystalpeak's rings) get a minimal seam so
      // curves stay clean while long ledges stay bold.
      const hE=elevAt(tx+1,ty), hW=elevAt(tx-1,ty);
      const tE=WORLD[ty]&&WORLD[ty][tx+1], tW=WORLD[ty]&&WORLD[ty][tx-1];
      if(hE<h && tE!==10 && tE!==11){
        const runE=(elevAt(tx,ty-1)===h && elevAt(tx+1,ty-1)<h) ||
                   (elevAt(tx,ty+1)===h && elevAt(tx+1,ty+1)<h);
        if(runE){
          px(sx+TILE-2, sy, 2, TILE, '#6b4f38');
          px(sx+TILE-2, sy, 1, TILE, '#7d5e44');
          px(sx+TILE-1, sy, 1, TILE, '#46321f');
          px(sx+TILE,   sy, 2, TILE, '#140f0a44');
          px(sx+TILE+2, sy, 1, TILE, '#140f0a22');
          const tt3=WORLD[ty]&&WORLD[ty][tx];
          if(tt3===22||tt3===34) px(sx+TILE-2, sy, 1, TILE, '#e8f0f6');
        } else {
          px(sx+TILE-1, sy, 1, TILE, '#46321f');
        }
      }
      if(hW<h && tW!==10 && tW!==11){
        const runW=(elevAt(tx,ty-1)===h && elevAt(tx-1,ty-1)<h) ||
                   (elevAt(tx,ty+1)===h && elevAt(tx-1,ty+1)<h);
        if(runW){
          const tt3=WORLD[ty]&&WORLD[ty][tx];
          px(sx, sy, 1, TILE, (tt3===22||tt3===34)?'#ffffff':'#cfe2c8');
          px(sx-1, sy, 1, TILE, '#140f0a22');
        } else {
          px(sx, sy, 1, TILE, '#46321f');
        }
      }
      // subtle ambient lightening with height so upper tiers feel sunlit
      // (snow/ice tiles are exempt — they are already bright, and a warm wash muddies them)
      if(h>1){ const tt2=WORLD[ty]&&WORLD[ty][tx];
        if(tt2!==22&&tt2!==34&&tt2!==23&&tt2!==24){
          ctx.globalAlpha=Math.min(0.10, 0.035*(h-1)); ctx.fillStyle='#fff8e8'; ctx.fillRect(sx,sy,TILE,TILE); ctx.globalAlpha=1; } }
    }
  }
  // ── ABADDON'S BARRIERS: pulsing rings of dark power around still-sealed towns ──
  if(place.kind==='overworld'){
    const ph=Date.now()/300;
    for(let ry=-1;ry<=VIEW_TH;ry++) for(let rx=-1;rx<=VIEW_TW;rx++){
      const tx=t0x+rx, ty=t0y+ry;
      const bi=barrierAt(tx,ty); if(bi===-1) continue;
      const sx=Math.round(rx*TILE-(camX-t0x*TILE)), sy=Math.round(ry*TILE-(camY-t0y*TILE));
      const hsh=((tx*374761393+ty*668265263)>>>0);
      const pulse=0.30+0.14*Math.sin(ph+(hsh%7));
      ctx.globalAlpha=pulse; ctx.fillStyle='#5a1a8a'; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.globalAlpha=Math.min(1,pulse+0.25); ctx.fillStyle='#9a4ae0';
      const cr=Math.floor(ph*2+(hsh%13))%4;                          // crawling energy crackles
      ctx.fillRect(sx+2+(hsh%9), sy+((cr*5+(hsh>>3))%14), 2, 2);
      ctx.fillRect(sx+((hsh>>4)%12), sy+13-cr*3, 2, 2);
      ctx.fillRect(sx+7, sy+((cr*4+(hsh>>6))%14), 1, 3);
      ctx.globalAlpha=1;
    }
  }
  // ── draw CROPS growing on their plots (overworld) ──
  if(place.kind==='overworld'){
    for(const key in crops){ const c=crops[key]; const [cxx,cyy]=key.split(',').map(Number);
      const sx=Math.round(cxx*TILE-camX), sy=Math.round(cyy*TILE-camY);
      if(sx<-TILE||sy<-TILE||sx>cv.width||sy>cv.height) continue;
      drawCrop(sx, sy, c.stage);
    }
    // fishing bobber + bite indicator
    if(fishing){ const bx=Math.round(fishing.fx*TILE-camX)+TILE/2, by=Math.round(fishing.fy*TILE-camY)+TILE/2;
      const bob=fishing.phase==='bite'?Math.sin(performance.now()/60)*2:Math.sin(performance.now()/300)*1;
      px(bx-1,by-1+bob,3,3,'#e84a4a'); px(bx-1,by+1+bob,3,1,'#fff');   // red/white bobber
      if(fishing.phase==='bite'){ ctx.fillStyle='#ffe04a'; ctx.font='bold 12px monospace'; ctx.fillText('!', bx-2, by-6+bob); }
    }
  }
  // overworld: collect all depth-objects and y-sort so nearer ones overlap farther
  if(place.kind==='overworld'){
    const objs=[];
    decorations.forEach(d=>objs.push({ sy:d.y+(d.w||1), draw:()=>drawDecor(d, Math.round(d.x*TILE-camX), Math.round(d.y*TILE-camY)) }));
    // faint sparkle on undiscovered secrets (a subtle shimmer that rewards a keen eye)
    SECRETS.forEach(s=>{ if(secretsFound[s.id]) return; const sx=Math.round(s.x*TILE-camX), sy=Math.round(s.y*TILE-camY);
      if(sx<-TILE||sx>cv.width+TILE||sy<-TILE||sy>cv.height+TILE) return;
      const tw=0.5+0.5*Math.sin(Date.now()*0.005+s.x); ctx.globalAlpha=0.35+tw*0.4; ctx.fillStyle='#fff7c8';
      const cx=sx+TILE/2, cy=sy+TILE/2, r=2+tw*2; ctx.beginPath(); ctx.moveTo(cx,cy-r-2); ctx.lineTo(cx+1.5,cy); ctx.lineTo(cx,cy+r+2); ctx.lineTo(cx-1.5,cy); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-r-2,cy); ctx.lineTo(cx,cy-1.5); ctx.lineTo(cx+r+2,cy); ctx.lineTo(cx,cy+1.5); ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; });
    buildings.forEach(b=>objs.push({ sy:b.y+b.h, draw:()=>drawBuilding(b, Math.round(b.x*TILE-camX), Math.round(b.y*TILE-camY)) }));
    villagers.forEach(v=>objs.push({ sy:(v.y/TILE)+1, draw:()=>drawVillager(Math.round(v.x-camX), Math.round(v.y-camY), v) }));
    if(player.pet && !player.mounted) objs.push({ sy:(player.petY/TILE)+0.9, draw:()=>drawPet(Math.round(player.petX-camX), Math.round(player.petY-camY)) });
    demons.forEach(d=>{ if(d.alive||d.dying>0||d.pop) objs.push({ sy:(d.y/TILE)+1, draw:()=>drawDemon(Math.round(d.x-camX), Math.round(d.y-camY), d) }); });
    // 🛒 the parked wagon (when not being driven), depth-sorted like a decoration
    if(wagon.unlocked && !player.driving){ objs.push({ sy:wagon.y+1, draw:()=>drawWagon(Math.round(wagon.x*TILE-camX), Math.round(wagon.y*TILE-camY), false, 'down') }); }
    if(player.driving){ objs.push({ sy:(player.y/TILE)+1.05, draw:()=>drawWagon(Math.round(player.x-camX), Math.round(player.y-camY), true, player.dir) }); }
    else objs.push({ sy:(player.y/TILE)+1, draw:()=>drawKnight(Math.round(player.x-camX), Math.round(player.y-camY)) });
    objs.sort((a,b)=>a.sy-b.sy).forEach(o=>o.draw());
    // ── HOMESTEAD DECOR GHOST: preview the piece on the facing tile ──
    if(decorPlace.active && decorPlace.id){
      const it=DECOR_ITEMS[decorPlace.id];
      const [fx,fy]=facingTile();
      const ok=decorFootprintOk(decorPlace.id,fx,fy);
      const gx=Math.round(fx*TILE-camX), gy=Math.round(fy*TILE-camY);
      ctx.globalAlpha=0.35; ctx.fillStyle=ok?'#5aff8a':'#ff5a5a';
      ctx.fillRect(gx,gy,it.w*TILE,it.w*TILE); ctx.globalAlpha=0.75;
      drawDecor({kind:it.kind,w:it.w}, gx, gy);
      ctx.globalAlpha=1;
    }
  } else {
    drawSanctuaryOverlay(camX, camY);   // camX/camY are local to draw(); pass them in
    drawKeepThroneOverlay(camX, camY);   // dress the capital keep as a throne room
    activeNpcs().forEach(n=>drawNpc(Math.round(n.x*TILE-camX), Math.round(n.y*TILE-camY), n));
    drawKnight(Math.round(player.x-camX), Math.round(player.y-camY));
  }
}

// ── DUNGEON tile painter: torch-lit stone halls ──
// Walls render as BRICK FACES when open floor lies below them (you see their front),
// and as dark slab TOPS otherwise. Floors are varied flagstones. Some wall faces
// carry an animated torch. Stairs are carved stone treads.
function drawDungeonTile(t,sx,sy,x,y){
  const hsh=((x*374761393 + y*668265263)>>>0);
  const h1=hsh%13, h2=(hsh>>3)%11, h3=(hsh>>6)%7;
  const below=(dungeon.grid[y+1]&&dungeon.grid[y+1][x]!==undefined)?dungeon.grid[y+1][x]:1;
  // ── FOREST OF DISILLUSIONMENT: a dark, brown-foliage wood — leaf-litter paths ──
  if(dungeon.disillusion && !dungeon.inGlade){
    // brown leaf-litter forest floor under everything (bright enough to read in the fog's clear zone)
    const grd=[ '#3e3122','#372b1d','#443524' ][h3%3];
    px(sx,sy,TILE,TILE,grd);
    if(h1<5) px(sx+2+h2%9, sy+3+h3, 2,1,'#241a0e');                   // dark earth fleck
    if(h1===5){ px(sx+4+h2%6, sy+6+h3%5, 2,2,'#6e5230'); }            // fallen-leaf clump
    if(h2<3){ px(sx+5+h1%6, sy+9+h3%4, 2,1,'#6b4a25'); }             // dry leaf
    if(h2===4){ px(sx+3+h1%7, sy+11+h3%3, 1,1,'#3f5a2a'); }          // sparse green sprig
    if(t===1){
      // a TREE wall — brown trunk + dense GREEN canopy, dark and shadowed
      const trunk=['#3a2818','#45301c','#33240f'][h2%3];             // brown trunk/bark
      const leaf1=['#16301a','#1a3a1f','#122a16'][h1%3];             // deep green shadow canopy
      const leaf2=['#27512b','#2d5e33','#214826'][h3%3];             // mid green leaves
      const leaf3=['#3a7340','#43834a'][h1%2];                       // lit green highlight clump
      px(sx+6,sy+9,4,7,trunk);                                        // trunk
      px(sx+1,sy,TILE-2,TILE-2,leaf1);                               // dark base canopy (fills tile)
      px(sx+2+h1%3,sy+1,TILE-5,TILE-5,leaf2);                        // green foliage mass
      px(sx+3,sy+2,3,3,leaf3); px(sx+TILE-6,sy+3+h2%3,3,3,leaf2);    // bushy clumps
      px(sx+4+h1%5,sy+1,2,1,leaf3);                                  // dappled highlight
      if(h2<2) px(sx+2+h1%9, sy+TILE-3, 1,2,'#2d5e33');             // a hanging leaf
      px(sx+1,sy+TILE-2,TILE-2,2,'#0c1808');                         // deep shadow at the base
      return;
    }
    if(t===2){ // forest exit — a brightening gap in the trees with stairs of stone
      for(let i=0;i<4;i++){ const syy=sy+i*4;
        px(sx+2,syy,TILE-4,3,'#b8a888'); px(sx+2,syy,TILE-4,1,'#d8c8a0'); px(sx+2,syy+3,TILE-4,1,'#5a5040'); }
      ctx.globalAlpha=0.18; ctx.fillStyle='#ffe9b0'; ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2,TILE,0,7); ctx.fill(); ctx.globalAlpha=1;
      ctx.fillStyle='#fff4d0'; ctx.font='8px monospace'; ctx.textAlign='center'; ctx.fillText('⬆',sx+TILE/2,sy+TILE/2+3);
      return;
    }
    if(t===8){ // the way you came in — a darker gap in the canopy
      for(let i=0;i<4;i++){ const syy=sy+i*4; const f=['#3a4a32','#2f3d28','#26331f','#1c2718'][i];
        px(sx+2,syy,TILE-4,3,f); px(sx+2,syy+3,TILE-4,1,'#141d10'); }
      ctx.fillStyle='#9ab080'; ctx.font='8px monospace'; ctx.textAlign='center'; ctx.fillText('⬇',sx+TILE/2,sy+TILE/2+3);
      return;
    }
    if(t===35){ // the HIDDEN SAGE HOLLOW — a mossy door of stone breathing in the deep wood
      px(sx+3,sy+2,TILE-6,TILE-3,'#2a2438');                          // dark stone arch
      px(sx+4,sy+3,TILE-8,TILE-5,'#181426');                          // shadowed mouth
      px(sx+3,sy+2,TILE-6,1,'#3f5a3a'); px(sx+3,sy+TILE-2,TILE-6,1,'#1c2a1b'); // mossy lintel/sill
      px(sx+2,sy+5,1,5,'#3f6b3a'); px(sx+TILE-3,sy+6,1,4,'#3f6b3a');  // creeping vines
      ctx.globalAlpha=0.5+0.2*Math.sin(Date.now()*0.004); ctx.fillStyle='#5a8f6a';
      ctx.beginPath(); ctx.arc(sx+TILE/2,sy+TILE/2+1,3,0,7); ctx.fill(); ctx.globalAlpha=1; // faint glow within
      return;
    }
    if(t===5){ const k=dungeon.floorIdx+':'+x+','+y; ctx.font='12px monospace'; ctx.textAlign='center'; ctx.fillText(dungeon.chests[k]?'📭':'📦',sx+TILE/2,sy+TILE/2+4); return; }
    // any other tile in the forest falls through to the default painter below
  }
  if(t===1){
    if(below!==1){ // WALL FACE — brick courses with lit tops, facing the camera
      px(sx,sy,TILE,TILE,'#352a4c');
      for(let c=0;c<3;c++){ const cy2=sy+1+c*5; const off=(c%2)?4:0;
        px(sx,cy2,TILE,4,'#3d3156'); px(sx,cy2,TILE,1,'#4a3c66');           // course + lit top
        px(sx,cy2+4,TILE,1,'#221a34');                                       // mortar gap
        px(sx+((off+h1)%10),cy2+1,1,3,'#221a34'); px(sx+((off+h1+6)%14)+1,cy2+1,1,3,'#221a34'); // brick joints
      }
      px(sx,sy,TILE,1,'#5a4a78'); px(sx,sy+TILE-1,TILE,1,'#181226');
      // a torch on some faces (deterministic), with a flickering flame
      if(h2<3){ const fl=Math.floor(Date.now()/120)%3;
        px(sx+7,sy+6,2,5,'#5a4220');                                         // bracket
        px(sx+6,sy+3,4,3,'#f2a23a'); px(sx+7,sy+2-(fl===1?1:0),2,2,'#ffd26a'); // flame
        ctx.globalAlpha=0.10+fl*0.02; ctx.fillStyle='#ffb24a'; ctx.beginPath(); ctx.arc(sx+8,sy+8,TILE*0.9,0,7); ctx.fill(); ctx.globalAlpha=1;
      }
    } else {     // WALL TOP — dark slab seen from above
      px(sx,sy,TILE,TILE,'#241c36');
      px(sx,sy,TILE,1,'#322846'); px(sx+1+h1%8,sy+3+h2%8,3,2,'#2b2240');
      px(sx,sy+TILE-1,TILE,1,'#160f24');
    }
    return;
  }
  // FLAGSTONE floor under everything else
  const shade=h3<2?'#2e2748':(h3<4?'#2a2342':'#272040');
  px(sx,sy,TILE,TILE,shade);
  px(sx,sy,TILE,1,'#332b50'); px(sx,sy,1,TILE,'#332b50');                   // seams
  if(h1<3) px(sx+2+h2%9,sy+3+h3,3,1,'#221b36');                              // crack

      px(x,y+8,TILE,1,'#544c60'); px(x+7,y+4,1,4,'#544c60'); px(x+3,y+9,1,5,'#544c60'); px(x+11,y+9,1,5,'#544c60');
      */
      break; }
    default: px(x,y,TILE,TILE,'#5fa860');
  }
  // ── LEDGE/WALL CONTACT: ground tiles seat against adjacent cliffs & ramparts ──
  {
    const GROUND=(g)=>g===0||g===2||g===4||g===6||g===7||g===8||g===14||g===15||g===18||g===19||g===22||g===23||g===25||g===27||g===28||g===31||g===34;
    if(GROUND(t)){
      const gN=WORLD[ty-1]&&WORLD[ty-1][tx], gS=WORLD[ty+1]&&WORLD[ty+1][tx];
      const gW=WORLD[ty]&&WORLD[ty][tx-1], gE=WORLD[ty]&&WORLD[ty][tx+1];
      const rock=(g)=>g===32||g===33, caster=(g)=>g===32||g===33||g===5;
      if(caster(gN) && elevAt(tx,ty)<=elevAt(tx,ty-1)){
        px(x,y,TILE,3,'#140f0a58'); px(x,y+3,TILE,2,'#140f0a30'); px(x,y+5,TILE,1,'#140f0a16');
        if(rock(gN)){ px(x+2+h1%9,y+2,2,1,'#8a7458'); px(x+3+h1%9,y+3,1,1,'#5a4834');
          if(h2<5) px(x+10-h3%6,y+4,2,1,'#8a7458'); }
      }
      if(rock(gS)) px(x,y+TILE-1,TILE,1,'#140f0a2e');
      if(caster(gW)) px(x,y,1,TILE,'#140f0a26');
      if(caster(gE)) px(x+TILE-1,y,1,TILE,'#140f0a26');
    }
  }
}

// ── FAKED-3D BUILDINGS ───────────────────────────────────────
// Each building footprint is W×H tiles. We paint: ground shadow, front wall
// face (lit top/left, shaded bott/right), a peeked side, a roof slab/pitch on
// top, plus door/windows. Anchored so the door tile aligns with the grid door.

// ── TOWN THEMES: material + palette identity per town, resolved from building id ──
const TOWN_THEMES = {
 hearthvale: { pal:{}, roofTex:'shingle' },

 saltmere:   { pal:{wall:'#e8e2d4',wallLit:'#f6f2e8',wallDark:'#c0baac',side:'#ccc6b8',

 crystalpeak:{ pal:{wall:'#9a94a8',wallLit:'#b4aec2',wallDark:'#726c84',side:'#7e788e',

 ironhold:   { pal:{wall:'#8a8a92',wallLit:'#a4a4ac',wallDark:'#68686f',side:'#727279',

const TOWN_PREFIX = {dh:'dusthaven',cp:'crystalpeak',ih:'ironhold',tw:'thornwood',af:'ashfield',sg:'stormgate',sh:'shadowmere',hg:'hellgate',sm:'saltmere'};
function townOf(b){
  const id=b.id||'';
  if(id.indexOf('home_')===0) return 'homestead';
  const p=id.split('_')[0];
  return TOWN_PREFIX[p]||'hearthvale';
}

function drawBuilding(b, ox, oy){
  const W=b.w*TILE, H=b.h*TILE;
  const th=TOWN_THEMES[townOf(b)]||{};
  const pal=Object.assign({}, BSTYLE[b.style]||BSTYLE.house, th.pal||{});
  const wallTex = th.wallTex==='plain' ? null
                : th.wallTex ? th.wallTex
                : (b.style==='cottage' ? 'timber' : (b.style==='keep'||b.style==='chapel') ? 'stone' : null);
  const roofTex = th.roofTex||'shingle';
  const beam = th.beam||'#5a4028';
  const OL='#1a141c';
  ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.beginPath();
  ctx.ellipse(ox+W/2+6, oy+H-2, W/2, TILE*0.5, 0,0,7); ctx.fill();
  const wallTop = oy + Math.round(H*0.42);
  const wallH = (oy+H) - wallTop;
  px(ox, wallTop, W, wallH, pal.wall);
  px(ox, wallTop, W, 2, pal.wallLit);
  px(ox, wallTop, 2, wallH, pal.wallLit);
  px(ox+W-2, wallTop, 2, wallH, pal.wallDark);
  px(ox, oy+H-2, W, 2, pal.wallDark);
  px(ox+W, wallTop+3, 3, wallH-3, pal.side);
  px(ox+W, oy+H-2, 3, 2, pal.wallDark);
  if(wallTex==='timber'){
    px(ox+2,wallTop+2,2,wallH-4,beam); px(ox+W-4,wallTop+2,2,wallH-4,beam);
    px(ox+2,wallTop+2,W-4,2,beam);
  } else if(wallTex==='stone' && pal.roofType!=='crenel'){
    for(let cy2=wallTop+5; cy2<oy+H-2; cy2+=5) px(ox+2,cy2,W-4,1,pal.wallDark);
    let i2=0; for(let cx2=ox+5; cx2<ox+W-4; cx2+=7){ px(cx2+(i2%2)*3,wallTop+6,1,4,pal.wallDark); i2++; }
  } else if(wallTex==='plank'){
    for(let cx2=ox+5; cx2<ox+W-3; cx2+=5) px(cx2,wallTop+3,1,wallH-5,pal.wallDark);
  }
  if(pal.roofType==='pitch'){
    const rTop=oy, rBot=wallTop+2, rH=rBot-rTop;
    for(let i=0;i<rH;i++){ const inset=Math.round((rH-i)/rH*(W*0.12));
      px(ox+inset, rTop+i, W-inset*2+1, 1, i<rH*0.35?pal.roofLit:pal.roof); }
    px(ox+Math.round(W/2)-1, rTop, 2, 2, pal.roofRidge);
    px(ox, rBot-1, W, 1, pal.roofEave);
    // themed roof texture
    if(roofTex==='thatch'){
      for(let i=2;i<rH-1;i+=2){ const inset=Math.round((rH-i)/rH*(W*0.12));
        px(ox+inset, rTop+i, W-inset*2+1, 1, pal.roofDark); }
      px(ox+Math.round(W/2)-2, rTop, 4, 2, pal.roofRidge);
      px(ox-1, rBot-3, W+2, 2, pal.roofLit);
    } else if(roofTex==='slate'){
      for(let i=3;i<rH-1;i+=3){ const inset=Math.round((rH-i)/rH*(W*0.12));
        px(ox+inset, rTop+i, W-inset*2+1, 1, pal.roofDark);
        for(let cx2=ox+inset+3; cx2<ox+W-inset-2; cx2+=5) px(cx2+(i%2)*2, rTop+i-2, 1, 2, pal.roofDark); }
    } else {
      for(let i=4;i<rH-1;i+=4){ const inset=Math.round((rH-i)/rH*(W*0.12));
        px(ox+inset, rTop+i, W-inset*2+1, 1, pal.roofDark); }
    }
    if(th.snowRidge) px(ox+Math.round(W*0.12), rTop+1, W-Math.round(W*0.12)*2, 2, '#f0f6fa');
    // eave overhang + shadow, roof outline
    px(ox-1, rBot-2, W+2, 2, pal.roof);
    px(ox-1, rBot, W+2, 1, '#00000038');
    for(let i=0;i<rH;i++){ const inset=Math.round((rH-i)/rH*(W*0.12));
      px(ox+inset-1, rTop+i, 1, 1, OL); px(ox+W-inset+1, rTop+i, 1, 1, OL); }
    px(ox+Math.round(W*0.12)-1, rTop-1, W-Math.round(W*0.12)*2+3, 1, OL);
    // chimney + drifting smoke
    const chx=ox+W-8;
    px(chx, rTop+2, 4, 6, '#8a8496'); px(chx, rTop+2, 4, 1, '#a8a4b6'); px(chx-1, rTop+1, 6, 2, '#6e6a80');
    const puff=((Date.now()>>9)+(b.x*31+b.y*17))&3;
    px(chx+1, rTop-2-puff, 2, 2, '#e8e8f0aa'); px(chx+2, rTop-5-puff, 2, 2, '#e8e8f066'); px(chx, rTop-8-puff, 2, 2, '#e8e8f033');
  } else if(pal.roofType==='crenel'){
    const rH=wallTop-oy; px(ox-2, oy+4, W+4, rH+(wallTop-(oy+4)), pal.wall);
    for(let i=0;i<b.w*2;i++){ const bx=ox+i*(TILE/2); const tall=(i%2===0);
      px(bx, oy+(tall?2:6), TILE/2-1, (tall?wallTop-oy-2:wallTop-oy-6)+2, pal.roof);
      px(bx, oy+(tall?2:6), TILE/2-1, 1, pal.roofLit); }
    px(ox, wallTop, W, 1, pal.roofEave);
    for(let i=0;i<b.w*2;i++){ const bx=ox+i*(TILE/2); const tall=(i%2===0); const ty2=oy+(tall?2:6);
      px(bx-1, ty2, 1, 3, OL); px(bx+TILE/2-1, ty2, 1, 3, OL); px(bx, ty2-1, TILE/2-1, 1, OL); }
    for(let cy2=oy+9; cy2<oy+H-3; cy2+=6) px(ox-2, cy2, W+4, 1, pal.wallDark);
    let i3=0; for(let cx2=ox+4; cx2<ox+W-3; cx2+=7){ px(cx2+(i3%2)*3, oy+11, 1, 3, pal.wallDark); i3++; }
    px(ox+Math.round(W*0.3), oy+13, 1, 5, '#2e2938'); px(ox+Math.round(W*0.7), oy+13, 1, 5, '#2e2938');
  } else {
    const rH=wallTop-oy; px(ox-1, oy, W+2, rH, pal.roof);
    px(ox-1, oy, W+2, 2, pal.roofLit); px(ox-1, oy, 2, rH, pal.roofLit);
    px(ox+W-1, oy, 2, rH, pal.roofEave); px(ox-1, wallTop-1, W+2, 1, pal.roofEave);
    px(ox-2, oy-1, W+4, 1, OL); px(ox-2, oy, 1, rH, OL); px(ox+W+1, oy, 1, rH, OL);
    for(let cy2=oy+3; cy2<wallTop-2; cy2+=4) px(ox, cy2, W, 1, pal.roofEave);
    if(pal.awning){ px(ox, wallTop, W, 3, pal.awning);
      for(let i=0;i<b.w*2;i++) if(i%2) px(ox+i*(TILE/2), wallTop, TILE/2, 3, '#fff2');
      px(ox, wallTop+3, W, 1, '#00000040');
      for(let i=0;i<b.w*2;i++) px(ox+i*(TILE/2)+2, wallTop+3, 1, 2, pal.awning); }
  }
  if(b.door){
    const dx = ox + (b.door.x-b.x)*TILE, dy = oy+H-TILE;
    px(dx+2, dy, TILE-4, TILE, '#3a2410');
    px(dx+3, dy+1, TILE-6, TILE-1, pal.door);
    px(dx+TILE-5, dy+7, 2, 2, '#f2c14e');
    if(pal.roofType==='crenel'){ px(dx+2, dy-2, TILE-4, 2, '#181018'); }
    px(dx+1, dy+TILE-1, TILE-2, 1, '#00000045');
    px(dx+2, dy, 1, TILE, OL); px(dx+TILE-3, dy, 1, TILE, OL);
  }
  if(b.style!=='chapel'){
    const wy=wallTop+Math.round(wallH*0.3);
    [ox+5, ox+W-9].forEach(wx=>{ px(wx, wy, 4, 4, '#241a10'); px(wx, wy, 4, 4, pal.glass); px(wx, wy, 4, 1, '#cfe6f5');
      px(wx+1, wy, 1, 4, pal.wallDark); px(wx, wy+2, 4, 1, pal.wallDark);
      px(wx-1, wy-1, 6, 1, OL); px(wx-1, wy+4, 6, 1, '#00000045'); });
  } else {
    const cx=ox+Math.round(W/2);
    px(cx-3, wallTop+4, 6, 10, '#241a10'); px(cx-2, wallTop+5, 4, 8, '#8fc0e0'); px(cx-2,wallTop+5,4,1,'#cfe6f5');
    px(cx-1, oy+2, 2, 8, '#f2e6b0'); px(cx-3, oy+4, 6, 2, '#f2e6b0');
    px(cx-1, wallTop+5, 1, 8, pal.wallDark);
    px(cx-4, wallTop+3, 8, 1, OL); px(cx-4, wallTop+4, 1, 10, OL); px(cx+3, wallTop+4, 1, 10, OL);
    px(cx-1, oy+1, 2, 1, '#fff8d0'); px(cx-3, oy+3, 6, 1, '#fff8d0');
  }
  px(ox-1, wallTop, 1, wallH, OL); px(ox+W+3, wallTop+3, 1, wallH-3, OL);
  px(ox-1, oy+H-1, W+4, 1, '#14101466'); px(ox, oy+H, W+2, 1, '#00000038');
}

function drawBuilding_legacy(b, ox, oy){
  const W=b.w*TILE, H=b.h*TILE;
  // ground shadow (offset lower-right)
  ctx.fillStyle='rgba(0,0,0,0.20)'; ctx.beginPath();
  ctx.ellipse(ox+W/2+6, oy+H-2, W/2, TILE*0.5, 0,0,7); ctx.fill();
  const pal = BSTYLE[b.style] || BSTYLE.house;
  const wallTop = oy + Math.round(H*0.42);     // wall starts below the roof
  const wallH = (oy+H) - wallTop;
  // front wall face
  px(ox, wallTop, W, wallH, pal.wall);
  px(ox, wallTop, W, 2, pal.wallLit);           // lit top edge
  px(ox, wallTop, 2, wallH, pal.wallLit);       // lit left edge
  px(ox+W-2, wallTop, 2, wallH, pal.wallDark);  // shaded right edge
  px(ox, oy+H-2, W, 2, pal.wallDark);           // base shadow
  // peeked right side face (depth)
  px(ox+W, wallTop+3, 3, wallH-3, pal.side);
  px(ox+W, oy+H-2, 3, 2, pal.wallDark);
  // ─ roof ─
  if(pal.roofType==='pitch'){
    const rTop=oy, rBot=wallTop+2, rH=rBot-rTop;
    for(let i=0;i<rH;i++){ const inset=Math.round((rH-i)/rH * (W*0.12)); 
      px(ox+inset, rTop+i, W-inset*2+1, 1, i<rH*0.35?pal.roofLit:pal.roof); }
    px(ox+Math.round(W/2)-1, rTop, 2, 2, pal.roofRidge);   // ridge highlight
    px(ox, rBot-1, W, 1, pal.roofEave);                     // eave shadow
  } else if(pal.roofType==='crenel'){   // castle battlements
    const rH=wallTop-oy; px(ox-2, oy+4, W+4, rH+ (wallTop-(oy+4)), pal.wall); // tower body base hint
    for(let i=0;i<b.w*2;i++){ const bx=ox+i*(TILE/2); const tall=(i%2===0); 
      px(bx, oy+(tall?2:6), TILE/2-1, (tall?wallTop-oy-2:wallTop-oy-6)+2, pal.roof);
      px(bx, oy+(tall?2:6), TILE/2-1, 1, pal.roofLit); }
    px(ox, wallTop, W, 1, pal.roofEave);
  } else { // flat slab roof (shop/inn)
    const rH=wallTop-oy; px(ox-1, oy, W+2, rH, pal.roof);
    px(ox-1, oy, W+2, 2, pal.roofLit); px(ox-1, oy, 2, rH, pal.roofLit);
    px(ox+W-1, oy, 2, rH, pal.roofEave); px(ox-1, wallTop-1, W+2, 1, pal.roofEave);
    if(pal.awning){ px(ox, wallTop, W, 3, pal.awning); for(let i=0;i<b.w*2;i++) if(i%2) px(ox+i*(TILE/2), wallTop, TILE/2, 3, '#fff2'); }
  }
  // ─ door (aligned to grid door tile) ─
  if(b.door){
    const dx = ox + (b.door.x-b.x)*TILE, dy = oy+H-TILE;
    px(dx+2, dy, TILE-4, TILE, '#3a2410');
    px(dx+3, dy+1, TILE-6, TILE-1, pal.door);
    px(dx+TILE-5, dy+7, 2, 2, '#f2c14e'); // knob
    if(pal.roofType==='crenel'){ px(dx+2, dy-2, TILE-4, 2, '#181018'); } // arch
  }
  // ─ windows (lit, inset) ─
  if(b.style!=='chapel'){
    const wy=wallTop+Math.round(wallH*0.3);
    [ox+5, ox+W-9].forEach(wx=>{ px(wx, wy, 4, 4, '#241a10'); px(wx, wy, 4, 4, pal.glass); px(wx, wy, 4, 1, '#cfe6f5'); });
  } else {
    // chapel: tall arched window + cross on roof
    const cx=ox+Math.round(W/2);
    px(cx-3, wallTop+4, 6, 10, '#241a10'); px(cx-2, wallTop+5, 4, 8, '#8fc0e0'); px(cx-2,wallTop+5,4,1,'#cfe6f5');
    px(cx-1, oy+2, 2, 8, '#f2e6b0'); px(cx-3, oy+4, 6, 2, '#f2e6b0');
  }
}

function drawSteedSprite(ox,oy,id,view,frame,rider,mirror){
  const Q=(lx,ly,w,h,c)=>{ if(mirror) px(ox+(24-lx-w),oy+ly,w,h,c); else px(ox+lx,oy+ly,w,h,c); };
  const OL='#141c2e',TUNIC='#3b6fd4',TUNIC_L='#5a8ae8',TUNIC_D='#2a52aa',HELM='#c9cdd6',HELM_HI='#eef0f4',HELM_D='#9096a2';

// mounted composite: anchored so the steed sits on the player tile (hitbox unchanged)
function drawSteedMounted(x,y,id,dir,frame){
  if(dir==='left')       drawSteedSprite(x-4,y-8,id,'profile',frame,true,false);
  else if(dir==='right') drawSteedSprite(x-4,y-8,id,'profile',frame,true,true);
  else if(dir==='up')    drawSteedSprite(x,  y-8,id,'back',   frame,true,false);
  else                   drawSteedSprite(x,  y-8,id,'front',  frame,true,false);
}
// following (unmounted) steed: profile, no rider, faces its heading
function drawSteedFollow(x,y,id,face,frame){
  drawSteedSprite(x-4,y-8,id,'profile',frame,false,face==='right');
}

function drawPet(x,y){
  const f=petForm(); if(!f) return;
  if(f.ability){ // final-form steeds get pixel sprites
    const face=(player.x < player.petX)?'left':'right';
    const frm=(f.ability==='fly') ? ((Date.now()>>8)&1)
             : (player.petMoving ? ((Date.now()>>7)&1) : 1);   // gathered legs at rest
    drawSteedFollow(x,y,player.pet.id,face,frm);
    return;
  }
  const bob=player.petMoving?Math.round(Math.sin(Date.now()*0.012)*1.5):0;
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(x+TILE/2,y+TILE-1,5,2,0,0,7); ctx.fill();
  ctx.font='14px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(f.emoji, x+TILE/2, y+TILE/2+bob);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// Mirror wrapper: draws the LEFT profile flipped to make the RIGHT profile,
// by reflecting local x within the 16px tile. Used only for dir==='right'.
function drawKnightBodyR(x,y,dir,f,bob,mb,swinging){
  const _px=px; // shadow the global px with a horizontally-mirrored version
  try{
    px=function(ax,ay,w,h,c){ const lx=ax-x; const mx=x+(16-lx-w); _px(mx,ay,w,h,c); };
    drawKnightBody(x,y,'left',f,bob,mb,swinging);
  } finally { px=_px; }
}

function drawSanctuaryOverlay(camX, camY){

    const t=G[y][x];

      px(sx,sy+3,TILE,2,'#7a6038'); px(sx,sy+4,TILE,1,'#5e4a2a');      // shadowed riser face → reads as a raised lip
    } else if(t===17){ // ALTAR BLOCK: tall carved stone with a lit face and gold trim
      px(sx,sy+1,TILE,TILE-1,'#8f8674'); px(sx,sy+1,TILE,2,'#a8a08c');  // stone body + lit top

  const cxs=[ (((W-1)>>1)-2), (((W-1)>>1)+2) ];

    const bx=Math.round(cx*TILE-camX)+TILE/2, by=Math.round(gy*TILE-camY)+TILE-3;
    px(bx-1,by-7,2,7,'#efe6d0');                                       // tall taper
    const fl=Math.sin(T*9+i*2.1), h=3+ (fl>0?1:0);

  });
}

//  👑 THE THRONE HALL — the grand scene for the endgame cutscene.
//  A long royal walkway up to the King of Luminar, lined with a cheering
//  crowd, torches, banners, and the King's own halberd guards.

const THALL = { W:17, H:30, cx:8 };            // hall size (tiles) + centre column
const THRONE_ENTRY = { x:8, y:27 };            // where the knight + father begin
const THRONE_TOP = { x:8, y:10 };              // where the knight halts, just below the dais
let _confetti=null, _crowdSeed=null, _band=null;
function initThroneScene(){
  _confetti=[];
  for(let i=0;i<90;i++) _confetti.push({ x:Math.random()*THALL.W*TILE, y:Math.random()*THALL.H*TILE,
    vy:8+Math.random()*14, sw:Math.random()*7, sz:1+((Math.random()*2)|0),
    c:['#e8c766','#c0392b','#4a68b8','#e6ecf4','#7ad07a','#e0885a'][(Math.random()*6)|0] });
  // fixed crowd: three rows deep of citizens lining both sides (clear of the guard lane)
  _crowdSeed=[];
  const outfits=['peasant','peasantF','farmer','fisher','fisherF','merchantD','monk','monkF','child','smith','nomad','hunter','pilgrim','sailor','woodcutter','survivor'];
  let ci=0;
  for(let ty=10; ty<=THALL.H-3; ty+=2){
    for(const cx of [3,4,5,11,12,13]){          // carpet is 7-9, guards run in 6 & 10 — no overlap
      _crowdSeed.push({ tx:cx, ty, outfit:outfits[(ci*7+cx)%outfits.length], face: cx<THALL.cx?'right':'left', ph:(ci%3) });
      ci++;
    }
  }
  // royal fanfare: heralds with trumpets flanking the throne up near the dais
  _band=[];
  for(const [tx,ty,dir] of [[4,4,'right'],[4,6,'right'],[5,8,'right'],[12,4,'left'],[12,6,'left'],[11,8,'left']])
    _band.push({tx,ty,dir});
}
function updateThroneScene(dt){
  if(!_confetti) return;
  for(const p of _confetti){ p.y += p.vy*dt/16; p.x += Math.sin((p.y+p.sw)*0.12)*0.7;
    if(p.y > THALL.H*TILE){ p.y=-4; p.x=Math.random()*THALL.W*TILE; } }
}
function drawThroneScene(camX, camY, t, quiet){
  const W=THALL.W, H=THALL.H, cx=THALL.cx;
  const sx=(tx)=>tx*TILE-camX, sy=(ty)=>ty*TILE-camY;
  const P=(a,b,w,h,c)=>px(Math.round(a),Math.round(b),w,h,c);
  // palette
  const stoneL='#c3baa8', stone='#a49a8a', stoneD='#7a7264', stoneDD='#565044';
  const gold='#e8c766', goldL='#f8e29a', goldD='#a8842e';
  const blue='#2f4a8f', blueL='#5a78c0', blueD='#1c2c58';
  const red='#8f2f2f', redL='#b04a4a', redD='#5c1c1c';

  // ── stone-tile floor with grout ──
  P(-camX,-camY,W*TILE,H*TILE,'#241f1a');
  for(let ty=0;ty<H;ty++)for(let tx=0;tx<W;tx++){
    const v=((tx*3+ty*5)%7); const base=v<2?'#c6b9a2':(v<4?'#bfb199':'#b8aa92');
    P(sx(tx),sy(ty),TILE,TILE,base);
    P(sx(tx),sy(ty),TILE,1,'#00000012'); P(sx(tx),sy(ty),1,TILE,'#00000012');
    P(sx(tx),sy(ty)+TILE-1,TILE,1,'#ffffff0a');
  }

  // ── ornate rounded PILLARS down both sides, draped with blue crown-banners ──
  function pillar(colx){
    for(let ty=0;ty<H;ty++){
      P(sx(colx),sy(ty),TILE*2,TILE,stone);
      P(sx(colx),sy(ty),3,TILE,stoneL);                 // left highlight (roundness)
      P(sx(colx)+TILE*2-4,sy(ty),4,TILE,stoneD);        // right shadow
      P(sx(colx)+TILE*2-2,sy(ty),2,TILE,stoneDD);
    }
    for(let ty=2;ty<H;ty+=4){ P(sx(colx)-1,sy(ty),TILE*2+2,3,stoneL); P(sx(colx)-1,sy(ty)+2,TILE*2+2,1,stoneDD); } // rings
    // blue banner with repeating gold crowns
    const bx=sx(colx)+TILE-3;
    for(let ty=1;ty<H;ty++){ P(bx,sy(ty),7,TILE,blue); P(bx,sy(ty),1,TILE,blueL); P(bx+6,sy(ty),1,TILE,blueD); }
    for(let ty=4;ty<H;ty+=6){ // gold crown emblem
      P(bx+1,sy(ty)+1,5,3,gold); P(bx+1,sy(ty),1,2,goldL); P(bx+3,sy(ty)-1,1,2,goldL); P(bx+5,sy(ty),1,2,goldL);
      P(bx+1,sy(ty)+4,5,1,goldD);
    }
  }
  pillar(1); pillar(W-3);

  // ── top-corner ALCOVES with a lit statue (blue niche + pale figure) ──
  function alcove(colx){
    P(sx(colx),sy(1),TILE*2,TILE*4,blueD); P(sx(colx),sy(1),TILE*2,1,blueL);
    P(sx(colx)+4,sy(1)+3,TILE*2-8,TILE*4-6,'#24356a');
    // pale statue
    const mx=sx(colx)+TILE-3;
    P(mx,sy(2),6,4,'#d9d2c4'); P(mx+1,sy(1)+3,4,3,'#eae3d6');   // head/shoulders
    P(mx,sy(3)+2,6,TILE+2,'#cfc7b8'); P(mx+2,sy(3)+2,2,TILE,'#eae3d6');
    P(sx(colx),sy(5),TILE*2,3,stoneL); P(sx(colx),sy(5)+2,TILE*2,1,stoneDD);  // niche shelf
  }
  alcove(1); alcove(W-3);

  // ── royal CARPET up the centre: gold trim + patterned runner ──
  for(let ty=5;ty<H;ty++){
    P(sx(cx-1),sy(ty),TILE*3,TILE,red); P(sx(cx-1),sy(ty),TILE*3,1,redL);
    P(sx(cx-1),sy(ty),2,TILE,gold); P(sx(cx+1)+TILE-2,sy(ty),2,TILE,gold); P(sx(cx-1)+2,sy(ty),1,TILE,goldD); P(sx(cx+1)+TILE-3,sy(ty),1,TILE,goldD);
    P(sx(cx),sy(ty)+2,TILE-4,TILE-4,redD);                                   // centre panel
    if(ty%2===0){ P(sx(cx)+TILE/2-3,sy(ty)+TILE/2-3,6,6,redL); P(sx(cx)+TILE/2-1,sy(ty)+TILE/2-1,2,2,gold); } // diamond motif
  }

  // ── the DAIS: three broadening tiers with red-carpeted steps ──
  for(let s=0;s<3;s++){ const ty=3+s; const wid=5+s*2; const half=(wid/2)|0;
    P(sx(cx-half),sy(ty),wid*TILE,TILE, s%2?'#b6a890':'#a89a82'); P(sx(cx-half),sy(ty),wid*TILE,1,'#cabfa8'); P(sx(cx-half),sy(ty)+TILE-1,wid*TILE,1,stoneDD);
    P(sx(cx-1),sy(ty),TILE*3,TILE,red); P(sx(cx-1),sy(ty),TILE*3,1,redL);     // carpet runs up the steps
    P(sx(cx-1),sy(ty),2,TILE,gold); P(sx(cx+1)+TILE-2,sy(ty),2,TILE,gold);
  }

  // ── the GRAND GOLDEN THRONE (rows 0-4) with a cross crest + red cushion ──
  const T=sx(cx);
  // central blue banner backdrop with a big gold crown (behind the throne)
  P(sx(cx-1),sy(0),TILE*3,TILE*2+6,blue); P(sx(cx-1),sy(0),TILE*3,1,blueL); P(sx(cx+1)+TILE-1,sy(0),1,TILE*2,blueD);
  P(T-2,sy(0)+3,TILE+4,5,gold); P(T-1,sy(0)+2,1,2,goldL); P(T+TILE/2-1,sy(0)+1,2,3,goldL); P(T+TILE,sy(0)+2,1,2,goldL); P(T-2,sy(0)+8,TILE+4,1,goldD); // crown
  P(T-TILE+2,sy(1)+6,TILE*3-4,TILE*3-4,goldD); P(T-TILE+2,sy(1)+6,TILE*3-4,2,gold);   // gold frame mass
  P(T-TILE+5,sy(1)+9,TILE*3-10,TILE*3-12,'#3a4e86');                                    // blue inlay back
  P(T-TILE+2,sy(1)+6,3,TILE*3-4,gold); P(T+TILE*2-5,sy(1)+6,3,TILE*3-4,gold);          // side posts
  P(T-TILE-1,sy(3)+2,4,TILE,goldD); P(T+TILE*2-3,sy(3)+2,4,TILE,goldD);                 // armrests
  P(T-TILE-1,sy(3),4,3,goldL); P(T+TILE*2-3,sy(3),4,3,goldL);                           // finials
  P(T-1,sy(2)+8,TILE+2,TILE-2,red); P(T-1,sy(2)+8,TILE+2,2,redL);                       // red cushion
  drawKingLuminar(T-4, sy(1)+10);                                                        // the King, seated
  // gold cross crowning the throne (kept within the top row so it never clips)

function throneTick(dt){
  cutscene.t+=dt; updateThroneScene(dt);

    cutscene.fade=Math.max(0, 1-cutscene.t/800);
    if(cutscene.t>=800){ cutscene.phase='walk'; cutscene.t=0; }

      cutAldric.x += (((THRONE_ENTRY.x-1)*TILE)-cutAldric.x)*0.12;   // trail just behind-left
      cutAldric.y += ((player.y+12)-cutAldric.y)*0.2; cutAldric.dir='up'; cutAldric.frame=player.frame;
    } else { player.y=targetY; player.moving=false; player.frame=0; cutscene.phase='speak'; cutscene.t=0; }

// ── UPGRADED NPC + DEMON SPRITES (knight treatment: outlines, shading, facing) ──
function _shadeHex(h,f){ const n=parseInt(h.slice(1),16);
  const r=Math.min(255,Math.round(((n>>16)&255)*f)), g=Math.min(255,Math.round(((n>>8)&255)*f)), b=Math.min(255,Math.round((n&255)*f));
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1); }
const HAT_STYLE = { soldier:'helm', guard:'helm', sailor:'cap', hunter:'hood', monk:'hood' };

  const T=performance.now()/1000, ph=(x*0.13+y*0.07);
  const bob=Math.sin(T*1.6+ph)>0.55?-1:0;                        // slow breath
  const bless=Math.sin(T*0.6+ph)>0.82;                            // occasional raised hand
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(x+TILE/2,y+TILE-1,5,2,0,0,7); ctx.fill();

function drawAldric(x,y,v){

  const CAPE='#a02030', CAPE_D='#701622', LEG='#8a8474';

  const P=(lx,ly,w,h,c)=>{ if(v.dir==='right') px(x+(16-lx-w),y+ly,w,h,c); else px(x+lx,y+ly,w,h,c); };
  ctx.fillStyle='rgba(0,0,0,.24)'; ctx.beginPath(); ctx.ellipse(x+TILE/2,y+TILE-1,5,2,0,0,7); ctx.fill();

    px(x+4,y+5+bob,8,7,TUN); px(x+4,y+5+bob,2,7,TUN_L); px(x+10,y+5+bob,2,7,TUN_D);
    px(x+3,y+5+bob,1,7,OL); px(x+12,y+5+bob,1,7,OL);

function drawVillager(x,y,v){
  if(v.aldric){ drawAldric(x,y,v); return; }
  if(v.priest){ drawPriest(x,y,v); return; }
  if(v.rgeneral){ drawRGeneral(x,y,v); return; }
  const o=OUTFITS[v.outfit]||OUTFITS.peasant;
  const small=v.outfit==='child'||v._kid;
  const sc=small?2:0;
  const f=v.moving?v.frame:0; const bob=(f===1?-1:f===3?1:0);
  const OL='#1a141c';
  const top=o.top, topL=_shadeHex(top,1.28), topD=_shadeHex(top,0.72);
  const bot=o.bottom, botD=_shadeHex(bot,0.7);
  const skin=o.skin, skinD=_shadeHex(skin,0.8);
  const hair=o.hair, hairL=_shadeHex(hair,1.3);
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(x+TILE/2,y+TILE-1,4,2,0,0,7); ctx.fill();
  const side = v.dir==='left'||v.dir==='right';
  const P=(lx,ly,w,h,c)=>{ if(v.dir==='right') px(x+(16-lx-w),y+ly,w,h,c); else px(x+lx,y+ly,w,h,c); };
  if(side){
    if(f===1){ P(4,12+bob,3,4,bot); P(4,15+bob,3,1,OL); P(8,12+bob,3,2,bot); P(8,13+bob,3,1,OL); }
    else if(f===3){ P(5,12+bob,3,2,bot); P(5,13+bob,3,1,OL); P(8,12+bob,3,4,bot); P(8,15+bob,3,1,OL); }
    else { P(5,12+bob,3,3,bot); P(5,14+bob,3,1,OL); P(8,12+bob,3,3,bot); P(8,14+bob,3,1,OL); }
    P(4,6+sc+bob,7,6-sc,top); P(4,6+sc+bob,2,6-sc,topL); P(9,6+sc+bob,2,6-sc,topD);
    P(3,6+sc+bob,1,6-sc,OL); P(11,6+sc+bob,1,6-sc,OL);
    if(o.apron) P(5,7+bob,3,5-sc,o.apron);
    P(3,7+sc+bob,2,3,top); P(3,7+sc+bob,1,3,topL);
    P(5,2+sc+bob,6,5,skin); P(9,2+sc+bob,2,5,skinD);
    P(5,2+sc+bob,6,2,hair); P(5,2+sc+bob,2,1,hairL); P(9,2+sc+bob,2,3,hair);
    P(4,2+sc+bob,1,5,OL); P(11,2+sc+bob,1,5,OL); P(5,1+sc+bob,6,1,OL);
    P(5,4+sc+bob,1,1,'#2a1c10');
    if(o.hat){ const hs=HAT_STYLE[v.outfit];
      if(hs==='hood'){ P(4,1+sc+bob,7,3,o.hat); P(4,3+sc+bob,2,3,o.hat); P(4,1+sc+bob,7,1,_shadeHex(o.hat,1.25)); }
      else { P(2,1+sc+bob,11,2,o.hat); P(2,1+sc+bob,11,1,_shadeHex(o.hat,1.25)); P(4,-1+sc+bob,7,2,o.hat); P(2,3+sc+bob,11,1,'#00000030'); } }

function resize(){
  // FIT-TO-SCREEN: the stage is locked to the exact visible viewport (handles
  // mobile URL bars via visualViewport). A comfortable uniform tile scale is
  // chosen, the tile viewport covers the screen, and any sub-tile excess is
  // cropped at the edges — the page itself never scrolls or overflows.
  const vp=window.visualViewport;
  const maxW=Math.round(vp?vp.width:window.innerWidth), maxH=Math.round(vp?vp.height:window.innerHeight);
  let s=Math.min(maxW/(15*TILE), maxH/(11*TILE));        // at least the classic 15×11 visible
  s=Math.min(4, Math.max(1.0, s));
  VIEW_TW=Math.max(10, Math.min(27, Math.ceil(maxW/(TILE*s))));
  VIEW_TH=Math.max(8,  Math.min(32, Math.ceil(maxH/(TILE*s))));
  const vw=VIEW_TW*TILE, vh=VIEW_TH*TILE;
  cv.width=vw; cv.height=vh;
  cv.style.width=Math.round(vw*s)+'px'; cv.style.height=Math.round(vh*s)+'px';
  stage.style.width=maxW+'px'; stage.style.height=maxH+'px';   // stage = screen, exactly
}
if(window.visualViewport) window.visualViewport.addEventListener('resize', ()=>resize());

// ── FLOATING JOYSTICK (touch): press anywhere on the left of the screen and a
// stick blooms under your thumb; drag to move, release to let go.
(function anchoredJoystick(){
  if(!IS_TOUCH) return;
  const joy=document.getElementById('joy'), knob=document.getElementById('joyk');
  let id=null, lastDir=null, lastFire=0; const R=30, DEAD=8, AX=72, AYOFF=110, GRAB=60;
  const clearHeld=()=>{ held.up=held.down=held.left=held.right=false; };
  const releaseRace=()=>{ if(typeof raceHold==='function'){ raceHold('UP',false); raceHold('LEFT',false); raceHold('RIGHT',false); } };
  const rest=()=>{ joy.classList.add('idle'); joy.style.display='block'; joy.style.left=AX+'px'; joy.style.top='calc(100% - '+AYOFF+'px)'; knob.style.left='50%'; knob.style.top='50%'; };
  const stop=()=>{ id=null; lastDir=null; clearHeld(); releaseRace(); rest(); };
  const anchor=()=>{ const r=stage.getBoundingClientRect(); return [r.left+AX, r.top+r.height-AYOFF]; };
  const overlayOpen=()=>!!(shopMode||intro.open||menu.open||trial.open||library.open||libShop||petB||styl||barn);
  rest();
  stage.addEventListener('touchstart', e=>{
    if(id!==null) return;
    if(place.kind==='surf'||place.kind==='boatrace') return;   // those minigames own their own input
    const t=e.changedTouches[0];
    const [ax,ay]=anchor();
    if(Math.hypot(t.clientX-ax, t.clientY-ay) > GRAB) return;   // only grab ON the stick — taps elsewhere pass through untouched
    id=t.identifier; joy.classList.remove('idle');
    e.preventDefault();
  }, {passive:false});
  stage.addEventListener('touchmove', e=>{
    if(id===null) return;
    for(const t of e.changedTouches){ if(t.identifier!==id) continue;
      const [ax,ay]=anchor();
      let dx=t.clientX-ax, dy=t.clientY-ay;
      const d=Math.hypot(dx,dy)||1, c=Math.min(d,R)/d;
      knob.style.left=(50+ (dx*c)/88*100)+'%'; knob.style.top=(50+ (dy*c)/88*100)+'%';
      const L = dx < -DEAD && Math.abs(dx) > Math.abs(dy)*0.45;
      const Rt= dx >  DEAD && Math.abs(dx) > Math.abs(dy)*0.45;
      const U = dy < -DEAD && Math.abs(dy) > Math.abs(dx)*0.45;
      const D = dy >  DEAD && Math.abs(dy) > Math.abs(dx)*0.45;
      if(overlayOpen()){
        clearHeld();
        const dir = U?'up':D?'down':L?'left':Rt?'right':null;
        const now=performance.now();
        if(dir && (dir!==lastDir || now-lastFire>270)){ dirPress(dir); lastDir=dir; lastFire=now; }
        if(!dir) lastDir=null;
      } else if(place.kind==='race'){
        // continuous steering/gallop: hold the stick → throttle/steer stays ON
        clearHeld();
        raceHold('UP', U); raceHold('LEFT', L); raceHold('RIGHT', Rt);
      } else {
        held.left=L; held.right=Rt; held.up=U; held.down=D; lastDir=null;
      }
      e.preventDefault();
    }
  }, {passive:false});
  const end=e=>{ for(const t of e.changedTouches){ if(t.identifier===id) stop(); } };
  stage.addEventListener('touchend', end); stage.addEventListener('touchcancel', end);
})();

// ── THE REGATTA: dedicated canvas pointer/touch input (its own on-canvas UI) ──
// The boat race draws all its buttons (menus + steering pads) onto the canvas.
// Steering pads support TRUE MULTI-TOUCH (throttle + steer at once): we track
// every active touch, work out which pads they cover, and set the flags each move.
// Menu buttons (dock/shop/results) fire once on touchstart.
(function regattaInput(){
  function toCanvas(clientX, clientY){
    const r=cv.getBoundingClientRect();
    return [ (clientX-r.left) * cv.width / r.width,
             (clientY-r.top)  * cv.height / r.height ];
  }
  // recompute steering from ALL currently-active touches
  function applyPads(touchList){
    const pads={ left:false, right:false, throttle:false };
    for(const t of touchList){
      const [px,py]=toCanvas(t.clientX, t.clientY);
      const pad=boatPadAt(px,py);
      if(pad) pads[pad]=true;
    }
    boatSetPads(pads);
  }
  // ── touch ──
  stage.addEventListener('touchstart', e=>{
    if(place.kind!=='boatrace') return;
    // a fresh touch may be a menu-button tap OR a steering press
    const t=e.changedTouches[0];
    const [px,py]=toCanvas(t.clientX, t.clientY);
    // only treat as a menu tap if it lands on a non-pad button
    if(boatPadAt(px,py)===null){ boatPointer(px,py,'down'); }
    applyPads(e.touches);
    e.preventDefault();
  }, {passive:false});
  stage.addEventListener('touchmove', e=>{
    if(place.kind!=='boatrace') return;
    applyPads(e.touches);
    e.preventDefault();
  }, {passive:false});
  const tend=e=>{
    if(place.kind!=='boatrace') return;
    applyPads(e.touches);   // remaining touches still down
  };
  stage.addEventListener('touchend', tend);
  stage.addEventListener('touchcancel', tend);
  // ── mouse (desktop) ──
  let mdown=false;
  cv.addEventListener('mousedown', e=>{
    if(place.kind!=='boatrace') return;
    const [px,py]=toCanvas(e.clientX, e.clientY);
    if(boatPadAt(px,py)===null){ boatPointer(px,py,'down'); }
    else { mdown=true; const pad=boatPadAt(px,py); const p={}; p[pad]=true; boatSetPads(p); }
    e.preventDefault();
  });
  cv.addEventListener('mousemove', e=>{
    if(place.kind!=='boatrace'||!mdown) return;
    const [px,py]=toCanvas(e.clientX, e.clientY);
    const pad=boatPadAt(px,py);
    boatSetPads({ left:pad==='left', right:pad==='right', throttle:pad==='throttle' });
  });
  addEventListener('mouseup', ()=>{ if(mdown){ mdown=false; boatSetPads({left:false,right:false,throttle:false}); } });
})();
// ════════════════════════════════════════════════════════════════
//  GBA-STYLE BOOT SEQUENCE — splash → title → save select
//  Runs before gameplay. Draws in a virtual 240×160 GBA space,
//  uniformly scaled + letterboxed onto the main canvas. Reuses the
//  Stormgate palette, the knight sprite, and the slot save system.
// ════════════════════════════════════════════════════════════════
const boot = { done:false, phase:'splash', t:0, cursor:0, fade:0, fin:0, fading:null, slashed:false, confirmed:false };
const BOOT_W=240, BOOT_H=160;

// ── tiny Web Audio kit (game has no audio system yet; kept self-contained) ──
let bootAC=null;
function bootAudio(){
  try{
    if(!bootAC) bootAC=new (window.AudioContext||window.webkitAudioContext)();
    if(bootAC.state==='suspended') bootAC.resume();
  }catch(e){ bootAC=null; }
  return bootAC;
}
function sfxSlash(){ // metallic slash: filtered noise sweep + a falling saw "shing"
  const ac=bootAudio(); if(!ac||ac.state!=='running') return;
  const t0=ac.currentTime;
  const len=Math.floor(ac.sampleRate*0.28);
  const buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const src=ac.createBufferSource(); src.buffer=buf;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.2;
  bp.frequency.setValueAtTime(6200,t0); bp.frequency.exponentialRampToValueAtTime(900,t0+0.26);
  const g=ac.createGain(); g.gain.setValueAtTime(0.5,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+0.28);
  src.connect(bp); bp.connect(g); g.connect(ac.destination); src.start(t0);
  const o=ac.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(1800,t0); o.frequency.exponentialRampToValueAtTime(220,t0+0.22);
  const og=ac.createGain(); og.gain.setValueAtTime(0.12,t0); og.gain.exponentialRampToValueAtTime(0.001,t0+0.22);
  o.connect(og); og.connect(ac.destination); o.start(t0); o.stop(t0+0.24);
}
function sfxBlip(up){ // menu blip (up=confirm chirp, else move tick)
  const ac=bootAudio(); if(!ac||ac.state!=='running') return;
  const t0=ac.currentTime;
  const o=ac.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(up?740:520,t0);
  if(up) o.frequency.setValueAtTime(1108,t0+0.06);
  const g=ac.createGain(); g.gain.setValueAtTime(0.08,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+(up?0.14:0.06));
  o.connect(g); g.connect(ac.destination); o.start(t0); o.stop(t0+(up?0.15:0.07));
}

// ── helpers ──
function bootShade(hex,f){ // darken a #rrggbb toward black by factor f (0..1 kept)
  const n=parseInt(hex.slice(1),16);
  const r=Math.round(((n>>16)&255)*f), g=Math.round(((n>>8)&255)*f), b=Math.round((n&255)*f);
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}
function bootEase(x){ x=Math.max(0,Math.min(1,x)); return 1-Math.pow(1-x,3); } // easeOutCubic
function bootScale(){ return Math.min(cv.width/BOOT_W, cv.height/BOOT_H); }
function bootPhase(p){ boot.fading=p; boot.fade=1; } // start a fade-out into phase p

// ── input ──
function bootA(){
  bootAudio();
  if(boot.fading) return;
  if(boot.phase==='splash'){ sfxBlip(false); bootPhase('title'); return; }
  if(boot.phase==='title'){
    if(boot.t<620){ boot.t=620; return; }  // still slashing → jump to settled, don't confirm yet
    sfxBlip(true); bootPhase('select'); return;
  }
  if(boot.phase==='select'){
    if(boot.confirmed) return;
    boot.confirmed=true; sfxBlip(true);
    bootPhase('out');
  }
}
function bootB(){
  bootAudio();
  if(boot.fading || boot.phase!=='select') return;
  sfxBlip(false); bootPhase('title');   // GBA touch: back out to the title
}
function bootDir(d){
  bootAudio();
  if(boot.fading || boot.phase!=='select') return;
  if(d==='up'){ boot.cursor=(boot.cursor+SLOTS-1)%SLOTS; sfxBlip(false); }

function bootKey(e){
  const lk=e.key.toLowerCase();
  if(lk==='arrowup'||lk==='arrowdown'||lk==='arrowleft'||lk==='arrowright'||e.key===' ') e.preventDefault();
  if(lk==='arrowup'||lk==='w') bootDir('up');
  else if(lk==='arrowdown'||lk==='s') bootDir('down');
  else if(lk==='j'||lk==='z'||e.key==='Enter'||e.key===' ') bootA();
  else if(lk==='k'||lk==='x'||e.key==='Escape') bootB();

function bootTap(clientX, clientY){
  bootAudio();
  const r=cv.getBoundingClientRect();
  const cx=(clientX-r.left)*cv.width/r.width, cy=(clientY-r.top)*cv.height/r.height;
  const s=bootScale(), ox=(cv.width-BOOT_W*s)/2, oy=(cv.height-BOOT_H*s)/2;
  const gx=(cx-ox)/s, gy=(cy-oy)/s;   // tap in 240×160 GBA space
  if(boot.phase!=='select'){ bootA(); return; }
  // select screen: tap a slot card — first tap moves the cursor, tap again confirms
  for(let i=0;i<SLOTS;i++){
    const y0=BOOT_SEL_Y0+i*BOOT_SEL_H;
    if(gx>=16&&gx<=BOOT_W-16&&gy>=y0&&gy<=y0+BOOT_SEL_H-4){
      if(boot.cursor===i) bootA();
      else { boot.cursor=i; sfxBlip(false); }
      return;
    }
  }
}

// ── finish: hand off to the real game ──
function bootFinish(){
  const n=boot.cursor+1, inf=slotInfo(n);
  boot.done=true;
  const _st=document.getElementById('stage'); if(_st) _st.classList.remove('booting');  // reveal the in-game HUD/controls now that gameplay begins
  if(inf){
    setActiveSlot(n);
    const r=loadGame();
    if(r.ok) showBanner(`📂 Slot ${n} — welcome back, <b>${player.name||'Knight'}</b>!<br><span style="font-size:6px;color:#9a8ab8">(☰ → System to save, switch, or start new profiles.)</span>`, 3000);
    else { showBanner('⚠️ Load failed — starting fresh on this slot.', 2000); newGameOnSlot(n); }
  } else {
    newGameOnSlot(n);   // fresh journey — the story intro takes over
  }
  if(!storageWorks) setTimeout(()=>showBanner('\u26a0\ufe0f <b>This device isn\u2019t keeping saves.</b><br><span style="font-size:7px">Your progress won\u2019t stick when you reopen the game. Use <b>\u2630 \u2192 System \u2192 \ud83d\udce4 Export Save Code</b> to back up your hero, and \ud83d\udce5 Import to restore.</span>', 7000), 3600);
}

// ── tick ──
function bootTick(dt){
  boot.t+=dt;
  if(boot.fading){
    boot.fade-=dt/300;
    if(boot.fade<=0){
      const p=boot.fading; boot.fading=null; boot.fade=0; boot.fin=1;
      if(p==='out'){ bootFinish(); return; }
      boot.phase=p; boot.t=0; boot.slashed=false; boot.confirmed=false;
      if(p==='select') boot.cursor=Math.min(SLOTS-1, Math.max(0, activeSlot-1));
    }
    return;
  }
  if(boot.fin>0) boot.fin=Math.max(0, boot.fin-dt/300);
  if(boot.phase==='splash' && boot.t>=1900) bootPhase('title');
  if(boot.phase==='title' && !boot.slashed && boot.t>=90){ boot.slashed=true; sfxSlash(); }
}

function drawBoot(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#05030a'; ctx.fillRect(0,0,cv.width,cv.height);    // letterbox bed
  const s=bootScale();
  ctx.save();
  ctx.translate(Math.round((cv.width-BOOT_W*s)/2), Math.round((cv.height-BOOT_H*s)/2));
  ctx.scale(s,s);
  ctx.beginPath(); ctx.rect(0,0,BOOT_W,BOOT_H); ctx.clip();
  ctx.fillStyle='#0d0208'; ctx.fillRect(0,0,BOOT_W,BOOT_H);
  if(boot.phase==='splash') drawBootSplash();
  else if(boot.phase==='title'){ drawBootTitleScene(); drawBootSword(boot.t); drawBootTitleText(boot.t); }
  else if(boot.phase==='select') drawBootSelect();
  const veil=Math.max(boot.fading!==null?1-boot.fade:0, boot.fin);
  if(veil>0){ ctx.fillStyle='rgba(5,3,10,'+veil.toFixed(3)+')'; ctx.fillRect(0,0,BOOT_W,BOOT_H); }
  ctx.restore();
  drawBootScanlines();
  ctx.globalAlpha=1;
}
// boot-only canvas taps (advance / choose a slot) — gameplay taps are untouched
cv.addEventListener('touchstart', e=>{ if(boot.done) return; e.preventDefault(); const t=e.changedTouches[0]; bootTap(t.clientX,t.clientY); }, {passive:false});
cv.addEventListener('mousedown',  e=>{ if(boot.done) return; e.preventDefault(); bootTap(e.clientX,e.clientY); });
// keep the in-game HUD/minimap/controls hidden until the boot sequence hands off
(function(){ const _st=document.getElementById('stage'); if(_st) _st.classList.add('booting'); })();

// a pristine snapshot of the just-booted state — used to start clean new games
const FRESH_STATE = JSON.stringify(buildSaveData());
function newGameOnSlot(n){
  setActiveSlot(n);
  applySaveData(JSON.parse(FRESH_STATE));   // wipe to a fresh knight (slot stays empty until saved)
  if(menu.open) toggleMenu();
  startIntro();
}
// _legacy: returning players used to auto-load here; the GBA boot sequence
// (splash → title → save select) now decides via bootFinish() instead.
// if(hasSave()){ const r=loadGame(); ... } else startIntro();
boot.cursor=Math.min(SLOTS-1, Math.max(0, activeSlot-1));   // preselect the last-played slot
// (the storage warning banner also moved into bootFinish, so it lands after the intro)
requestAnimationFrame(loop);
</script>
</body>
</html>
