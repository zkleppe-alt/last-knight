// ════════════════════════════════════════════════════════════════
//  WORLD STATE — overworld vs interior (proven door/floor system)
// ════════════════════════════════════════════════════════════════
let place = { kind:'overworld' };       // or {kind:'interior', id, floor}
let returnStack = [];
function activeGrid(){
  if(place.kind==='overworld') return { w:WORLD_W, h:WORLD_H, g:WORLD };
  if(place.kind==='dungeon') return { w:DW, h:DH, g:dungeon.grid };
  if(place.kind==='abaddon') return { w:ABADDON_W, h:ABADDON_H, g:null };
  if(place.kind==='throne') return { w:THALL.W, h:THALL.H, g:null };   // cutscene owns its own draw
  if(place.kind==='keep') return { w:THALL.W, h:THALL.H, g:keepGrid };
  const f = INTERIORS[place.id].floors[place.floor];
  return { w:f.w, h:f.h, g:f.g };
}
function tileAt(tx,ty){ const m=activeGrid(); if(!m.g) return 0; if(tx<0||ty<0||tx>=m.w||ty>=m.h) return place.kind==='dungeon'?1:5; return m.g[ty][tx]; }
// tiles each traversal ability lets you cross (beyond the normal WALK set)
const FLY_PASS  = new Set([1,3,14,15,20,21,29,32,33]);   // trees, water, fences, bushes, surf, swamp, cliffs, rock
const SWIM_PASS = new Set([3,20,21,29]);                  // water, surf, swamp water
const SAIL_TILES = new Set([3,20,21,12,32]);             // open water + harbor + bridges a boat may ride

// ── ELEVATION LAYER (sparse; everything defaults to height 0 = flat) ──
// Heights only need to be set on raised regions; the rest of the world stays flat.
// You change height between adjacent tiles only via a STAIR tile (10 up / 11 down)
// or a RAMP. Ledges (cliff tile 32) let you drop DOWN one+ level but not climb.
const ELEV = {};                                  // "x,y" -> integer height (0..n)
let elevActive = false;                            // true once any tile is raised (skips render cost when flat)
function elevAt(x,y){ const v=ELEV[x+','+y]; return v===undefined?0:v; }
function setElev(x,y,h){ if(h){ ELEV[x+','+y]=h; elevActive=true; } else delete ELEV[x+','+y]; }
function fillElev(x0,y0,x1,y1,h){ for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++) setElev(x,y,h); }
const STAIR_TILES = new Set([10,11,8]);           // stairs up/down + gate act as height connectors
// Can the player step from (fx,fy) to the adjacent tile (tx,ty)? Considers elevation.
function canStep(fx,fy,tx,ty){
  if(place.kind==='overworld' && barrierAt(tx,ty)!==-1) return false;   // dark barrier — nothing passes
  if(!walkable(tx,ty)) return false;
  if(player.driving && place.kind==='overworld'){ const t=tileAt(tx,ty);
    if(t===20) return false;   // 🛒 the wagon can't ford the shallow surf (on-foot wade only)
  }
  if(place.kind!=='overworld' || player.mounted || player.boating) return true;   // elevation only gates on-foot overworld
  const hf=elevAt(fx,fy), ht=elevAt(tx,ty);
  if(hf===ht) return true;                                       // same level — free
  const tf=tileAt(fx,fy), tt=tileAt(tx,ty);
  // a stair/ramp on either the source or destination bridges a one-level change
  const connector = STAIR_TILES.has(tf)||STAIR_TILES.has(tt);
  if(Math.abs(hf-ht)===1 && connector) return true;
  // ledges (cliff tile 32) let you DROP down (to lower ground) but never climb up
  if(ht<hf && (tt===32 || tf===32)) return true;
  return false;                                                  // unbridged height change → blocked
}
function walkable(tx,ty){
  if(place.kind==='keep'){ if(tx<0||ty<0||tx>=THALL.W||ty>=THALL.H||!keepGrid) return false; return WALK.has(keepGrid[ty][tx]); }
  if(place.kind==='abaddon'){ return tx>=0 && ty>=0 && tx<ABADDON_W && ty<ABADDON_H; }
  if(place.kind==='dungeon'){ const t=tileAt(tx,ty); if(t===1) return false; if(t===6) return false; if(t===5) return false; if(t===7) return false; if(t===9) return false; if(t===17) return false; if(t===26) return false; return true; }
  const t=tileAt(tx,ty);
  // ── SANCTUARY interiors use extra tile codes for the raised chancel; resolve
  //    them here so they never collide with overworld/dungeon meanings of the
  //    same numbers. Walkable: floor(12) pew-front handled by geometry, step(14),
  //    platform(15). Solid: wall(5), altar block(17), pulpit(18), pew(13).
  if(place.kind==='interior' && INTERIORS[place.id] && INTERIORS[place.id].theme==='sanctuary'){
    if(t===5||t===13||t===17||t===18) return false;   // walls, pews, altar, pulpit block
    if(t===9||t===12||t===14||t===15) return true;    // exit, floor, step, platform walk
    return false;
  }
  //    you cannot drive the boat onto land; step ashore with Ⓐ facing the shore.
  if(place.kind==='overworld' && player.boating){
    return SAIL_TILES.has(t);
  }
  if(WALK.has(t)) return true;
  // traversal abilities (overworld only) open up otherwise-blocked terrain
  if(place.kind==='overworld' && player.mounted){
    const ab=petAbility();
    if(ab==='fly'  && FLY_PASS.has(t))  return true;
    if(ab==='swim' && SWIM_PASS.has(t)) return true;
  }
  return false;
}
function activeNpcs(){ if(place.kind!=='interior') return []; return (INTERIORS[place.id].npcs||[]).filter(n=>n.floor===place.floor); }

// ── ELEVATION: assign heights to Crystalpeak's concentric rings ──
// The relocation pass already SCULPTED the mountain (5 grass→snow tiers, cliffs,
// zig-zag stairs, peak village). Here we just stamp the matching HEIGHT per ring so
// movement gates correctly: you climb tier→tier only via the stairs the pass laid.
function buildElevation(){
  const G=WORLD;
  const cx=153, cy=68;                 // must match the relocation pass center (C.Crystalpeak)
  const RINGS=[ [23,18],[19,15],[15,12],[11,9],[9,8] ];   // same radii as the builder
  const inE=(x,y,rx,ry)=>{ const nx=(x-cx)/rx, ny=(y-cy)/ry; return nx*nx+ny*ny<=1; };
  const ringTile=(x,y)=>{ for(let i=0;i<RINGS.length;i++){ if(inE(x,y,RINGS[i][0],RINGS[i][1])){ if(i===RINGS.length-1||!inE(x,y,RINGS[i+1][0],RINGS[i+1][1])) return i; } } return inE(x,y,RINGS[4][0],RINGS[4][1])?4:-1; };
  const R0=RINGS[0];
  // 0) clear ORPHANED wall tiles around Crystalpeak — remnants of the old (pre-ring)
  //    town wall. Building footprints keep their walls (they provide collision).
  const inBld=(x,y)=>buildings.some(b=>b.id&&b.id.startsWith('cp_')&&x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h);
  for(let y=cy-R0[1]-4;y<=cy+R0[1]+4;y++)for(let x=cx-R0[0]-6;x<=cx+R0[0]+6;x++){
    if(!G[y]||G[y][x]!==5||inBld(x,y)) continue;
    const t=ringTile(x,y);
    G[y][x] = (t>=4)?22 : (t>=0?0:0);            // snow on the peak, grass elsewhere
  }
  for(let y=cy-R0[1]-2;y<=cy+R0[1]+2;y++)for(let x=cx-R0[0]-2;x<=cx+R0[0]+2;x++){
    if(!G[y]||G[y][x]===undefined) continue;
    const t=ringTile(x,y);
    setElev(x,y, t<0?0:t);             // height == tier index (0 base … 4 peak)
  }
  // ── VILLAGE PLATEAU FLATTEN: moved to crystalpeakVillageFlatten() further down
  //    (it must run AFTER crystalpeakHealTrench, which re-stamps ring-tier heights
  //    over cols 158-159 rows 72-86 and was undoing the flatten on the east home).
  // GUARANTEE a clean climb: lay a continuous stair ribbon up the south path (cols 153-154)
  // wherever the height steps up, so every tier boundary on the main route is bridged.
  const T=(x,y)=>(G[y]&&G[y][x]!==undefined)?G[y][x]:-1;
  const put=(x,y,t)=>{ if(G[y]&&G[y][x]!==undefined) G[y][x]=t; };
  for(const x of [153,154]){
    for(let y=cy+R0[1]+2; y>=cy; y--){
      const h=elevAt(x,y), hN=elevAt(x,y-1);
      if(hN>h){ // a step up ahead — ensure BOTH tiles are walkable stairs so canStep bridges it
        if(![5,9].includes(T(x,y)))   put(x,y,10);
        if(![5,9].includes(T(x,y-1))) put(x,y-1,10);
      }
      // keep the corridor itself walkable (don't tunnel through buildings)
      if([1,33,32].includes(T(x,y))) put(x,y,2);
    }
  }
  // MIRROR the two climb columns so the flight is a clean 2-tile-wide staircase:
  // wherever one column has a stair, the other gets one on the same row (same height).
  for(let y=cy+R0[1]+2; y>=cy-2; y--){
    const a=T(153,y)===10, b=T(154,y)===10;
    if(a!==b){ const src=a?153:154, dst=a?154:153;
      if(![5,9].includes(T(dst,y))){ put(dst,y,10); setElev(dst,y,elevAt(src,y)); } }
  }

  // ── SALTMERE: a gentle coastal tier — town sits one step up; beach/surf/docks at sea level ──
  // Town body ~ y198..207 (cobble + buildings). Sand begins ~y208, surf/docks below.
  // Raise the town to height 1; everything from the sand down stays height 0 (the beach),
  // so you can freely walk onto the beach and out along the docks.
  (function saltmereTier(){
    const SX0=11, SX1=45;             // town x-span (cobble area)
    const townTop=198, townBot=207;   // raised town rows
    // cleanup: the old gen scattered decorative "rocks" as wall tiles (purple masonry)
    // and laid a tile-32 cliff row at the beach line. Walls → warm boulders (same
    // collision, better look); the old cliff row → sand (heights now gate the edge).
    const inBld=(x,y)=>buildings.some(b=>x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h);
    for(let y=193;y<=224;y++)for(let x=8;x<=47;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      if(G[y][x]===32 && y===townBot+1) G[y][x]=19;
      else if(G[y][x]===5 && !inBld(x,y)) G[y][x]=32;
    }
    // raise the town platform
    for(let y=townTop;y<=townBot;y++)for(let x=SX0;x<=SX1;x++){
      const t=T(x,y); if(t<0) continue;
      if([3,20].includes(t)) continue;          // never raise actual water
      setElev(x,y,1);
    }
    // beach + everything south stays height 0 (default) — explicitly clear in case
    for(let y=townBot+1;y<=224;y++)for(let x=SX0-1;x<=SX1+1;x++) setElev(x,y,0);
    // strip ALL old beach-descent stairs on the boundary rows, then carve ONE
    // central staircase down to the beach (a single clean flight, cols 28-29).
    for(const y of [townBot, townBot+1])for(let x=SX0-1;x<=SX1+1;x++){
      if(G[y]&&(G[y][x]===10||G[y][x]===11)) G[y][x]=(y<=townBot?6:19);
    }
    // ── THE HARBOR: open water from the docks to the southern sea ──
    // The grass strip below the surf becomes the harbor basin; the south beach
    // parts at a wide mouth so Saltmere truly opens onto the ocean. (One day,
    // ships will sail from here to the southern isles.)
    for(let y=225;y<=235;y++)for(let x=9;x<=50;x++){
      const t=G[y][x];
      if([0,1,4,7,15,18].includes(t)) G[y][x]=3;
    }
    for(let y=236;y<=237;y++)for(let x=16;x<=40;x++){        // the harbor mouth through the beach
      if(G[y][x]===19) G[y][x]=3;
    }
    for(let y=225;y<=235;y++){                                // sandy banks framing the basin
      if(G[y][8]===0) G[y][8]=19;
      if(G[y][51]===0) G[y][51]=19;
    }
    const descents=[28,29];
    // erase the orphaned path landings where the removed staircases used to meet the strip
    for(let y=townBot+1;y<=townBot+4;y++)for(const x of [15,16,17,18,37,38,39,40]){
      if(G[y]&&G[y][x]===2) G[y][x]=(y===townBot+1?19:0);
    }
    descents.forEach(x=>{
      if(![5,9].includes(T(x,townBot)))   { put(x,townBot,10);   setElev(x,townBot,1); }
      if(![5,9].includes(T(x,townBot+1))) { put(x,townBot+1,10); setElev(x,townBot+1,0); }
    });
  })();

  // ── IRONHOLD: a clean rectangular fortress on a raised stone platform ──
  // Strip the old ragged walls and rebuild one tidy curtain wall. The courtyard sits
  // one step up (height 1); the ground outside is height 0, with gate stairs N & S.
  (function ironholdFortress(){
    // final fortress bounds: right wall pushed out to x56 so it clears the chapel/inn
    // (which extend to x54) — previously x53 clipped through them.
    const WX0=14, WX1=56, WY0=52, WY1=75;       // wall rectangle (inclusive)
    const inX=(x)=>x>WX0&&x<WX1, inY=(y)=>y>WY0&&y<WY1;
    // 0) clear the leftover ragged rock (33) and stray ledges (32) around the fortress
    for(let y=WY0-6;y<=WY1+6;y++)for(let x=WX0-10;x<=WX1+6;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      if(G[y][x]===33||G[y][x]===32) G[y][x]=0;   // rock/ledge → plain grass
    }
    // 1) wipe the old wall ring (any wall on the rectangle perimeter band) to rebuild clean
    for(let y=WY0;y<=WY1;y++)for(let x=WX0;x<=WX1;x++){
      const edge = (x===WX0||x===WX1||y===WY0||y===WY1);
      if(edge && G[y]&&G[y][x]!==undefined && G[y][x]===5) G[y][x]=6;  // temporarily floor; we re-wall below
    }
    // 2) lay a crisp 1-tile curtain wall around the rectangle
    for(let x=WX0;x<=WX1;x++){ if(G[WY0])G[WY0][x]=5; if(G[WY1])G[WY1][x]=5; }
    for(let y=WY0;y<=WY1;y++){ if(G[y]){ G[y][WX0]=5; G[y][WX1]=5; } }
    // 3) gate: SOUTH only (the front, Saltmere side) — open the wall + lay road through.
    //    The north (Hearthvale-side / rear) gate is sealed; the road wraps around to the front.
    for(const gx of [32,33,34]){ if(G[WY1])G[WY1][gx]=2; }
    // 4) raise the courtyard interior to height 1 (stone platform); keep buildings on it
    for(let y=WY0;y<=WY1;y++)for(let x=WX0;x<=WX1;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      setElev(x,y,1);
    }
    // 5) gate stairs: step DOWN from the raised courtyard (h1) through the SOUTH gate to ground (h0)
    for(const gx of [32,33,34]){
      put(gx,WY1,10);   setElev(gx,WY1,1);
      put(gx,WY1+1,10); setElev(gx,WY1+1,0);
    }
    // 6) the approach road outside the south gate stays height 0 (ground)
    for(let y=WY1+2;y<=WY1+5;y++) for(const gx of [32,33,34]){ if(G[y]&&G[y][gx]!==undefined){ if(G[y][gx]!==5) G[y][gx]=2; setElev(gx,y,0);} }
  })();

  // ── ASHFIELD: kept simple — the walled town sits one gentle step down in the crater. ──
  // Raise the ASH RIM one level around the town; the town interior stays at ground (0).
  // A single north gate steps from the rim down into the town. One tier, one entrance.
  (function ashfieldCrater(){
    // town wall bounds (from the relocated layout): roughly x138..178, y136..162
    const WX0=138, WX1=178, WY0=136, WY1=162;
    const gateX=[158,159];                 // north gate columns
    // raise the ash apron that rings the town to height 1 (the crater rim)
    for(let y=WY0-7;y<=WY1+7;y++)for(let x=WX0-9;x<=WX1+4;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      const insideTown = (x>WX0 && x<WX1 && y>WY0 && y<WY1);
      if(insideTown) continue;             // town interior stays at ground level (the crater floor)
      if(G[y][x]===25){ setElev(x,y,1); }  // only the ash tiles form the raised rim
    }
    // gate stairs: step DOWN from the rim (h1) through the north gate into the town (h0)
    for(const gx of gateX){
      // the rim tile just north of the wall is h1; the gate opening descends to the town h0
      if(G[WY0-1]&&G[WY0-1][gx]!==undefined){ if(![5].includes(G[WY0-1][gx])) G[WY0-1][gx]=10; setElev(gx,WY0-1,1); }
      if(G[WY0]&&G[WY0][gx]!==undefined){ if(![5].includes(G[WY0][gx])) G[WY0][gx]=10; setElev(gx,WY0,0); }
    }
  })();

  // ── STORMGATE: the capital, kept simple — the whole walled city sits one step up. ──
  // Raise the interior to height 1 (a grand platform); the ground outside is height 0.
  // Both north gates get stairs stepping down. One tier, easy to read.
  (function stormgateCity(){
    const WX0=150, WX1=186, WY0=198, WY1=228;     // outer wall rectangle
    const gateX=[168,169, 180,181];               // the two north gates
    // raise the whole walled interior (and the wall ring) to height 1
    for(let y=WY0;y<=WY1;y++)for(let x=WX0;x<=WX1;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      setElev(x,y,1);
    }
    // gate stairs: step DOWN from the city (h1) through each north gate to the ground (h0)
    for(const gx of gateX){
      if(G[WY0]&&G[WY0][gx]!==undefined){   if(![5].includes(G[WY0][gx]))   G[WY0][gx]=10;   setElev(gx,WY0,1); }
      if(G[WY0-1]&&G[WY0-1][gx]!==undefined){ if(![5].includes(G[WY0-1][gx])) G[WY0-1][gx]=10; setElev(gx,WY0-1,0); }
    }
    // the approach roads outside the gates stay at ground level
    for(let y=WY0-6;y<WY0-1;y++) for(const gx of gateX){ if(G[y]&&G[y][gx]!==undefined && G[y][gx]!==5){ G[y][gx]=2; setElev(gx,y,0);} }
  })();
}
buildElevation();

// ════════════════════════════════════════════════════════════════
//  WORLD DRESSING — fill the empty fields so the map reads like a
//  finished game: smooth biome edges, a forest world-border, tree
//  groves, flower meadows, and ponds. Never touches roads, towns,
//  or secret approaches (3-tile safety margin around all structures).
// ════════════════════════════════════════════════════════════════
function worldDressing(){
  const G=WORLD, H=G.length, W=G[0].length;
  // deterministic per-tile random so the world is stable across loads
  const rng=(x,y,s)=>{ let n=(x*374761393+y*668265263+s*982451653)>>>0; n=((n^(n>>>13))*1274126177)>>>0; return ((n^(n>>>16))>>>0)/4294967296; };

  // 1) SMOOTH ragged biome spray-edges: lone ash/dust/rock flecks → grass (3 firm passes)
  //    (sand 19 is included only ABOVE the coast strip, so beaches stay intact)
  const SPRAY=new Set([25,27,33]);
  const sprayAt=(x,y)=>{ const t=G[y][x]; return SPRAY.has(t) || (t===19 && y<196); };
  for(let pass=0;pass<3;pass++){
    const kill=[];
    for(let y=1;y<H-20;y++)for(let x=1;x<W-1;x++){
      if(!sprayAt(x,y)) continue;
      let same=0; for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){ if(!dx&&!dy)continue; if(sprayAt(x+dx,y+dy)) same++; }
      if(same<4) kill.push([x,y]);
    }
    kill.forEach(([x,y])=>G[y][x]=0);
  }

  // 2) WORLD BORDER: a forest frame on the top/left/right edges (sea covers the south),
  //    with clearings kept around the two walk-to secrets near the edges.
  const nearWalkSecret=(x,y)=> (Math.abs(x-4)<=5&&Math.abs(y-4)<=5)||(Math.abs(x-7)<=5&&Math.abs(y-120)<=5);
  for(let y=0;y<H-16;y++)for(let x=0;x<W;x++){
    const depth=Math.min(x,y,W-1-x);
    if(depth<3 && G[y][x]===0 && !nearWalkSecret(x,y)) G[y][x]=(depth<2?1:(rng(x,y,1)<.6?1:7));
  }

  // 3) KEEP-CLEAR mask: stay ≥3 tiles from any structure (roads, walls, biomes, water…)
  //    and ≥5 from every secret, so nothing we add can block a route.
  const clear=Array.from({length:H},()=>new Uint8Array(W));
  const PLAIN=new Set([0,1,4,7,15,18]);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    if(PLAIN.has(G[y][x])) continue;
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){ const ny=y+dy,nx=x+dx; if(ny>=0&&ny<H&&nx>=0&&nx<W) clear[ny][nx]=1; }
  }
  if(typeof SECRETS!=='undefined') SECRETS.forEach(s=>{ for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){ const ny=s.y+dy,nx=s.x+dx; if(ny>=0&&ny<H&&nx>=0&&nx<W) clear[ny][nx]=1; } });

  // 4a) LARGE FOREST MASSES: big organic woodlands in the dead zones between towns —
  //     these give the map real geography. Each mass is a noisy ellipse of forest,
  //     and the keep-clear mask automatically carves road corridors through them.
  const forestMass=(cx,cy,rx,ry)=>{
    for(let dy=-ry;dy<=ry;dy++)for(let dx=-rx;dx<=rx;dx++){
      const nx=cx+dx, ny=cy+dy; if(nx<0||nx>=W||ny<0||ny>=H) continue;
      if(G[ny][nx]!==0||clear[ny][nx]) continue;
      const n=(dx/rx)**2+(dy/ry)**2;
      const edge=n>0.55;                                   // ragged organic rim
      if(n<=1 && (!edge || rng(nx,ny,7)<0.55)) G[ny][nx]= rng(nx,ny,8)<.7?1:7;
    }
  };
  forestMass(60,150,26,20);    // western wilds (between Homestead road & Thornwood)
  forestMass(110,60,22,16);    // northern woods (left of Dusthaven)
  forestMass(205,160,22,18);   // eastern reaches (below Hellgate road)
  forestMass(110,175,18,14);   // heartwood (center-south)
  forestMass(225,70,14,12);    // northeast fringe
  forestMass(35,95,14,12);     // west of Homestead

  // 4b) small TREE GROVES as accents on the remaining plains
  for(let y=4;y<H-18;y++)for(let x=4;x<W-4;x++){
    if(G[y][x]!==0||clear[y][x]||rng(x,y,2)>=0.016) continue;
    const r=2+Math.floor(rng(x,y,3)*3);
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
      const ny=y+dy,nx=x+dx; if(ny<0||ny>=H||nx<0||nx>=W) continue;
      if(G[ny][nx]!==0||clear[ny][nx]) continue;
      const d=Math.hypot(dx,dy); if(d>r) continue;
      if(rng(nx,ny,4) < (d<r*0.6?0.9:0.45)) G[ny][nx]= rng(nx,ny,5)<.75?1:7;
    }
  }

  // 5) MEADOWS: light flower + bush sprinkle on the remaining grass
  for(let y=3;y<H-18;y++)for(let x=3;x<W-3;x++){
    if(G[y][x]!==0) continue;
    const v=rng(x,y,6);
    if(v<0.014) G[y][x]=4;
    else if(v<0.018&&!clear[y][x]) G[y][x]=15;
  }

  // 6) PONDS: small lakes in the deep-empty regions, ringed with a sandy bank so
  //    they read clearly (only placed if the whole area is untouched plain ground)
  const tryPond=(cx,cy,rx,ry)=>{
    for(let dy=-ry-2;dy<=ry+2;dy++)for(let dx=-rx-2;dx<=rx+2;dx++){
      const ny=cy+dy,nx=cx+dx;
      if(ny<0||ny>=H||nx<0||nx>=W) return false;
      if(!PLAIN.has(G[ny][nx])||clear[ny][nx]) return false;
    }
    for(let dy=-ry-1;dy<=ry+1;dy++)for(let dx=-rx-1;dx<=rx+1;dx++){
      const n=(dx/(rx+1))**2+(dy/(ry+1))**2;
      if(n<=1) G[cy+dy][cx+dx]=19;                          // sandy bank
    }
    for(let dy=-ry;dy<=ry;dy++)for(let dx=-rx;dx<=rx;dx++){
      if((dx/rx)**2+(dy/ry)**2<=1) G[cy+dy][cx+dx]=3;       // water
    }
    return true;
  };
  [[70,120,6,4],[205,120,6,4],[140,90,5,4],[40,170,6,4],[230,200,5,4],[90,210,5,3],[170,40,5,3]].forEach(c=>tryPond(c[0],c[1],c[2],c[3]));
}
worldDressing();

// ── SAGE'S WOOD: a hidden forest west of the Saltmere road. An old hermit—
// Eldan the Sage—dwells deep within its maze. (His quests come in a later chapter.)
(function forestOfDisillusionment(){
  const G=WORLD;
  const hash=(x,y)=>((x*374761393+y*668265263)>>>0);
  const ENTER_Y=84, EXIT_Y=185;        // the two overworld mouths
  const ROADx=33;                       // the old corridor ran cols 33-34
  // Wall the FULL width from the western tree-line to the eastern river (~col 62)
  // with SOLID trees (tile 1 = wall) so there is no way around. Bushes are walkable,
  // so we never use them for the wall — only sparse non-blocking decor isn't placed here.
  const XL=2, XR=61;                    // river barrier sits ~col 62-66; stop just short
  for(let y=ENTER_Y; y<=EXIT_Y; y++){
    for(let x=XL; x<=XR; x++){
      if(!G[y]||G[y][x]===undefined) continue;
      const t=G[y][x];
      // preserve walls/doors/gates/water/stairs/cliffs/special/sand/beach/signs
      if([5,9,8,3,16,35,12,10,11,32,33,26,19,20,21,24,30,31].includes(t)) continue;
      const nearEnter = (y<=ENTER_Y+1 && Math.abs(x-ROADx)<=1);
      const nearExit  = (y>=EXIT_Y-1  && Math.abs(x-ROADx)<=1);
      if(nearEnter||nearExit){ G[y][x]=2; continue; }   // small clearing at each mouth
      G[y][x]=1;                                         // SOLID tree wall
    }
  }
  // NORTH mouth: hollow + short approach stub up to Ironhold's road
  G[ENTER_Y][ROADx]=35; G[ENTER_Y][ROADx+1]=1;
  for(let y=ENTER_Y-1; y>=ENTER_Y-3; y--){ if(G[y]){ G[y][ROADx]=2; G[y][ROADx+1]=2; } }
  G[ENTER_Y-1][ROADx+2]=16;
  signs[(ROADx+2)+','+(ENTER_Y-1)]="THE FOREST OF DISILLUSIONMENT\\nA fog-bound wood swallows the road south.\\nThere is no way around. Step in.";
  // SOUTH mouth: hollow + short 3-wide approach stub down to Saltmere's road
  G[EXIT_Y][ROADx]=35; G[EXIT_Y][ROADx+1]=1;
  for(let y=EXIT_Y+1; y<=EXIT_Y+3; y++){ if(G[y]){ G[y][ROADx-1]=2; G[y][ROADx]=2; G[y][ROADx+1]=2; } }
})();

// ── STORMGATE REWORK v2: the capital gets ONE grand approach. All side gates
// are sealed; Ashfield's orphan east road is erased; the surviving road wraps
// the western flank to the single SOUTH front gate, which opens directly onto
// the Royal Harbor — quay at the walls, piers in the swell, and His Majesty's
// Fleet riding at anchor. The city itself rises in two clean tiers: the lower
// town (1) and the high Citadel terrace (2) holding keep, cathedral & garrison.
(function stormgateRework(){
  const G=WORLD;
  // 1) SEAL the old north gates and clear their approach stubs
  for(const x of [168,169,180,181,182]){ G[197][x]=0; setElev(x,197,0); G[198][x]=5; }
  for(let y=164;y<=196;y++) for(const x of [180,181,182]){ if(G[y][x]===2) G[y][x]=0; }

(function crystalpeakHealTrench(){
  const G = WORLD;
  const cx=153, cy=68;
  // Same ring geometry the mountain was built with, so healed tiles match neighbours.
  const RINGS=[[23,18],[19,15],[15,12],[11,9],[9,8]];
  function inEllipse(x,y,rx,ry){ const nx=(x-cx)/rx, ny=(y-cy)/ry; return nx*nx+ny*ny<=1; }
  function ringTile(x,y){ for(let i=0;i<RINGS.length;i++){ if(inEllipse(x,y,RINGS[i][0],RINGS[i][1])){ if(i===RINGS.length-1 || !inEllipse(x,y,RINGS[i+1][0],RINGS[i+1][1])) return i; } } return inEllipse(x,y,RINGS[RINGS.length-1][0],RINGS[RINGS.length-1][1])?RINGS.length-1:-1; }
  // Restore surface tile + tier height for the old trench columns (158-159). Never touch
  // the stair columns, our new road, walls, or doors.
  const KEEP = new Set([5,9,2,10,11]);
  for(let y=72; y<=86; y++) for(const x of [158,159]){
    if(!G[y] || G[y][x]===undefined) continue;
    const t = ringTile(x,y); if(t<0) continue;          // outside mountain -> leave grass
    if(KEEP.has(G[y][x])) continue;
    let surf; if(t<=1) surf=0; else if(t===2) surf=((x*7+y*5)%6===0)?22:0; else surf=22;
    G[y][x]=surf; setElev(x,y,t);
  }
  // Rebuild cliff lips (32) + rock faces (33) over the healed gap, same rule as the
  // original build, on a small window covering the seam.
  const rim=[];
  for(let y=71;y<=87;y++) for(let x=156;x<=161;x++){
    if(!G[y]||G[y][x]===undefined) continue;
    const t=ringTile(x,y); if(t<0) continue;
    if(G[y][x]===5||G[y][x]===9) continue;
    let higherInside=false;
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){ if(ringTile(x+dx,y+dy)>t) higherInside=true; }
    if(higherInside) rim.push([x,y,t]);
  }
  for(const [x,y,t] of rim){ if(G[y]&&![5,9,2,10,11].includes(G[y][x])) G[y][x]=32; }
  for(const [x,y,t] of rim){
    for(const [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]){ const nt=ringTile(x+dx,y+dy);
      if(nt>=0 && nt<t){ const fx=x+dx, fy=y+dy; if(G[fy]&&G[fy][fx]!==undefined && ![5,9,2,10,11].includes(G[fy][fx])) G[fy][fx]=33; }
    }
  }
})();

//  THE SOUTHERN ISLES — open deep sea south of Saltmere leads to a
//  three-island archipelago, reachable only by boat. Each island
//  rises to a high peak with a clean switchback stair to the summit.
//  (Foundation pass: land, mountains, stairs. Towns/quests come later.)
// ════════════════════════════════════════════════════════════════
(function southernIsles(){
  const G=WORLD, H=WORLD_H, Wd=WORLD_W;
  const hash=(x,y)=>((x*374761393+y*668265263)>>>0);
  const put=(x,y,t)=>{ if(G[y]&&G[y][x]!==undefined) G[y][x]=t; };
  const get=(x,y)=>(G[y]&&G[y][x]!==undefined)?G[y][x]:-1;

  // 0) DEEP SEA: the southern ocean. Flood every row from the coast (239) to the
  //    new map bottom with DEEP SEA (tile 3). The new rows picked up stray
  //    grass/trees/flowers during earlier passes, so we wipe EVERYTHING here
  //    (the islands are stamped afterward and overwrite the sea where needed).
  for(let y=239;y<H;y++) for(let x=0;x<Wd;x++){ put(x,y,3); setElev(x,y,0); }
  // a thin shallows seam (tile 20, wadeable — NOT a surf spot) where the deep sea
  // meets the southern shelf, so the coast reads as a beach edge rather than a wall.
  for(let x=0;x<Wd;x++){ if(get(x,238)===3) put(x,238,20); }

  // a clear DEEP-SEA LANE south out of Saltmere's harbour (x16-40) so the
  // boat has open water to set off into.
  for(let y=234;y<=240;y++) for(let x=14;x<=42;x++){ const t=get(x,y);
    if(t!==5&&t!==9&&t!==19&&![22,32,33,34].includes(t)){ if(t!==20){ put(x,y, y>=238?20:3);} } }

  // ── ISLAND BUILDER ───────────────────────────────────────────────
  //  A stepped volcanic cone: a wide beach, then concentric elevation
  //  tiers each at least `band` tiles wide so the slope is gentle, rising
  //  to a snowy peak. A switchback stair climbs exactly one level per step.
  function island(cx, cy, R, peak, name){
    const band = Math.max(2, Math.round((R-3)/peak));   // horizontal run per tier (>=2)
    for(let y=cy-R-2;y<=cy+R+2;y++) for(let x=cx-R-2;x<=cx+R+2;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      const dx=x-cx, dy=y-cy, d=Math.sqrt(dx*dx+dy*dy*1.1);
      const jitter=((hash(x,y)%100)/100-0.5)*1.2;
      const dd=d+jitter;
      if(dd>R+1) continue;                                  // open sea
      if(dd>R-0.4){ put(x,y,20); setElev(x,y,0); continue; } // shallows (wadeable, not a surf spot)
      if(dd>R-2.4){ put(x,y,19); setElev(x,y,0); continue; } // beach
      // inland distance -> tier (0 at beach edge). each tier spans `band` tiles.
      const inland = (R-2.4) - dd;
      let tier = Math.min(peak, 1 + Math.floor(inland/band));
      // surface by tier: low = grass/woods, mid = bare rock, top 2 = snow
      let surf;
      if(tier<=1) surf=0;
      else if(tier>=peak-1) surf=22;
      else surf=33;
      put(x,y,surf); setElev(x,y,tier);
      if(tier===1 && hash(x,y)%6===0) put(x,y,1);            // sparse coastal trees
    }
    // flat snowcap at the very top
    for(let y=cy-1;y<=cy+1;y++) for(let x=cx-1;x<=cx+1;x++){ put(x,y,22); setElev(x,y,peak); }
    put(cx,cy,16); signs[cx+','+cy]=name+"\n\u2014 the summit \u2014\nThe whole realm lies before you.";

    // ── SWITCHBACK STAIR: a clean trail from the beach to the summit, climbing
    //    exactly one elevation level per step (always climbable). ──
    // find the beach row on the centre column (first sand tile south of centre)
    let beachY=cy;
    for(let yy=cy; yy<=cy+R+2; yy++){ const t=get(cx,yy); if(t===19||t===20){ beachY=yy; break; } }
    const trailLen = beachY - cy;                 // grass/rock tiles from beach to peak
    // lay a 2-wide trail with a perfectly linear 0..peak elevation ramp
    for(let k=0;k<=trailLen;k++){
      const yy=beachY-k;
      const want=Math.min(peak, Math.round(peak * k/trailLen));
      const surfT = want>=peak-1 ? 34 : 2;        // high-snow path near top, packed path below
      for(const xx of [cx,cx+1]){ put(xx,yy,surfT); setElev(xx,yy,want); }
    }
    // stairs at every +1 step
    for(let k=0;k<trailLen;k++){
      const yy=beachY-k, yN=yy-1;
      const h=elevAt(cx,yy), hN=elevAt(cx,yN);
      if(hN>h){ for(const xx of [cx,cx+1]){ put(xx,yy,10); setElev(xx,yy,h); put(xx,yN,10); setElev(xx,yN,hN); } }
    }
    // walkable snow summit (the trail tops out here)
    for(const xx of [cx,cx+1]){ put(xx,cy,22); setElev(xx,cy,peak); }
    // plank landing on the beach where boats arrive
    put(cx,beachY+1,6); put(cx+1,beachY+1,6); setElev(cx,beachY+1,0); setElev(cx+1,beachY+1,0);
  }

  // THREE islands across the southern sea. Bigger radii so the tiers are
  // wide enough to climb; centres pulled north a touch to fit the cones.
  island(40,  270, 13, 6, 'Mistral Isle');     // western — gentle green peak
  island(95,  274, 16, 9, 'Mount Tabor');      // central — the tallest, elev 9
  island(155, 270, 13, 7, 'Sunfall Atoll');    // eastern — rocky spire

  // 🏁 THE REGATTA marker — a checkered-flag buoy bobbing in the open lane just
  //    south of Saltmere's harbour. Sail up to it and press Ⓐ to enter the races.
  (function regattaMarker(){
    const rx=28, ry=236;
    if(G[ry] && (G[ry][rx]===20 || G[ry][rx]===3)){
      // ensure the buoy sits on clean deep water and isn't culled
      put(rx,ry,20); setElev(rx,ry,0);
      for(let i=decorations.length-1;i>=0;i--){ if(decorations[i].kind==='regatta') decorations.splice(i,1); }
      decorations.push({ x:rx, y:ry, kind:'regatta', w:1 });
      signs[rx+','+ry]='🏁 THE REGATTA\\nSail up and press Ⓐ to\\nenter the harbour races!';
    }
  })();
})();

(function ensureDoorAccess(){
  const G=WORLD;
  const healTile=(x,y)=>{ // pick a walkable tile matching neighbours (never 9)
    const c=[G[y+1]&&G[y+1][x], G[y]&&G[y][x-1], G[y]&&G[y][x+1]];
    for(const t of c) if(t!==undefined && WALK.has(t) && t!==9) return t;
    return 6;
  };
  buildings.forEach(b=>{
    if(!b.door) return;
    // 1) clear a stale ground-row door tile (door declared outside the footprint)
    const inFoot = b.door.x>=b.x && b.door.x<b.x+b.w && b.door.y>=b.y && b.door.y<b.y+b.h;
    if(!inFoot && G[b.door.y] && G[b.door.y][b.door.x]===9)
      G[b.door.y][b.door.x]=healTile(b.door.x,b.door.y);
    // 2) normalize the coordinate: bottom wall row, x clamped into the footprint
    b.door.x=Math.max(b.x, Math.min(b.x+b.w-1, b.door.x));
    b.door.y=b.y+b.h-1;
    const dx=b.door.x, dy=b.door.y, sy=dy+1;
    if(G[dy] && G[dy][dx]!==undefined) G[dy][dx]=9;
    if(!G[sy] || G[sy][dx]===undefined) return;
    // 3) doorstep: relocate a blocking SIGN (Stormgate cathedral case), then heal
    if(G[sy][dx]===16){
      const k=dx+','+sy;
      for(const [ox2,oy2] of [[dx-1,sy],[dx+1,sy],[dx-2,sy],[dx+2,sy]]){
        if(G[oy2] && (G[oy2][ox2]===0||G[oy2][ox2]===6||G[oy2][ox2]===2)){
          G[oy2][ox2]=16; signs[ox2+','+oy2]=signs[k]; break; } }
      delete signs[k]; G[sy][dx]=healTile(dx,sy);
    }
    if(!WALK.has(G[sy][dx]) || G[sy][dx]===9) G[sy][dx]=healTile(dx,sy);
    // 4) elevation: the door shares a height with its doorstep (9 is not a stair)
    if(elevAt(dx,sy)!==elevAt(dx,dy)) setElev(dx,dy, elevAt(dx,sy));
    // 5) a barrier dome's ring must never sit ON a door or doorstep (the ring
    //    ellipse can graze a wall row — e.g. Saltmere chapel). Domes seal roads,
    //    not thresholds; the town's outer ring still seals the town itself.
    BARRIERS.forEach(bar=>{ if(bar){ bar.set.delete(dx+','+dy); bar.set.delete(dx+','+sy); } });
    // 6) the doorstep must connect outward (unchanged from the old pass)
    const nb=[[dx,sy+1],[dx-1,sy],[dx+1,sy]];
    if(!nb.some(([qx,qy])=>G[qy]&&WALK.has(G[qy][qx])&&G[qy][qx]!==9)){
      const qy=sy+1;
      if(G[qy]&&G[qy][dx]!==undefined){ G[qy][dx]=G[sy][dx]; setElev(dx,qy, elevAt(dx,sy)); }
    }
  });
})();

const banner = document.getElementById('banner'); let bannerT=0;
function showBanner(html, ms=1500){ banner.innerHTML=html; banner.style.display='block'; bannerT=ms; }

// ── DIALOGUE: tap-to-advance conversation box (never auto-dismisses) ──
// Story/NPC dialogue waits for Ⓐ / tap so it can't vanish before you're ready.
// (Transient notifications — gold, level-ups, quest pings — still use showBanner.)
const dialogue = { open:false, lines:[], idx:0, onDone:null };
function say(lines, onDone){
  dialogue.lines = Array.isArray(lines) ? lines.slice() : [lines];
  dialogue.idx = 0; dialogue.onDone = onDone||null; dialogue.open = dialogue.lines.length>0;
  if(!dialogue.open){ if(onDone) onDone(); return; }
  renderDialogue();
}
function renderDialogue(){
  const item = dialogue.lines[dialogue.idx] || '';
  let speaker='', text='';
  if(item && typeof item==='object'){ speaker=item.speaker||''; text=item.text||''; }
  else text=String(item);
  const more = dialogue.idx < dialogue.lines.length-1;
  banner.innerHTML = (speaker?`<b style="color:#ffe9a8">${speaker}</b><br>`:'')
    + `<span style="font-size:7px">${text}</span>`
    + `<br><span style="font-size:6px;color:#8fd0ff;letter-spacing:.5px">${more?'\u25b6 Ⓐ / tap':'Ⓐ / tap to close'}</span>`;
  banner.style.display='block'; banner.style.pointerEvents='auto'; bannerT=999999;
}
function advanceDialogue(){
  if(!dialogue.open) return;
  dialogue.idx++;
  if(dialogue.idx >= dialogue.lines.length) closeDialogue();
  else renderDialogue();
}
function closeDialogue(){
  const cb=dialogue.onDone; dialogue.open=false; dialogue.onDone=null; dialogue.lines=[];
  banner.style.display='none'; banner.style.pointerEvents='none'; bannerT=0;
  if(cb) cb();
}
// helper: format an NPC's name + one or more lines into dialogue entries
function sayAs(name, lines, onDone){
  const arr=(Array.isArray(lines)?lines:[lines]).map(t=>({speaker:name, text:t}));
  say(arr, onDone);
}

function enterDoor(b){
  // the Homestead barn opens the Stables swap menu instead of a plain interior
  if(b.id==='home_barn'){ openBarn(); return; }
  // chapels lead into the multi-floor dungeon instead of a plain interior
  if(CHAPEL_TOWN[b.id]!==undefined){ enterChapel(b); return; }
  // Abaddon's Throne → the final battle (gated behind cleansing all 10 towns)
  if(b.id==='hg_keep'){ enterAbaddon(b); return; }
  // Stormgate Keep → the grand throne hall (walkable, the King enthroned)
  if(b.id==='sg_keep'){ enterKeep(b); return; }
  returnStack.push({ x:b.door.x*TILE, y:(b.door.y+1)*TILE, dir:'down' });
  place={kind:'interior', id:b.interior, floor:0};
  const f=INTERIORS[b.interior].floors[0];
  // spawn on the interior's exit door, nudged up one tile
  let sx=4, sy=f.h-2; for(let y=0;y<f.h;y++)for(let x=0;x<f.w;x++) if(f.g[y][x]===9){ sx=x; sy=y-1; }
  player.x=sx*TILE; player.y=sy*TILE; player.dir='up';
  showBanner(`🚪 ${INTERIORS[b.interior].name}`, 1000);
}

function checkTransitions(){
  if(player.driving) return false;   // 🛒 the wagon never enters buildings, caves, or the deep wood
  const t=tileAt(...pkey().split(',').map(Number));
  if(place.kind==='overworld'){
    if(t===9){ const b=buildings.find(b=>b.door && (b.door.x+','+b.door.y)===pkey()); if(b){ enterDoor(b); return true; } }
    if(t===35){ const px=Math.floor((player.x+TILE/2)/TILE), py=Math.floor((player.y+TILE/2)/TILE);
        if(px===196 && py===7){ enterMonkCave(); }
        else if(px===33 && py===84){ enterDisillusionment('north'); }   // Forest of Disillusionment — north mouth
        else if(px===33 && py===185){ enterDisillusionment('south'); }  // Forest of Disillusionment — south mouth
        else { enterForest(); } return true; }
  } else if(place.kind==='dungeon'){
    // once the player moves off the entrance tile, clear the just-entered guard
    if(dungeon._justEntered && t!==8) dungeon._justEntered=false;
    // HIDDEN SAGE HOLLOW inside the Forest of Disillusionment → Eldan's Glade
    if(t===35 && dungeon.disillusion && !dungeon.inGlade){ enterSageGlade(); return true; }
    if(t===2){ // stairs up — town/cave dungeons require clearing demons first; the forest does NOT
      if(!dungeon.disillusion && !dungeonAllClear()){ if(!dungeon._warned){ showBanner('⚠️ Clear all demons first!', 1200); dungeon._warned=true; setTimeout(()=>dungeon._warned=false,1400); } return false; }

      if(dungeon.disillusion){ exitDisillusionment(dungeon.entryMouth==='south' ? 'north' : 'south'); return true; }

    if(t===11){ changeFloor(place.floor-1); return true; }
  }

}

function doAttack(){
  if(decorPlace.active){ decorConfirm(); return; }

  if(shopMode){ shopMode.idx=(shopMode.idx+1)%shopMode.items.length; showShop(); return; }

  // advance the combo counter (resets if the window lapsed)
  if(player.comboT<=0) player.combo=0;
  player.combo++; player.comboT=48;   // ~0.8s window to chain the next hit
  if(player.combo>=3){ player.combo=0; doSpecial(); return; }   // 3rd hit = signature special
  const type = player.weaponType==='heavy' ? 'heavy' : 'light';   // auto from equipped weapon
  const w = SWING[type];
  player.swing = w.windup + w.dur; player.swingDir = player.dir; player.swingType = type; player.swingHit=false;
  setTimeout(()=>resolveSwing(type), w.windup*16);
}
function resolveSwing(type){
  if(place.kind!=="overworld" && place.kind!=="dungeon" && place.kind!=="abaddon") return;
  const w = SWING[type];
  const fv = player.dir==='up'?[0,-1] : player.dir==='down'?[0,1] : player.dir==='left'?[-1,0] : [1,0];
  const reach = TILE*w.reach + TILE*0.9;
  const cosCut = Math.cos(w.half);
  const kcx=player.x+TILE/2, kcy=player.y+TILE/2;
  let anyHit=false;
  demons.forEach(d=>{ if(!d.alive)return;
    const dcx=d.x+TILE/2, dcy=d.y+TILE/2;
    let vx=dcx-kcx, vy=dcy-kcy; const dist=Math.hypot(vx,vy);
    if(dist>reach) return;
    if(dist>0.001){ const dot=(vx*fv[0]+vy*fv[1])/dist; if(dot<cosCut) return; }
    let dmg = Math.max(1, Math.round(player.atk * w.mult) + (Math.random()*5|0) - 2);
    const isCrit = Math.random() < player.crit;
    if(isCrit) dmg = Math.round(dmg*1.8);
    dmg = bossHitGate(d, dmg);
    if(dmg<0){ d.hurt=3; anyHit=true; return; }                // turned aside — no damage
    d.hp -= dmg; d.hurt=8; anyHit=true;
    d.pop={ dmg, crit:isCrit, t:26 };
    const m=dist||1; d.kdx=vx/m*w.knock; d.kdy=vy/m*w.knock; d.knock=8;
    if(d.hp<=0){ d.alive=false; d.dying=18; gainXp(d.xp||5); const g=Math.max(1,Math.round((2+d.level)*player.goldMult)); gold+=g; if(d.dungeon) onDungeonDemonKilled(d); else onHuntKill(d); }
  });
  // also strike boss-summoned adds
  if(place.kind==='dungeon' && dungeon.adds.length){ dungeon.adds.forEach(a=>{ if(!a.alive)return;
    const acx=a.x+TILE/2, acy=a.y+TILE/2; let vx=acx-kcx, vy=acy-kcy; const dist=Math.hypot(vx,vy);
    if(dist>reach) return; if(dist>0.001){ const dot=(vx*fv[0]+vy*fv[1])/dist; if(dot<cosCut) return; }
    let dmg=Math.max(1,Math.round(player.atk*w.mult)); a.hp-=dmg; a.hurt=8; anyHit=true; a.pop={dmg,crit:false,t:24};
    if(a.hp<=0){ a.alive=false; } }); }
  // ABADDON + his shades
  if(place.kind==='abaddon' && abaddon.active){
    const bcx=abaddon.x+TILE/2, bcy=abaddon.y+TILE/2; let vx=bcx-kcx, vy=bcy-kcy; const dist=Math.hypot(vx,vy);
    if(dist<=reach && (dist<0.001 || (vx*fv[0]+vy*fv[1])/dist>=cosCut)){
      if(abaddon.shield){ abaddon.hurt=4; showBanner('🛡️ Shielded! Destroy the shades first!', 900); }
      else { let dmg=Math.max(1,Math.round(player.atk*w.mult)+(Math.random()*5|0)); const crit=Math.random()<player.crit; if(crit)dmg=Math.round(dmg*1.8);
        abaddon.hp=Math.max(0,abaddon.hp-dmg); abaddon.hurt=8; anyHit=true; abaddon.pop={dmg,crit,t:26};
        if(abaddon.hp<=0) winAbaddon(); }
    }
    abaddon.adds.forEach(a=>{ if(!a.alive)return; const acx=a.x+TILE/2,acy=a.y+TILE/2; let ax=acx-kcx, ay=acy-kcy; const ad=Math.hypot(ax,ay);
      if(ad>reach) return; if(ad>0.001){ const dot=(ax*fv[0]+ay*fv[1])/ad; if(dot<cosCut) return; }
      let dmg=Math.max(1,Math.round(player.atk*w.mult)); a.hp-=dmg; a.hurt=8; anyHit=true; a.pop={dmg,crit:false,t:24};
      if(a.hp<=0){ a.alive=false; } }); }
  if(anyHit) player.comboT=48;   // landing a hit keeps the combo alive
}
// ── SIGNATURE SPECIAL — the 3rd combo strike unleashes the weapon's signature ──
function doSpecial(){
  if(place.kind!=="overworld" && place.kind!=="dungeon" && place.kind!=="abaddon") return;
  const wId = player.equip ? player.equip.weapon : 'none_w';
  const sp = SPECIALS[(EQUIP[wId]&&EQUIP[wId].special)||'flurry'];
  player.swing = 22; player.swingDir = player.dir; player.swingType='special';
  player.specialFx = 22; player.specialColor = sp.color;
  const kcx=player.x+TILE/2, kcy=player.y+TILE/2;
  const reach = TILE*sp.radius;
  const fv = player.dir==='up'?[0,-1] : player.dir==='down'?[0,1] : player.dir==='left'?[-1,0] : [1,0];
  setTimeout(()=>{
    if(place.kind!=="overworld" && place.kind!=="dungeon" && place.kind!=="abaddon") return;
    let hits=0;
    demons.forEach(d=>{ if(!d.alive)return;
      const dcx=d.x+TILE/2, dcy=d.y+TILE/2; let vx=dcx-kcx, vy=dcy-kcy; const dist=Math.hypot(vx,vy);
      if(dist>reach) return;
      if(!sp.spin){ // forward-only specials must be in the facing arc
        if(dist>0.001){ const dot=(vx*fv[0]+vy*fv[1])/dist; if(dot<Math.cos(Math.PI*0.5)) return; }
      }
      let dmg=Math.max(1, Math.round(player.atk*sp.mult)+(Math.random()*6|0)-2);
      const isCrit=Math.random()<player.crit+0.1; if(isCrit) dmg=Math.round(dmg*1.8);
      dmg=bossHitGate(d, dmg);
      if(dmg<0){ d.hurt=3; return; }
      d.hp-=dmg; d.hurt=10; d.pop={dmg,crit:isCrit,t:30}; hits++;
      const m=dist||1; d.kdx=vx/m*sp.knock; d.kdy=vy/m*sp.knock; d.knock=10;
      if(d.hp<=0){ d.alive=false; d.dying=18; gainXp(d.xp||5); const g=Math.max(1,Math.round((2+d.level)*player.goldMult)); gold+=g; if(d.dungeon) onDungeonDemonKilled(d); else onHuntKill(d); }
    });
    if(sp.heal>0 && player.hp<player.maxHp){ player.hp=Math.min(player.maxHp, player.hp+Math.round(sp.heal*player.healMult)); }
    // specials also strike Abaddon + his shades (and dungeon adds)
    if(place.kind==='abaddon' && abaddon.active){
      const bcx=abaddon.x+TILE/2, bcy=abaddon.y+TILE/2; const bd=Math.hypot(bcx-kcx,bcy-kcy);
      if(bd<=reach && !abaddon.shield){ let dmg=Math.max(1,Math.round(player.atk*sp.mult)); const crit=Math.random()<player.crit+0.1; if(crit)dmg=Math.round(dmg*1.8);
        abaddon.hp=Math.max(0,abaddon.hp-dmg); abaddon.hurt=10; abaddon.pop={dmg,crit,t:30}; hits++; if(abaddon.hp<=0) winAbaddon(); }
      abaddon.adds.forEach(a=>{ if(!a.alive)return; if(Math.hypot(a.x+TILE/2-kcx,a.y+TILE/2-kcy)>reach)return; a.hp-=Math.max(1,Math.round(player.atk*sp.mult)); a.hurt=8; hits++; if(a.hp<=0)a.alive=false; });
    }
    if(place.kind==='dungeon'){ dungeon.adds.forEach(a=>{ if(!a.alive)return; if(Math.hypot(a.x+TILE/2-kcx,a.y+TILE/2-kcy)>reach)return; a.hp-=Math.max(1,Math.round(player.atk*sp.mult)); a.hurt=8; hits++; if(a.hp<=0)a.alive=false; }); }
    showBanner(`✦ ${sp.name}!`+(hits?` <span style="font-size:7px">×${hits}</span>`:''), 700);
  }, 100);
}

function gainXp(amount){
  player.xp += amount;
  let leveled=false, gained=0;
  while(player.xp >= player.xpNext){
    player.xp -= player.xpNext; player.level++; leveled=true; gained++;
    player.skillPoints++;                                  // 1 skill point per level
    player.xpNext = xpForLevel(player.level);
  }
  if(leveled){ recalcStats(); player.hp = player.maxHp;     // recompute stats, full heal on level
    showBanner(`⭐ LEVEL UP! You are now level ${player.level}.<br><span style="font-size:7px">❤ Max HP ${player.maxHp} · ⚔ Attack ${player.atk} · 🛡 Def ${player.def}</span><br><span style="font-size:7px;color:#ffe04a">+${gained} skill point${gained>1?'s':''}! Press ☰ / M to spend.</span>`, 2600);
    checkPetEvolve();

  else showBanner(`⚔️ Demon vanquished! +${amount} XP`, 800);
