<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d0208'/%3E%3Crect x='5' y='1' width='6' height='1' fill='%23f2c14e'/%3E%3Crect x='5' y='0' width='1' height='1' fill='%23f2c14e'/%3E%3Crect x='7' y='0' width='1' height='1' fill='%23f2c14e'/%3E%3Crect x='10' y='0' width='1' height='1' fill='%23f2c14e'/%3E%3Crect x='4' y='3' width='8' height='8' fill='%23dfe4ee'/%3E%3Crect x='4' y='3' width='2' height='8' fill='%23f7f9fd'/%3E%3Crect x='10' y='3' width='2' height='8' fill='%23aab2c0'/%3E%3Crect x='6' y='6' width='4' height='1' fill='%231a1410'/%3E%3Crect x='5' y='11' width='6' height='2' fill='%23b6bccb'/%3E%3Crect x='7' y='13' width='2' height='3' fill='%23c0392e'/%3E%3C/svg%3E">
<title>Kingdom's Last Knight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body { height:100%; background:#0d0208; font-family:'Press Start 2P',monospace; overflow:hidden; }
  html,body { overflow:hidden; height:100%; position:fixed; inset:0; width:100%; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; background:radial-gradient(circle at 50% 35%, #181226, #0a0512 70%); }
  #stage { position:relative; background:#0d0208; overflow:hidden; touch-action:none; }
  #cv { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:block; image-rendering:pixelated; }
  canvas { image-rendering:pixelated; }
  /* HUD */
  /* during the GBA boot sequence, keep the in-game HUD/controls off-screen */
  #stage.booting #hud, #stage.booting #minimap, #stage.booting #menuBtn,
  #stage.booting #joy, #stage.booting #mountBtn, #stage.booting #wagonBtn,
  #stage.booting #controls, #stage.booting #legend, #stage.booting #banner { display:none !important; }
  #hud { position:absolute; top:7px; left:7px; right:7px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; z-index:10; }
  #minimap { position:absolute; top:42px; right:7px; width:96px; height:96px; border:2px solid rgba(250,204,21,.6); border-radius:4px; background:rgba(10,8,16,.72); image-rendering:pixelated; z-index:11; pointer-events:none; }
  .tag { background:rgba(13,2,8,.82); border:2px solid #6b4ea0; color:#e6dbff; font-size:7px; padding:5px 8px; line-height:1.5; border-radius:3px; }
  #hpwrap { margin-top:5px; width:96px; height:9px; background:#2a1a2a; border:1px solid #6b4ea0; border-radius:2px; overflow:hidden; }
  #hpbar { height:100%; width:100%; background:linear-gradient(90deg,#e0556a,#ff8a5c); transition:width .2s; }
  /* banner */
  #banner { position:absolute; bottom:138px; left:50%; transform:translateX(-50%); background:rgba(10,4,14,.9); border:2px solid #facc15; color:#facc15; font-size:8px; padding:9px 13px; border-radius:5px; z-index:30; text-align:center; line-height:1.8; display:none; max-width:70%; pointer-events:none; }
  /* controls */
  #controls { position:absolute; bottom:9px; left:0; right:0; display:flex; justify-content:flex-end; align-items:flex-end; padding:0 13px; z-index:20; }
  #dpad { display:none; }
  #joy { position:absolute; width:88px; height:88px; border-radius:50%; border:2px solid rgba(150,118,212,.55); background:rgba(44,30,76,.34); display:none; z-index:21; pointer-events:none; transform:translate(-50%,-50%); }
  #joy.idle { opacity:.26; }
  #joyk { position:absolute; left:50%; top:50%; width:38px; height:38px; border-radius:50%; background:rgba(150,118,212,.78); border:2px solid #c0a8f0; transform:translate(-50%,-50%); }
  @keyframes pbshake { 25%{transform:translateX(3px)} 75%{transform:translateX(-3px)} }
  .db { background:rgba(58,42,90,.62); border:2px solid rgba(107,78,160,.75); border-radius:5px; color:#d9c7ff; font-size:13px; display:flex; align-items:center; justify-content:center; touch-action:none; }
  .db:active { background:#6b4ea0; }
  .db.empty { background:none; border:none; }
  #abtns { display:grid; grid-template-columns:repeat(2, 48px); grid-template-rows:48px 48px; gap:7px; align-items:center; justify-items:center; }
  .ab { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; border:2px solid rgba(255,160,180,.5); }
  .ab:active { filter:brightness(1.6); }
  #btnB { grid-column:1; grid-row:2; background:rgba(122,36,64,.78); color:#ffd0d8; }
  #btnA { grid-column:2; grid-row:1; background:rgba(122,36,64,.78); color:#ffd0d8; }
  #atk { background:rgba(224,85,106,.16); border:2px solid #e0556a; color:#ff9aa8; }
  #atk:active { background:rgba(224,85,106,.4); }
  #amsg { font-size:6px; color:#7a6a9a; text-align:center; margin-top:5px; line-height:1.7; }
  .legend { position:absolute; bottom:12px; left:12px; background:rgba(10,4,14,.78); border:1px solid #3a2a5a; color:#9a8ab8; font-size:6px; padding:4px 6px; line-height:1.8; border-radius:2px; z-index:10; pointer-events:none; }
  #gamemenu { position:absolute; inset:0; background:rgba(8,4,14,.95); z-index:40; display:none; flex-direction:column; padding:10px; overflow:hidden; }
  #saveio { position:absolute; inset:0; background:rgba(6,3,12,.97); z-index:60; display:none; flex-direction:column; padding:14px; box-sizing:border-box; }
  #saveio.open { display:flex; }
  #saveio h3 { color:#ffe04a; font-size:12px; margin:2px 0 6px; }
  #saveio p { color:#cfc8dc; font-size:9px; line-height:1.7; margin:0 0 8px; }
  #saveio textarea { flex:1; width:100%; box-sizing:border-box; background:#140a1e; color:#b8ffcf; border:1px solid #5a4a7a; border-radius:6px; font-size:10px; font-family:monospace; padding:8px; resize:none; word-break:break-all; }
  #saveio .sio-btns { display:flex; gap:8px; margin-top:10px; }
  #saveio button { flex:1; padding:11px; font-size:11px; border-radius:7px; border:2px solid #7a5a9a; background:#2a1840; color:#fff; cursor:pointer; }
  #saveio button.primary { border-color:#5aa06a; background:#1e3a26; color:#b8ffcf; }
  #saveio .sio-msg { color:#7ad07a; font-size:9px; margin-top:6px; min-height:12px; text-align:center; }
  #gamemenu.open { display:flex; }
  .gm-tabs { display:flex; gap:4px; margin-bottom:8px; flex:0 0 auto; margin-right:34px; }
  .gm-close { position:absolute; top:8px; right:8px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; background:rgba(122,36,64,.85); border:2px solid #e0556a; border-radius:6px; color:#ffd0d8; font-size:11px; z-index:6; cursor:pointer; }
  .gm-close:active { background:#e0556a; }
  .gm-tab { flex:1; text-align:center; font-size:8px; padding:6px 2px; border:1px solid #3a2a5a; border-radius:3px; color:#9a8ab8; background:rgba(30,20,46,.6); }
  .gm-tab.sel { background:#e0556a; color:#fff; border-color:#e0556a; }
  .gm-body { flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; min-height:0; }
  .gm-hint { flex:0 0 auto; }
  .gm-stat { display:flex; justify-content:space-between; font-size:9px; padding:4px 6px; border-bottom:1px solid #2a1f3e; color:#cbb8e0; }
  .gm-stat b { color:#fff; }
  .gm-sectitle { font-size:8px; color:#f5a623; letter-spacing:1px; margin:8px 0 4px; text-transform:uppercase; }
  .gm-branch { margin-bottom:8px; }
  .gm-node { display:flex; align-items:center; gap:6px; font-size:8px; padding:5px 6px; border:1px solid #2a1f3e; border-radius:3px; margin-bottom:3px; color:#9a8ab8; }
  .gm-node.owned { border-color:#3a8a4e; color:#bfe0c8; background:rgba(40,90,60,.25); }
  .gm-node.cur { border-color:#e0556a; background:rgba(224,85,106,.25); color:#fff; }
  .gm-node.locked { opacity:.45; }
  .gm-node .nm { flex:1; }
  .gm-node .ds { font-size:7px; color:#8a7aa8; }
  .gm-item { display:flex; align-items:center; gap:6px; font-size:8px; padding:5px 6px; border:1px solid #2a1f3e; border-radius:3px; margin-bottom:3px; color:#cbb8e0; }
  .gm-item.cur { border-color:#e0556a; background:rgba(224,85,106,.25); color:#fff; }
  .gm-item.equipped { border-color:#5a9ae0; }
  .gm-hint { font-size:7px; color:#7a6a9a; text-align:center; margin-top:8px; line-height:1.8; }
  #menuBtn { position:absolute; bottom:16px; left:50%; transform:translateX(-50%) rotate(-8deg); z-index:21; background:rgba(90,74,122,.82); border:2px solid #8a7ab0; color:#e2d6ff; font-size:6px; letter-spacing:2px; width:62px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; }
  #menuBtn:active { background:#8a7ab0; }
  #mountBtn { position:absolute; top:7px; right:110px; z-index:11; background:rgba(30,20,46,.85); border:1px solid #7a5a9a; color:#fff; font-size:13px; width:30px; height:26px; border-radius:5px; display:none; align-items:center; justify-content:center; }
  #wagonBtn { position:absolute; top:7px; right:146px; z-index:11; background:rgba(30,20,46,.85); border:1px solid #7a5a9a; color:#fff; font-size:13px; width:30px; height:26px; border-radius:5px; display:none; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="c"></canvas>
    <div id="hud">
      <div>
        <div class="tag" id="loc">Hearthvale</div>
        <div id="hpwrap"><div id="hpbar"></div></div>
      </div>
      <div class="tag" id="hint" style="text-align:right">Lv 1 · ❤ 100</div>
    </div>
    <canvas id="minimap" width="96" height="96"></canvas>
    <div id="menuBtn">START</div>
    <div id="joy"><div id="joyk"></div></div>
    <div id="mountBtn">🐎</div>
    <div id="wagonBtn">🛒</div>
    <div class="legend" id="legend">Ⓐ attack · talk · open　Ⓑ dash　⚔ demons roam the roads</div>
    <div id="banner"></div>
    <div id="gamemenu"></div>
    <div id="saveio">
      <h3 id="sioTitle">Save Code</h3>
      <p id="sioHelp"></p>
      <textarea id="sioText" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
      <div class="sio-msg" id="sioMsg"></div>
      <div class="sio-btns" id="sioBtns"></div>
    </div>
    <div id="controls">
      <div id="dpad">
        <div class="db empty"></div><div class="db" data-d="up">▲</div><div class="db empty"></div>
        <div class="db" data-d="left">◀</div><div class="db empty"></div><div class="db" data-d="right">▶</div>
        <div class="db empty"></div><div class="db" data-d="down">▼</div><div class="db empty"></div>
      </div>
      <div id="abtns">
        <div class="ab" id="btnB">B</div>
        <div class="ab" id="btnA">A</div>
      </div>
    </div>
  </div>
</div>
<script>
// ════════════════════════════════════════════════════════════════
//  KINGDOM'S LAST KNIGHT — PLANAR EDITION (foundation build)
//  This is a fresh standalone game. The original screen-based game is
//  untouched. We grow this one town-at-a-time.
// ════════════════════════════════════════════════════════════════
const TILE = 16; let VIEW_TW = 15, VIEW_TH = 11;   // viewport in tiles — recomputed in resize() to fill the screen
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const stage = document.getElementById('stage');

// ── TILE LEGEND ──────────────────────────────────────────────
// 0 meadow grass    1 tree (wall)       2 dirt path        3 water (wall)
// 4 flowers (walk)  5 generic wall      6 cobble (walk)    7 forest grass (walk)
// 8 town gate(walk) 9 DOOR (enter)     10 stairs up       11 stairs down
// 12 wood floor    13 rug              14 fence (wall)    15 bush (wall)
// 16 sign (wall)   17 well (wall)      18 reserved-empty (walk, future content)
// 19 sand (walk)   20 shallow surf (walk, wadeable)  21 SURF SPOT (walk, reserved minigame)
// 22 snow (walk)   23 ice (walk, slippery-look)      24 HOT SPRING (walk, HEALS you)
// 25 ash ground(walk) 26 lava (wall, glowing)         27 cracked earth (walk)
// 28 bog ground(walk) 29 swamp water (wall, dark)      30 mist patch (walk, hazy)
// 31 tilled soil (walk, plantable — farming hooks next session)
// 32 cliff ledge (wall — a step-up rock face, snow-capped)  33 mountain rock (wall, bare)
// 34 high-snow path (walk — the switchback trail up the mountain)
const WALK = new Set([0,2,4,6,7,8,9,10,11,12,13,18,19,20,21,22,23,24,25,27,28,30,31,34,35]);  // 20=shallow surf is wadeable (walk) AND a sail tile (boats ride it)

// Buildings are drawn as faked-3D objects ANCHORED to a footprint of solid
// wall tiles, with a walkable DOOR tile in front. The renderer paints roof+
// face+shadow on top of the base grid.
// A building: {x,y (top-left footprint), w,h (footprint tiles), style, door:{x,y}}
// style in: 'cottage','keep','chapel','shop','inn','house','tower'

// ── HELPERS for map building ─────────────────────────────────
function makeGrid(w,h,fill){ return Array.from({length:h},()=>Array(w).fill(fill)); }
function rect(g,x0,y0,x1,y1,v){ for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++) if(g[y]&&g[y][x]!==undefined)g[y][x]=v; }
function blob(g,cx,cy,r,v){ for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){ if(g[y]&&g[y][x]!==undefined && (x-cx)**2+(y-cy)**2<=r*r) g[y][x]=v; } }
// stamp a building footprint as walls (5) and carve its door (9)
function stampBuilding(g,b){ rect(g,b.x,b.y,b.x+b.w-1,b.y+b.h-1,5); if(b.door) g[b.door.y][b.door.x]=9; }

// ════════════════════════════════════════════════════════════════
//  THE WORLD — one continuous planar map.
//  Built region by region from NORTH (Hearthvale) southward.
//  Right now: Hearthvale + the start of Meadow Road. More towns appended later.
// ════════════════════════════════════════════════════════════════
let WORLD_W = 140, WORLD_H = 150;   // (rebuilt to grid below; grows to 250x250)
const buildings = [];               // all 3D buildings, with their interiors
const signs = {};                   // "x,y" -> text
const RACE_SPOTS = [];               // 🐎 King's Tourney booth tiles (capital + barn); face + Ⓐ to ride
const encounterZones = [];          // {x0,y0,x1,y1, level} soft-gate demon zones
const decorations = [];             // themed props: {x,y,kind,w} drawn over tiles
const villagers = [];               // overworld townsfolk: {x,y,outfit,lines,homeX,homeY,t,...}
// ── FARMING / FISHING / ECONOMY STATE ──
const FARM_PLOTS = [];              // [x,y] tilled-soil tiles you can plant on
const crops = {};                   // "x,y" -> { stage:0..3, plantedAt:ms }
const CROP_GROW_MS = 18000;         // ms per growth stage
const FISH_SPOTS = {};              // "x,y" -> fishing-zone key (e.g. 'sea','oasis','forest','pond')
let fishing = null;                 // active cast: { phase, t, biteAt, fx, fy, zone }
// goods catalog: each item has a display name, emoji, and sell value (gold)
const GOODS = {
  wheat:      { name:'Wheat',          emoji:'🌾', value:4 },
  perch:      { name:'Pond Perch',     emoji:'🐟', value:3 },
  trout:      { name:'Forest Trout',   emoji:'🐟', value:6 },
  oasisCarp:  { name:'Oasis Carp',     emoji:'🐠', value:12 },
  seabass:    { name:'Sea Bass',       emoji:'🐟', value:8 },
  kingfish:   { name:'Kingfish',       emoji:'🐠', value:20 },
  goldenFish: { name:'Golden Fish',    emoji:'🪙', value:0 },   // Eldan's quest catch — not for selling
};
// which fish each zone can yield: [itemKey, weight] (higher weight = more common)
const FISH_ZONES = {
  pond:   [['perch',8],['trout',2]],
  forest: [['trout',7],['perch',3]],
  oasis:  [['oasisCarp',6],['perch',4]],
  sea:    [['seabass',7],['kingfish',2],['perch',1]],
};
const inventory = { wheat:0, perch:0, trout:0, oasisCarp:0, seabass:0, kingfish:0, goldenFish:0, sacredScroll:0 };
// ── ELDAN'S QUESTS (the Sage of the wood) ──
// each quest: 'unstarted' -> 'active' -> 'done'
const quests = { goldenFish:'unstarted', kindness:'unstarted' };
let gold = 0;
let SELL_SPOT = null;               // "x,y" tile of the farm stand (face it to sell)
// ── SHOPS (spend gold) ──
// item keys that can also be planted as seeds carry a 'seed' field -> crop produce
const SHOP_ITEMS = {
  wheatSeed: { name:'Wheat Seeds',  emoji:'🌱', price:2,  note:'plant for wheat' },
  potion:    { name:'Healing Potion',emoji:'🧪', price:15, note:'restores 40 HP' },
  bread:     { name:'Loaf of Bread', emoji:'🍞', price:6,  note:'restores 15 HP' },
  // gear (bought once → added to your equipment; equip from the ☰ menu)
  shortsword:{ name:'Short Sword',  emoji:'🗡', price:30,  note:'light · +6 atk', gear:'shortsword' },
  leather:   { name:'Leather Armor',emoji:'🟫', price:35,  note:'+5 def',        gear:'leather' },
  ironsword: { name:'Iron Sword',   emoji:'⚔', price:80,  note:'light · +11 atk',gear:'ironsword' },
  warhammer: { name:'War Hammer',   emoji:'🔨', price:110, note:'heavy · +18 atk',gear:'warhammer' },
  chainmail: { name:'Chainmail',    emoji:'⛓', price:120, note:'+11 def +10 hp', gear:'chainmail' },
  lantern:   { name:"Forester's Lantern", emoji:'🏮', price:90, note:'lifts the fog of the deep wood', lamp:true },
};
inventory.wheatSeed = 0; inventory.potion = 0; inventory.bread = 0;

// ── PET GEAR: each village's shop crafts ONE unique piece for companions.
//   collar = offense · charm = guard. Bought once, equipped from the Pet tab.
const PET_GEAR = {
  hearthCollar:{ town:0, slot:'collar', name:'Hearth Collar',      emoji:'🦴', price:60,  note:'pet +2 atk · stitched by Hearthvale weavers',            bonus:{atk:2} },
  thornCharm:  { town:3, slot:'charm',  name:'Thornwood Charm',    emoji:'🌿', price:160, note:'pet +3 def +6 hp · cut from the deep wood',              bonus:{def:3,maxHp:6} },
  duneCollar:  { town:4, slot:'collar', name:'Dune-Runner Collar', emoji:'🏜', price:260, note:'pet +5 atk +3% crit · Dusthaven leather',                bonus:{atk:5,crit:0.03} },
  crystalCharm:{ town:5, slot:'charm',  name:'Crystal Charm',      emoji:'💎', price:380, note:'pet +6 def +10 hp · Crystalpeak-cut',                    bonus:{def:6,maxHp:10} },
  emberCollar: { town:6, slot:'collar', name:'Ember Collar',       emoji:'🔥', price:520, note:'pet +8 atk +5% crit · forged in Ashfield',               bonus:{atk:8,crit:0.05} },
  royalCharm:  { town:7, slot:'charm',  name:'Royal Navy Charm',   emoji:'⚓', price:700, note:'pet +8 def +18 hp +4% crit · the Admiralty\'s finest',   bonus:{def:8,maxHp:18,crit:0.04} },
  shadowCollar:{ town:8, slot:'collar', name:'Shadowveil Collar',  emoji:'🌙', price:900, note:'pet +12 atk +8% crit · woven from dusk itself',          bonus:{atk:12,crit:0.08} },
};
const SHOP_TOWN = { shop:0, tw_shop:3, dh_shop:4, cp_shop:5, af_shop:6, sg_shop:7, sh_shop:8 };
function shopItem(key){ return SHOP_ITEMS[key] || PET_GEAR[key]; }
let shopMode = null;                // { items:[keys], idx } when a shop menu is open

// place a decoration; if solid, stamp wall tiles under its footprint (w x w)
function addDecor(x,y,kind,solid,w){ w=w||1; decorations.push({x,y,kind,w});
  if(solid) for(let dy=0;dy<w;dy++)for(let dx=0;dx<w;dx++){ if(WORLD_READY) WORLD[y+dy][x+dx]=5; else pendingSolid.push([x+dx,y+dy]); } }
// place a wandering villager who mills around their start point
function addVillager(x,y,outfit,lines){ villagers.push({ x:x*TILE, y:y*TILE, hx:x, hy:y, outfit, lines:lines||["..."],
  dir:'down', t:Math.random()*120, moving:false, frame:0, ftick:0, wait:0, tx:x, ty:y }); }
let WORLD_READY=false; const pendingSolid=[];


let WORLD = (function(){
  const g = makeGrid(WORLD_W, WORLD_H, 0);   // base meadow

  // ───────── HEARTHVALE (rows ~2..20) — the complete model town ─────────
  // cozy walled hometown: cobble square, central FOUNTAIN, full building set,
  // themed harvest/hearth decorations, and villagers in warm peasant clothing.
  rect(g, 4, 2, 35, 20, 0);            // village ground (grass)
  for(let x=3;x<=36;x++){ g[1][x]=14; }              // north fence
  for(let y=1;y<=20;y++){ g[y][3]=14; g[y][36]=14; } // side fences
  for(let x=3;x<=36;x++){ if(x<18||x>20) g[21][x]=14; } // south fence w/ gate gap
  g[21][18]=8; g[21][19]=8; g[21][20]=8;             // south GATE -> road
  // cobble town square (central plaza)
  rect(g, 13, 8, 26, 16, 6);
  // paths radiating to each building door
  rect(g, 9, 9, 13, 9, 6); rect(g, 26, 9, 31, 9, 6);     // to cottage / chapel
  rect(g, 9, 15, 13, 15, 6); rect(g, 26, 15, 31, 15, 6); // to shop / inn

      for(let i=0;i<RINGS.length;i++){ if(inEllipse(x,y,RINGS[i][0],RINGS[i][1])) {
        if(i===RINGS.length-1 || !inEllipse(x,y,RINGS[i+1][0],RINGS[i+1][1])) return i;
      } }
      return inEllipse(x,y,RINGS[RINGS.length-1][0],RINGS[RINGS.length-1][1])?RINGS.length-1:-1;
    }
    // 1) lay each tier's SURFACE: lush grass on the lower slopes, transitioning to
    //    snow at the top (matching the reference: green terraces, snowy peak).
    const R0=RINGS[0];
    for(let y=cy-R0[1]-1;y<=cy+R0[1]+1;y++)for(let x=cx-R0[0]-1;x<=cx+R0[0]+1;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      const t=ringTile(x,y); if(t<0) continue;
      if(G[y][x]===5||G[y][x]===9) continue;
      // tier 0-1 grass, tier 2 grass with a little snow dusting, tier 3-4 snow
      if(t<=1) G[y][x]=0;                       // green grass slopes
      else if(t===2) G[y][x]=((x*7+y*5)%6===0)?22:0;  // patchy snow on the middle ring
      else G[y][x]=22;                          // snow up high
    }
    // 2) CLIFFS — a crisp 2-tile drop at each tier boundary: the OUTER edge of the
    //    drop is a grass/snow-capped lip (tile 32), the row below is the rock face (33).
    //    A tile is a "rim" if it's in tier t and the neighbor just OUTWARD is tier t-1.
    const rimTop=[], rockFace=[];
    for(let y=cy-R0[1]-1;y<=cy+R0[1]+1;y++)for(let x=cx-R0[0]-1;x<=cx+R0[0]+1;x++){
      if(!G[y]||G[y][x]===undefined) continue;
      const t=ringTile(x,y); if(t<0) continue;
      if(G[y][x]===5||G[y][x]===9) continue;
      // is this the inner-upper edge (a higher tile sits just inside/above)?
      let higherInside=false, lowerOutside=false;
      for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){ const nt=ringTile(x+dx,y+dy); if(nt>t) higherInside=true; if(nt<t&&nt>=0) lowerOutside=true; }
      if(higherInside) rimTop.push([x,y,t]);     // top lip of a cliff (just below a higher tier)
    }
    // the rock face: the lip tile becomes capped stone; the tile just outward becomes rock
    for(const [x,y,t] of rimTop){
      if(G[y]&&G[y][x]!==5&&G[y][x]!==9) G[y][x]=32;     // snow/grass-capped cliff lip
    }
    // give each cliff lip a rock face on its downhill side (toward lower tier)
    for(const [x,y,t] of rimTop){
      for(const [dx,dy] of [[0,1],[0,-1],[1,0],[-1,0]]){ const nt=ringTile(x+dx,y+dy);
        if(nt>=0 && nt<t){ const fx=x+dx, fy=y+dy; if(G[fy]&&G[fy][fx]!==undefined && G[fy][fx]!==5 && G[fy][fx]!==9) G[fy][fx]=33; }
      }
    }
    // 3) STAIRS connecting tiers — alternate sides so you wind up the mountain.
    //    For each boundary between tier i and i+1, punch a 1-wide stair gap.
    const stairAngles=[Math.PI/2, -Math.PI/2*0.0, Math.PI, 0, Math.PI/2]; // S, S, W, E, S-ish
    function punchStair(i, ang){
      // walk from just inside ring i+1 outward to ring i along angle, laying stairs(10)
      const rOut=RINGS[i], rIn=RINGS[i+1];
      for(let r=0.6; r<=1.25; r+=0.06){
        const x=Math.round(cx + Math.cos(ang)*rIn[0]*r);
        const y=Math.round(cy + Math.sin(ang)*rIn[1]*r);
        if(G[y]&&G[y][x]!==undefined && G[y][x]!==5 && G[y][x]!==9) G[y][x]=10;   // stairs up
        // widen by one for a 2-tile stair
        const x2=x+(Math.abs(Math.cos(ang))>0.5?0:1), y2=y+(Math.abs(Math.cos(ang))>0.5?1:0);
        if(G[y2]&&G[y2][x2]!==undefined && G[y2][x2]!==5 && G[y2][x2]!==9 && G[y2][x2]===33) G[y2][x2]=10;
      }
    }
    // stair side per tier-gap: ALL on the SOUTH face, so the climb is one clean
    // straight switchback up the front of the mountain (simpler than zig-zagging sides).
    const sides=[Math.PI/2, Math.PI/2, Math.PI/2, Math.PI/2];   // S, S, S, S
    for(let i=0;i<RINGS.length-1;i++) punchStair(i, sides[i]);
    // 4) tier dressing: pines on the green lower slopes, ice flecks on the snowy top
    for(let y=cy-R0[1];y<=cy+R0[1];y++)for(let x=cx-R0[0];x<=cx+R0[0];x++){
      if(!G[y]) continue; const t=ringTile(x,y); const v=G[y][x];
      if(v!==0 && v!==22) continue;                          // only dress open surface
      if(t===0 && v===0 && ((x*13+y*7)%7===0)) G[y][x]=1;     // pines on base slope
      else if(t===1 && v===0 && ((x*11+y*5)%11===0)) G[y][x]=1; // sparse pines outer ring
      else if(t===2 && v===0 && ((x*5+y*9)%13===0)) G[y][x]=4;  // wildflowers on middle ring
      else if(t>=3 && v===22 && ((x*7+y*11)%12===0)) G[y][x]=23; // ice flecks near the top
    }
    // 5) BASE ENTRANCE: connect the south road up to the mountain foot — the ONE way in.
    for(let y=82;y>=cy+R0[1]-1;y--){ if(G[y]&&G[y][cx]!==undefined && G[y][cx]!==5){ G[y][cx]=2; if(G[y][cx+1]!==undefined&&G[y][cx+1]!==5)G[y][cx+1]=2; } }
    // 6) HOT SPRING crowns the peak (placed after, in the dedicated spring block)
    // 7) PEAK VILLAGE: clear the whole summit area to clean snow (wiping any old
    //    building footprints + stray cliffs), then arrange the 5 buildings tidily.
    const peakR=RINGS[RINGS.length-1];
    const clearR=[peakR[0]+2, peakR[1]+2];   // clear a bit beyond the plateau
    for(let y=cy-clearR[1];y<=cy+clearR[1];y++)for(let x=cx-clearR[0];x<=cx+clearR[0];x++){
      if(G[y]&&G[y][x]!==undefined && inEllipse(x,y,clearR[0],clearR[1])) G[y][x]=22;  // wipe to snow
    }
    const peakBuildings=[
      ['cp_chapel', cx-2, cy-6, 4,3],   // cathedral, north of spring
      ['cp_shop',   cx-8, cy-1, 3,3],   // far west
      ['cp_inn',    cx+5, cy-1, 3,3],   // far east
      ['cp_home1',  cx-8, cy+4, 3,2],   // SW

    ];
    for(const [id,bx,by,bw,bh] of peakBuildings){

      b.x=bx; b.y=by; b.w=bw; b.h=bh;
      for(let yy=by;yy<=by+bh-1;yy++)for(let xx=bx;xx<=bx+bw-1;xx++){ if(G[yy]&&G[yy][xx]!==undefined) G[yy][xx]=5; }
      const dx=bx+(bw>>1), dy=by+bh-1;
      b.door={x:dx,y:dy};
      if(G[dy]&&G[dy][dx]!==undefined) G[dy][dx]=9;
      if(G[dy+1]&&G[dy+1][dx]!==undefined && G[dy+1][dx]!==5) G[dy+1][dx]=22;
    }
    // move any Crystalpeak villagers onto safe plateau tiles (some old spots are now walls)
    const safeSpots=[[cx,cy+2],[cx-3,cy+1],[cx+3,cy+1],[cx-1,cy+3],[cx+1,cy+3]];

    for(const v of villagers){ const vtx=Math.floor((v.x+8)/16), vty=Math.floor((v.y+8)/16);
      if(vtx>=cx-RINGS[0][0]&&vtx<=cx+RINGS[0][0]&&vty>=cy-RINGS[0][1]&&vty<=cy+RINGS[0][1]){
        const [sx,sy]=safeSpots[si%safeSpots.length]; si++;
        v.x=sx*TILE; v.y=sy*TILE; v.homeX=v.x; v.homeY=v.y;

    }
  }

  {

function surfResults(){
  const g=surf; g.phase='results';

    gold += g.tier.gold; gainXp(g.tier.xp); if(g.tier.sp) player.skillPoints += g.tier.sp;

function updateSurf(dt){
  const g=surf; if(!g) return;
  const t=performance.now();

  if(g.phase==='drop'){
    g.waveLife+=dt;

      g.airT+=dt;
      if(g.airT>=700){ g.inAir=false; g.surferY=0.3; surfAdd(40, SURF_TRICKS.land); }
    } else {
      const sp=0.0011*dt;
      if(held.up) g.surferY-=sp;
      if(held.down) g.surferY+=sp;
      if(held.left) g.surferX-=sp*1.1;
      if(held.right) g.surferX+=sp*1.1;
      if(g.cutFlash>0){ g.cutFlash-=dt; g.surferX+=g.dir*0.0016*dt; }
      else g.surferX+=g.dir*0.00018*dt;
      g.surferX=Math.max(0.06,Math.min(0.94,g.surferX));
      g.surferY=Math.max(0.05,Math.min(0.92,g.surferY));

      const inPocket = g.surferY<0.34 && g.surferX<0.5;
      const tubeOpen = g.barrelOpen>0.35;
      const was=g.tucked;
      g.tucked = tubeOpen && inPocket;
      if(g.tucked){
        g.tuckT+=dt;
        if(!g.barrelScored && g.tuckT>250){ g.barrelScored=true; g.combo+=1; g.barrelsMade+=1; surfAdd(150+g.combo*20, SURF_TRICKS.barrel); }
        if(Math.random()<0.06) surfAdd(3);
      } else {
        if(was && g.barrelScored && g.tuckT>250) surfAdd(60, 'MADE IT OUT!');
        g.tuckT=0; g.barrelScored=false;
      }
      if(g.surferY<0.3 && Math.random()<0.04) surfAdd(2);
    }
    if(Math.random()<0.5) g.foam.push({x:g.surferX, y:g.surferY, vx:-g.dir*(0.4+Math.random()), life:1});

    g.fadeT+=dt;

      if(g.wavesRidden>=SURF_WAVES_PER_SESSION) surfResults();
      else g.phase='lineup';
    }

}

    ctx.beginPath(); ctx.moveTo(0,-14*s); ctx.lineTo(8*s,0); ctx.lineTo(-8*s,0); ctx.closePath(); ctx.fill();
    ctx.restore();

  global.boat = null;

  function openBoatRace(opts) {
    opts = opts || {};

    var seen = {};
    STARTERS.concat(inv.owned || []).forEach(function(id){ if(!seen[id]){ seen[id]=1; owned.push(id); } });
    global.boat = {
      screen: "dock",
      // economy: we track spent/won against KLK gold; goldAvail mirrors live spendable gold
      goldStart: (typeof opts.gold==="number") ? opts.gold : 200,
      goldAvail: (typeof opts.gold==="number") ? opts.gold : 200,
      goldWon: 0,
      goldSpent: 0,
      owned: owned,
      equipped: Object.assign({}, DEFAULT_EQUIP, inv.equipped || {}),
      course: HARBORS[inv.course] ? inv.course : "saltmere",
      difficulty: DIFFICULTY[inv.difficulty] ? inv.difficulty : "rough",
      result: null,
      toast: null, toastT: 0,
      shopSlot: "hull",
      // sub-states for sea + race built lazily
      sea: null, race: null,
      // pointer hitboxes registered each draw: {x,y,w,h,fn}
      hits: [],

    };
  }

  function exportInv(){
    var b = global.boat;
    return { owned: b.owned.slice(), equipped: Object.assign({}, b.equipped), difficulty: b.difficulty, course: b.course };
  }
  function leaveDock(){
    var b = global.boat;
    var delta = b.goldWon - b.goldSpent; // winnings minus spend
    var payload = { goldDelta: delta, inv: exportInv() };
    var cb = onCloseCb; global.boat = null; onCloseCb = null;
    cb(payload);
  }
  function flash(msg){ var b=global.boat; b.toast=msg; b.toastT=1800; }

  function buy(item){
    var b=global.boat;
    if (b.owned.indexOf(item.id)>=0) return;
    if (item.source==="race"){ flash("Win this in a race."); return; }
    if (b.goldAvail < item.cost){ flash("Not enough gold."); return; }
    b.goldAvail -= item.cost;
    b.goldSpent += item.cost;
    b.owned.push(item.id);
    flash("Bought "+item.name+".");
  }
  function equip(item){
    var b=global.boat;
    if (b.owned.indexOf(item.id)<0) return;
    b.equipped[item.slot] = item.id;
  }

  // ===================================================================
  //  RACE SUB-STATE
  // ===================================================================
  function makeBuoys(total){
    var arr=[];
    for (var d=300; d<total; d += 260 + Math.random()*180){
      arr.push({ dist:d, x:(Math.random()*1.4-0.7), hit:false });
    }
    return arr;
  }
  function startRace(){
    var b=global.boat, HARBOR=HARBORS[b.course], stats=deriveStats(b.equipped);
    var total = HARBOR.length * HARBOR.laps;
    var D = DIFFICULTY[b.difficulty] || DIFFICULTY.rough;
    var tierBump = ((HARBOR.tier||1)-1)*0.018;
    var rivals=[];
    var RIVALS=3;
    for (var i=0;i<RIVALS;i++){
      var bs = stats.speed * (D.lo + tierBump + i*D.step + Math.random()*0.03);
      rivals.push({ x:(i-1)*0.5+0.25, dist:0, speed:bs, baseSpeed:bs,
        color: PAL.rival[i % PAL.rival.length], finished:false, place:0, lap:1 });
    }
    b.race = {
      phase:"count", count:3, countT:0,
      stats:stats, harbor:HARBOR,
      player:{ x:0, dist:0, speed:stats.speed*0.78, lean:0, finished:false, place:0, livePlace:1,
               lap:1, splits:[], lastSplit:0, bumpFlash:0 },
      rivals:rivals, buoys:makeBuoys(total), finishOrder:[],
      total:total, lapLen:HARBOR.length, laps:HARBOR.laps,
      path:buildTrackPath(HARBOR.length, HARBOR.curve),
      t:0, RIVALS:RIVALS,
      keys:{ left:false, right:false, throttle:false }
    };
    b.screen="race";
  }

  function endRace(){
    var b=global.boat, R=b.race, HARBOR=R.harbor;
    var rem = R.rivals.filter(function(r){ return !r.finished; }).sort(function(a,c){ return c.dist-a.dist; });
    for (var i=0;i<rem.length;i++){ rem[i].finished=true; R.finishOrder.push(rem[i]); rem[i].place=R.finishOrder.length; }
    var place = R.player.place;
    var time = Math.round(R.t*10)/10;
    var D = DIFFICULTY[b.difficulty] || DIFFICULTY.rough;
    var tierMul = 1 + ((HARBOR.tier||1)-1)*0.45;
    var baseGold = [0,150,90,45][Math.min(place,3)] || 0;
    var gold = Math.round(baseGold * D.goldMul * tierMul);
    var unlocked = null;
    if (place===1){
      var pool = (HARBOR.reward||[]).filter(function(id){ return b.owned.indexOf(id)<0; });
      if (pool.length){ unlocked = pool[0]; b.owned.push(unlocked); }
    }
    b.goldWon += gold; b.goldAvail += gold;
    b.result = { completed:true, place:place, time:time, gold:gold, splits:R.player.splits||[], laps:R.laps, unlocked:unlocked };
    b.screen="results";
    b.race=null;
  }

  function raceStep(dt){
    var b=global.boat, R=b.race; if(!R) return;
    var stats=R.stats, HARBOR=R.harbor;
    if (R.phase==="count"){
      R.countT += dt;
      if (R.countT>=0.75){ R.countT=0; R.count--; if(R.count<=0) R.phase="racing"; }
      return;
    }
    if (R.phase!=="racing") return;
    R.t += dt;
    var p=R.player, k=R.keys;
    var steer=0;
    if (k.left) steer-=1;
    if (k.right) steer+=1;
    var boosting = k.throttle;
    p.x = clamp(p.x + steer*stats.handling*dt, -1.15, 1.15);
    p.lean += ((steer*0.32) - p.lean) * Math.min(1, dt*8);
    if (HARBOR.wind>0) p.x = clamp(p.x + HARBOR.wind*0.25*dt, -1.15, 1.15);
    var curve = curveAt(p.dist, HARBOR.curve);
    var speedFrac = p.speed / Math.max(1, stats.speed);
    p.x = clamp(p.x - curve*speedFrac*0.85*dt, -1.3, 1.3);
    R.curveNow = curve;
    var target = stats.speed * (boosting ? 1.0 : 0.88);
    p.speed += (target - p.speed) * Math.min(1, dt*(stats.accel/60));
    p.dist += p.speed*dt;
    if (p.bumpFlash>0) p.bumpFlash -= dt;
    if (Math.abs(p.x)>1.15){ p.speed*=0.985; if(p.bumpFlash<=0) p.bumpFlash=0.12; }
    var curLap = Math.min(R.laps, Math.floor(p.dist/R.lapLen)+1);
    if (curLap>p.lap && !p.finished){
      var split = Math.round((R.t - p.lastSplit)*100)/100;
      p.splits.push(split); p.lastSplit=R.t; p.lap=curLap;
    }
    var i;
    for (i=0;i<R.buoys.length;i++){
      var bu=R.buoys[i];
      if (!bu.hit && Math.abs(bu.dist-p.dist)<16 && Math.abs(bu.x-p.x)<0.22){
        bu.hit=true; p.speed*=0.5; p.bumpFlash=0.3; p.lean += (bu.x>p.x?-0.1:0.1);
      }
    }
    for (i=0;i<R.rivals.length;i++){
      var r=R.rivals[i]; if(r.finished) continue;
      var lead = r.dist - p.dist;
      var band = clamp(1 - lead/1200, 0.92, 1.03);
      r.speed += (r.baseSpeed*band - r.speed) * Math.min(1, dt*1.5);
      r.dist += r.speed*dt;
      r.x = clamp(r.x + Math.sin(R.t*0.8 + r.dist*0.01)*0.2*dt, -1.0, 1.0);
      r.lap = Math.min(R.laps, Math.floor(r.dist/R.lapLen)+1);
      var dDist = r.dist - p.dist, dLane = r.x - p.x;
      if (Math.abs(dDist)<22 && Math.abs(dLane)<0.32){
        var push = (0.34 - Math.abs(dLane))*2.2;
        var dir = dLane>=0 ? -1 : 1;
        p.x = clamp(p.x + dir*push*dt*6, -1.15, 1.15);
        r.x = clamp(r.x - dir*push*dt*6, -1.0, 1.0);
        p.speed*=0.985; r.speed*=0.985;
        if (p.bumpFlash<=0) p.bumpFlash=0.18;
        p.lean += dir*0.04;
      }
      if (r.dist>=R.total && !r.finished){ r.finished=true; R.finishOrder.push(r); r.place=R.finishOrder.length; }
    }
    for (var a=0;a<R.rivals.length;a++){
      for (var c=a+1;c<R.rivals.length;c++){
        var r1=R.rivals[a], r2=R.rivals[c];
        if (r1.finished||r2.finished) continue;
        if (Math.abs(r1.dist-r2.dist)<20 && Math.abs(r1.x-r2.x)<0.30){
          var dl=r2.x-r1.x, pu=(0.32-Math.abs(dl))*1.8, di=dl>=0?1:-1;
          r2.x=clamp(r2.x+di*pu*dt*6,-1.0,1.0); r1.x=clamp(r1.x-di*pu*dt*6,-1.0,1.0);
          r1.speed*=0.99; r2.speed*=0.99;
        }
      }
    }
    if (p.dist>=R.total && !p.finished){
      p.splits.push(Math.round((R.t-p.lastSplit)*100)/100);
      p.finished=true; R.finishOrder.push(p); p.place=R.finishOrder.length;
      endRace(); return;
    }
    var ahead=0;
    for (i=0;i<R.rivals.length;i++){ var rr=R.rivals[i]; if((rr.finished?rr.dist+99999:rr.dist)>p.dist) ahead++; }
    p.livePlace = ahead+1;
  }

  function startSea(){
    var b=global.boat;
    var start = HARBORS[b.course] || HARBORS.saltmere;
    b.sea = {
      boat:{ x:start.pos.x, y:start.pos.y+90, heading:-Math.PI/2, speed:0 },
      t:0, wake:[], nearDock:null,
      keys:{ left:false, right:false, throttle:false }
    };
    b.screen="sea";
  }
  function seaStep(dt){
    var b=global.boat, S=b.sea; if(!S) return;
    S.t += dt;
    var bt=S.boat, k=S.keys, steer=0;
    if (k.left) steer-=1; if (k.right) steer+=1;
    var thrust = k.throttle ? 1 : 0;
    bt.heading += steer*2.2*dt;
    var target = thrust*220;
    bt.speed += (target-bt.speed)*Math.min(1,dt*2);
    bt.x += Math.cos(bt.heading)*bt.speed*dt;
    bt.y += Math.sin(bt.heading)*bt.speed*dt;
    bt.x = clamp(bt.x,20,980); bt.y = clamp(bt.y,20,980);
    if (bt.speed>20 && Math.random()<0.4) S.wake.push({ x:bt.x-Math.cos(bt.heading)*12, y:bt.y-Math.sin(bt.heading)*12, life:0.7 });
    for (var i=0;i<S.wake.length;i++) S.wake[i].life -= dt;
    S.wake = S.wake.filter(function(w){ return w.life>0; });
    var found=null, DOCK_R=70;
    for (i=0;i<HARBOR_ORDER.length;i++){ var h=HARBORS[HARBOR_ORDER[i]];
      if (Math.hypot(h.pos.x-bt.x, h.pos.y-bt.y)<DOCK_R){ found=HARBOR_ORDER[i]; break; } }
    S.nearDock = found;
  }

  function boatTick(dt){
    var b=global.boat; if(!b) return;

    else if (b.screen==="sea") seaStep(dt);
  }

  function drawSea(ctx){
    var b=global.boat, S=b.sea; if(!S){ startSea(); S=b.sea; }
    // square sea area, centered
    var SZ = Math.min(BW, BH-150);
    var ox=(BW-SZ)/2, oy=70;
    var sc = SZ/1000;
    var X=function(x){ return ox + x*sc; }, Y=function(y){ return oy + y*sc; };

    var g=ctx.createLinearGradient(0,oy,0,oy+SZ);
    g.addColorStop(0,"#0e2c44"); g.addColorStop(1,"#071a2b");
    ctx.fillStyle=g; ctx.fillRect(ox,oy,SZ,SZ);
    ctx.strokeStyle=PAL.goldDark; ctx.lineWidth=3; ctx.strokeRect(ox,oy,SZ,SZ);
    ctx.save(); ctx.beginPath(); ctx.rect(ox,oy,SZ,SZ); ctx.clip();
    ctx.strokeStyle="rgba(207,238,238,0.06)"; ctx.lineWidth=2;
    for (var i=0;i<18;i++){ var yy=((i*60 + S.t*12)%1080)-40; ctx.beginPath(); ctx.moveTo(ox,Y(yy)); ctx.lineTo(ox+SZ,Y(yy)); ctx.stroke(); }

    for (i=0;i<HARBOR_ORDER.length;i++){
      var h=HARBORS[HARBOR_ORDER[i]], hx=X(h.pos.x), hy=Y(h.pos.y);

  function drawSeaRaceControls(ctx, keys){

  function drawCtl(ctx, x, y, sz, glyph, active, pad){

  function drawRaceScreen(ctx){
    var b=global.boat, R=b.race; if(!R) return;
    var W=BW, H=BH-110; var oy=0; // race fills most of the canvas; leave room for controls
    var horizon = H*0.42;
    var T = R.harbor.tint;
    var _bc=(drawBoat._c=drawBoat._c||{});             // gradient cache per harbor/canvas
    if(_bc.T!==T || _bc.h!==horizon || _bc.H!==H){ _bc.T=T; _bc.h=horizon; _bc.H=H;
      _bc.sky=ctx.createLinearGradient(0,0,0,horizon);
      _bc.sky.addColorStop(0,T.sky); _bc.sky.addColorStop(1,T.skyLow);
      _bc.sea=ctx.createLinearGradient(0,horizon,0,H);
      _bc.sea.addColorStop(0,T.sea); _bc.sea.addColorStop(1,T.deep); }
    var sky=_bc.sky;
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,horizon);
    ctx.fillStyle=T.sun; ctx.globalAlpha=0.85; ctx.beginPath(); ctx.arc(W*0.5,horizon-26,22,0,TWO_PI); ctx.fill(); ctx.globalAlpha=1;
    var seaG=_bc.sea;

    var p=R.player, cx=W/2;
    function project(laneX, depth){
      var persp = 1-depth;
      var scale = 0.12 + persp*0.9;
      var sy = horizon + (H-horizon)*(1-depth*depth);
      var roadHalf = (W*0.08) + (W*0.42)*persp;
      var bend = curveAt(p.dist + depth*650, R.harbor.curve) * depth*depth * (W*1.25);
      var sx = cx + bend + laneX*roadHalf - (p.x*roadHalf*0.55);
      return { sx:sx, sy:sy, scale:scale };
    }
    var slices=24, i;
    for (i=0;i<slices;i++){
      var d0=i/slices, d1=(i+1)/slices;
      var aL=project(-1.18,d0), aR=project(1.18,d0), bL=project(-1.18,d1), bR=project(1.18,d1);
      ctx.fillStyle = i%2===0 ? "rgba(29,90,115,0.55)" : "rgba(20,58,82,0.55)";
      ctx.beginPath(); ctx.moveTo(aL.sx,aL.sy); ctx.lineTo(aR.sx,aR.sy); ctx.lineTo(bR.sx,bR.sy); ctx.lineTo(bL.sx,bL.sy); ctx.closePath(); ctx.fill();
    }
    function drawRail(laneX,color){
      ctx.strokeStyle=color; ctx.lineWidth=3; ctx.beginPath();
      for (var j=0;j<=slices;j++){ var pr=project(laneX,j/slices); j?ctx.lineTo(pr.sx,pr.sy):ctx.moveTo(pr.sx,pr.sy); }
      ctx.stroke();
    }
    drawRail(-1.18,"rgba(207,238,238,0.7)"); drawRail(1.18,"rgba(207,238,238,0.7)");
    ctx.strokeStyle="rgba(217,165,49,0.45)"; ctx.lineWidth=2;
    for (i=0;i<14;i++){ var phase=((i/14)+((p.dist*0.015)%(1/14)))%1; var a=project(0,phase), b2=project(0,Math.min(1,phase+0.025));
      ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b2.sx,b2.sy); ctx.stroke(); }
    for (i=0;i<10;i++){ var depth=((i/10)+((p.dist*0.02)%(1/10)))%1; var L=project(-1.18,depth), Rr=project(1.18,depth); var r=Math.max(1,4*L.scale);
      ctx.fillStyle=PAL.foam; ctx.globalAlpha=0.6;
      ctx.beginPath(); ctx.arc(L.sx,L.sy,r,0,TWO_PI); ctx.fill();
      ctx.beginPath(); ctx.arc(Rr.sx,Rr.sy,r,0,TWO_PI); ctx.fill(); ctx.globalAlpha=1; }

    for (i=0;i<R.buoys.length;i++){
      var bu=R.buoys[i]; var rel=bu.dist-p.dist;
      if (rel<-10||rel>700) continue;
      var dep=clamp(rel/700,0,1), pr=project(bu.x,dep), rr=Math.max(3,15*pr.scale);
      var inLane=Math.abs(bu.x-p.x)<0.30, near=rel>0&&rel<260;
      if (!bu.hit && inLane && near){ var pulse=0.4+0.4*Math.sin(R.t*10); ctx.strokeStyle="rgba(217,165,49,"+pulse.toFixed(2)+")"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(pr.sx,pr.sy-rr,rr*1.9,0,TWO_PI); ctx.stroke(); }
      ctx.fillStyle=bu.hit?"#3a3a3a":"#7a3a18"; ctx.fillRect(pr.sx-rr*0.18,pr.sy-rr*2.4,rr*0.36,rr*2.4);
      if (!bu.hit){ ctx.fillStyle="#e8e0cf"; ctx.beginPath(); ctx.moveTo(pr.sx+rr*0.18,pr.sy-rr*2.4); ctx.lineTo(pr.sx+rr*1.1,pr.sy-rr*2.05); ctx.lineTo(pr.sx+rr*0.18,pr.sy-rr*1.7); ctx.closePath(); ctx.fill(); }
      ctx.fillStyle=bu.hit?"#555":PAL.buoy; ctx.beginPath(); ctx.arc(pr.sx,pr.sy,rr,0,TWO_PI); ctx.fill();
      if (!bu.hit){ ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.beginPath(); ctx.arc(pr.sx-rr*0.3,pr.sy-rr*0.3,rr*0.35,0,TWO_PI); ctx.fill();
        ctx.strokeStyle="rgba(207,238,238,0.5)"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.ellipse(pr.sx,pr.sy+rr*0.7,rr*1.3,rr*0.4,0,0,TWO_PI); ctx.stroke(); }
    }

    var rs = R.rivals.slice().sort(function(a,c){ return (c.dist-p.dist)-(a.dist-p.dist); });
    for (i=0;i<rs.length;i++){ var rv=rs[i], rel2=rv.dist-p.dist; if (rel2<-40||rel2>720) continue;
      var dep2=clamp(rel2/720,0,1), pr2=project(rv.x,dep2); drawRivalBoat(ctx,pr2.sx,pr2.sy,Math.max(0.25,pr2.scale*0.9),rv.color); }

    drawBoatSprite(ctx, cx, H*0.84, 1.5, b.equipped, p.lean);
    ctx.fillStyle="rgba(207,238,238,0.5)"; ctx.beginPath(); ctx.ellipse(cx,H*0.84+26,30,8,0,0,TWO_PI); ctx.fill();

    if (p.bumpFlash>0){ var al=clamp(p.bumpFlash/0.18,0,1)*0.4; var vg=ctx.createRadialGradient(cx,H*0.7,H*0.2,cx,H*0.7,H*0.7);
      vg.addColorStop(0,"rgba(122,31,31,0)"); vg.addColorStop(1,"rgba(122,31,31,"+al+")"); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H); }

    drawRaceMinimap(ctx, W, H, R, p);

    // HUD
    if (R.phase==="racing"){
      txt(ctx, "PLACE "+p.livePlace+"/"+(R.RIVALS+1), 10, 22, PAL.gold, 13, "left");
      txt(ctx, "LAP "+p.lap+"/"+R.laps, W/2, 18, PAL.parchment, 13, "center");
      txt(ctx, (R.t - p.lastSplit).toFixed(2)+"s", W/2, 34, "rgba(232,224,207,0.85)", 12, "center");
      var last = p.splits[p.splits.length-1]||0;
      if (last) txt(ctx, "last "+last.toFixed(2)+"s", W/2, 48, PAL.foam, 11, "center");
      txt(ctx, Math.round(clamp(p.dist/R.total,0,1)*100)+"%", W-10, 22, PAL.parchment, 13, "right");
      var turn = curveAt(p.dist+420, R.harbor.curve);
      if (Math.abs(turn)>0.15){
        txt(ctx, turn>0?"BEND \u25B6\u25B6":"\u25C0\u25C0 BEND", W/2, H*0.28, PAL.gold, 30, "center");
      }
      drawSeaRaceControls(ctx, R.keys);
    }
    if (R.phase==="count" && R.count>0){
      txt(ctx, String(R.count), W/2, H/2+24, PAL.gold, 80, "center");
    }
    // exit
    txt(ctx, "\u2715", W-24, 22, PAL.parchment, 18, "center");
    hit(W-40, 4, 36, 30, function(){ b.screen="dock"; b.race=null; });
  }

  function drawRaceMinimap(ctx, W, H, R, p){
    if (!R.path) return;
    var box=Math.min(W*0.30,120), ox=W-box-10, oy=58, pts=R.path.pts;
    ctx.fillStyle="rgba(6,16,28,0.6)"; ctx.strokeStyle=PAL.goldDark; ctx.lineWidth=1.5;
    ctx.fillRect(ox,oy,box,box); ctx.strokeRect(ox,oy,box,box);
    var X=function(n){ return ox+n*box; }, Y=function(n){ return oy+n*box; };
    ctx.strokeStyle="rgba(207,238,238,0.55)"; ctx.lineWidth=2.5; ctx.beginPath();
    for (var i=0;i<pts.length;i++){ i?ctx.lineTo(X(pts[i].nx),Y(pts[i].ny)):ctx.moveTo(X(pts[i].nx),Y(pts[i].ny)); }
    ctx.stroke();
    ctx.fillStyle=PAL.gold; ctx.beginPath(); ctx.arc(X(pts[0].nx),Y(pts[0].ny),3,0,TWO_PI); ctx.fill();
    function dot(dist,color,r){ var frac=(((dist%R.lapLen)+R.lapLen)%R.lapLen)/R.lapLen; var idx=clamp(Math.round(frac*R.path.N),0,R.path.N); var pt=pts[idx];
      ctx.fillStyle=color; ctx.beginPath(); ctx.arc(X(pt.nx),Y(pt.ny),r,0,TWO_PI); ctx.fill(); }
    for (i=0;i<R.rivals.length;i++) dot(R.rivals[i].dist,R.rivals[i].color,2.5);
    dot(p.dist,PAL.gold,3.5);
    ctx.fillStyle=PAL.parchment; ctx.font="10px 'Courier New',monospace"; ctx.textAlign="center";
    ctx.fillText("LAP "+p.lap+"/"+R.laps, ox+box/2, oy+box-5); ctx.textAlign="left";
  }

  function drawResults(ctx){

  // ===================================================================

  function drawBoat(ctx, cw, ch){
    var b=global.boat; if(!b) return;

    if (typeof ch!=="number") ch=BH;

  // ===================================================================
  //  INPUT

  // discrete press: 'A' confirm (dock prompt), 'B' back/quit, arrows steer
  function boatPress(code){
    var b=global.boat; if(!b) return;
    if (b.screen==="sea"){
      if (code==="A" && b.sea && b.sea.nearDock){ b.course=b.sea.nearDock; b.screen="dock"; b.sea=null; return; }
      if (code==="B"){ leaveDock(); return; }
    } else if (b.screen==="race" && b.race){
      if (code==="B"){ b.screen="dock"; b.race=null; return; }
    } else if (b.screen==="results"){
      if (code==="A"||code==="B"){ b.result=null; b.screen="dock"; return; }
    } else if (b.screen==="shop"){
      if (code==="B"){ b.screen="dock"; return; }
    } else if (b.screen==="dock"){
      if (code==="B"){ leaveDock(); return; }
    }
  }

    if (!keys) return;
    if (dir==="LEFT") keys.left=on;
    else if (dir==="RIGHT") keys.right=on;
    else if (dir==="UP") keys.throttle=on;

    var vx=(px-b._xf.dx)/b._xf.scale, vy=(py-b._xf.dy)/b._xf.scale;
    for (var i=b.hits.length-1;i>=0;i--){
      var hb=b.hits[i];

// ── KLK ↔ race bridge ─────────────────────────────────────────────
function finishRace(result){
  race=null; place={kind:'overworld'};
  // restore the normal tile-resolution pixelated canvas + touch controls
  if(raceCanvasSave){ cv.width=raceCanvasSave.w; cv.height=raceCanvasSave.h;
    cv.style.width=raceCanvasSave.sw; cv.style.height=raceCanvasSave.sh;
    cv.style.imageRendering=raceCanvasSave.ir||'pixelated'; raceCanvasSave=null; }
  resize();
  if(result && result.finished){
    if(result.gold>0){ gold+=result.gold; }
    if(result.item){ player.raceBarding=true; }   // Seraph's Steed Barding (course-record reward)
    let msg='🏁 ';
    if(result.placed===1) msg+='Champion of the Tourney! ';
    else if(result.placed<=3) msg+='A fine ride. ';
    else msg+='You crossed the line. ';
    if(result.gold>0) msg+='+'+result.gold+' gold. ';
    if(result.item) msg+='✦ Won the '+result.item+'!';
    showBanner(msg.trim(), 2600);
  }
  updateMountBtn&&updateMountBtn();
  saveGame();
}

// ── KLK ↔ THE REGATTA (boat race) bridge ──────────────────────────
// Entry: while boating, face the regatta marker and press Ⓐ. Winnings/spend
// feed KLK's main gold; the boat-parts inventory persists on player.boatInv.
function openBoatRaceGate(){
  if(typeof openBoatRace!=='function'){ showBanner('⛵ The regatta is not ready yet.', 1500); return; }
  place={kind:'boatrace'};
  // the regatta has its own on-canvas controls — hide the d-pad/A/B so they don't overlap
  if(IS_TOUCH){ const c=document.getElementById('controls'); if(c) c.style.display='none';
    const j=document.getElementById('joy'); if(j) j.style.display='none';
    const m=document.getElementById('menuBtn'); if(m) m.style.display='none';
    const mb=document.getElementById('mountBtn'); if(mb) mb.style.display='none'; }
  // ── crisp rendering: the boat UI uses small text, so swap the low tile-resolution
  //    canvas for a full device-pixel-resolution, non-pixelated surface ──
  boatCanvasSave = { w:cv.width, h:cv.height, sw:cv.style.width, sh:cv.style.height, ir:cv.style.imageRendering };
  const dpr=Math.min(3, window.devicePixelRatio||1);
  const cssW=Math.round(parseFloat(cv.style.width)||cv.clientWidth||cv.width);
  const cssH=Math.round(parseFloat(cv.style.height)||cv.clientHeight||cv.height);
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
  cv.style.imageRendering='auto';
  openBoatRace({ gold:gold, inv:(player.boatInv||{}), onClose:finishBoatRace });
  showBanner('⛵ <b>The Regatta</b> — welcome to the harbor races!', 1800);
}
function finishBoatRace(payload){
  place={kind:'overworld'};
  // restore the normal tile-resolution canvas + pixelation

      if(nx2<0||ny2<0||nx2>=MAZE_W||ny2>=MAZE_H) return;

    if(g[y][x]!==0) continue;

    if(g[y][x]!==1) continue;
    const open=(g[y-1][x]===0&&g[y+1][x]===0&&g[y][x-1]===1&&g[y][x+1]===1)||
               (g[y][x-1]===0&&g[y][x+1]===0&&g[y-1][x]===1&&g[y+1][x]===1);

      if(nx2<0||ny2<0||nx2>=W||ny2>=H) return;

    if(g[y][x]!==0) continue;

    for(let k=deadEnds.length-1;k>=0;k--){ if(Math.abs(deadEnds[k][0]-x)+Math.abs(deadEnds[k][1]-y)<5) deadEnds.splice(k,1); }

// a per-hit cap (no single strike removes more than 18% of a boss's health).
// Returns the damage to apply, or -1 if the blow is turned aside.
function bossHitGate(d, dmg){
  if(!d.boss) return dmg;
  const now=performance.now();
  if(d.guardUntil && now<d.guardUntil) return -1;            // still awakening — blade glances off
  if(d.lastHitAt && now-d.lastHitAt<420) return -1;          // gate between landed hits
  d.lastHitAt=now;
  if(!d.enraged && d.hp-dmg < d.maxHp*0.35){ d.enraged=true; d.timer=Math.min(d.timer||99,5); }
  return Math.min(dmg, Math.ceil(d.maxHp*0.18));
}

    const raw=sioEl('sioText').value||'';
    const s=decodeSaveCode(raw);
    if(!s){ sioEl('sioMsg').style.color='#ff8a8a';
      sioEl('sioMsg').textContent = !/klk1/i.test(raw)
        ? '\u2717 No code found \u2014 paste the whole thing, starting with KLK1:'
        : ('\u2717 Code looks cut off ('+raw.length+' chars). Copy the ENTIRE code and retry.');
      return; }
    if(!s.player){ sioEl('sioMsg').style.color='#ff8a8a'; sioEl('sioMsg').textContent='\u2717 Decoded, but no hero data inside.'; return; }
    if(applySaveData(s)){ try{ localStorage.setItem(slotKey(activeSlot), JSON.stringify(buildSaveData())); }catch(e){}
      lastSaveJSON=JSON.stringify(buildSaveData());
      closeSaveIo(); if(menu.open) toggleMenu();
      showBanner('\ud83d\udcc2 Save Code loaded \u2014 welcome back, <b>'+(player.name||'Knight')+'</b>!', 2600);
    } else { sioEl('sioMsg').style.color='#ff8a8a'; sioEl('sioMsg').textContent='\u2717 Could not load that code.'; }
  };
  sioEl('sioClose').onclick=closeSaveIo;
  sioEl('saveio').classList.add('open');
}

// build a flat list of selectable rows for the current tab (for cursor navigation)
function menuRows(){
  if(menu.tab===1){ // skills: the Knight's tree (the companion's tree lives on the Pet tab)
    const rows=[]; for(const b in SKILL_TREE) for(const n of SKILL_TREE[b].nodes) rows.push({kind:'skill', id:n.id});
    return rows;
  }
  if(menu.tab===3){ // pet: equippable gear, then the companion's skill tree
    const rows=[];
    if(player.pet){
      for(const k in PET_GEAR) if(player.petGear&&player.petGear[k]) rows.push({kind:'petgear', id:k});
      for(const b in PET_TREE) for(const n of PET_TREE[b].nodes) rows.push({kind:'skill', id:n.id});
    }
    return rows; }
  if(menu.tab===2){ // items: consumables first, then gear (weapons, then armor)
    const use=[]; if(inventory.potion>0) use.push({kind:'use', id:'potion'}); if(inventory.bread>0) use.push({kind:'use', id:'bread'});
    const owned=Object.keys(EQUIP).filter(id=>player.ownedGear[id]);
    return [...use,
      ...owned.filter(id=>EQUIP[id].slot==='weapon').map(id=>({kind:'gear', id})),
      ...owned.filter(id=>EQUIP[id].slot==='armor').map(id=>({kind:'gear', id}))]; }
  if(menu.tab===7){ // home: placeable decorations
    return Object.keys(DECOR_ITEMS).filter(id=>(homesteadDecor.inv[id]||0)>0).map(id=>({kind:'decor', id}));
  }
  if(menu.tab===6){ // system: save profiles
    return [ {kind:'sys', id:'save'},
      {kind:'slot', n:1}, {kind:'slot', n:2}, {kind:'slot', n:3},
      {kind:'sys', id:'export'}, {kind:'sys', id:'import'},
      {kind:'sys', id:'erase'} ]; }
  return []; // character & pet tabs have no selectable rows
}

// sum all skill bonuses + apply to derived stats (called after level-up, skill buy, equip)
function recalcStats(){
  let atk=player.baseAtk, def=player.baseDef, maxHp=player.baseMaxHp, crit=player.baseCrit;
  let healMult=1, goldMult=1, dmgReduce=0, petBonus=0;
  // level scaling (ported: atk +3/level, def +1.5/level, maxHp +12/level)
  const lv=player.level-1;
  atk += lv*3; def += Math.floor(lv*3/2); maxHp += lv*12;
  // skills (Knight + Pet trees)
  for(const id in player.skills){ if(!player.skills[id]) continue; const n=skillNode(id); if(!n) continue;
    const b=n.bonus; if(b.atk)atk+=b.atk; if(b.def)def+=b.def; if(b.maxHp)maxHp+=b.maxHp; if(b.crit)crit+=b.crit;
    if(b.healMult)healMult+=b.healMult; if(b.goldMult)goldMult+=b.goldMult; if(b.dmgReduce)dmgReduce+=b.dmgReduce;
    if(b.petBonus)petBonus+=b.petBonus; }
  // equipment (added in inventory step)
  if(player.equip){ const w=EQUIP[player.equip.weapon], a=EQUIP[player.equip.armor];
    if(w){ atk+=w.atk||0; if(w.crit)crit+=w.crit; } if(a){ def+=a.def||0; if(a.maxHp)maxHp+=a.maxHp; } }
  // pet companion bonus (scales with its evolution form) + Bond-tree petBonus boost
  if(player.pet){ const f=PETS[player.pet.id].forms[player.pet.form]; const b=f.bonus||{};
    if(b.atk)atk+=b.atk; if(b.def)def+=b.def; if(b.maxHp)maxHp+=b.maxHp; if(b.crit)crit+=b.crit;
    if(b.healMult)healMult+=b.healMult; if(b.dmgReduce)dmgReduce+=b.dmgReduce;
    // petBonus from the Bond branch adds raw points distributed to the pet's main focus stat
    if(petBonus>0){ const focus=PETS[player.pet.id].focus;
      if(focus==='offense') atk+=petBonus; else if(focus==='defense'){ def+=petBonus; maxHp+=petBonus; } else maxHp+=petBonus*2; } }
  const hpRatio = player.maxHp>0 ? player.hp/player.maxHp : 1;
  player.atk=atk; player.def=def; player.crit=Math.min(0.75,crit); player.maxHp=maxHp;
  player.healMult=healMult; player.goldMult=goldMult; player.dmgReduce=Math.min(0.6,dmgReduce);
  player.hp=Math.min(player.maxHp, Math.round(player.maxHp*hpRatio));
}

function tourneyTick(dt){
  if(!tourney.active) return;
  // dt-true physics: f = 1.0 at 60fps. Frame-counted timers ran DOUBLE speed on
  // 120Hz phones and stuttered slow on dropped frames; all durations below are
  // still authored in 60fps-frames, now consumed at true wall-clock rate.
  const f=(dt||16.6667)/16.6667;
  tourney.t+=f;
  if(tourney.rest) return;
  const cw=ctx.canvas.width, chh=ctx.canvas.height;
  const spd=1.5*f; let mvx=0,mvy=0;
  if(tourney.held.UP)mvy-=1; if(tourney.held.DOWN)mvy+=1;
  if(tourney.held.LEFT)mvx-=1; if(tourney.held.RIGHT)mvx+=1;
  if(mvx||mvy){ const n=Math.hypot(mvx,mvy); tourney.px+=mvx/n*spd; tourney.py+=mvy/n*spd;
    tourney.pdir = Math.abs(mvx)>Math.abs(mvy) ? (mvx<0?'left':'right') : (mvy<0?'up':'down'); }
  tourney.px=Math.max(16,Math.min(cw-32,tourney.px));
  tourney.py=Math.max(28,Math.min(chh-24,tourney.py));
  if(tourney.swing>0)tourney.swing-=f;
  if(tourney.inv>0)tourney.inv-=f;
  tourney.foes.forEach(fo=>{
    if(!fo.alive) return;
    fo.t+=f; if(fo.hurt>0)fo.hurt-=f;
    if(fo.cd>0)fo.cd-=f;
    const vx=tourney.px-fo.x, vy=tourney.py-fo.y, dist=Math.hypot(vx,vy)||1;
    if(fo.kind==='rival'){
      fo.ai=(fo.ai+f)%160;
      if(fo.ai<100){ const tang=Math.atan2(vy,vx)+Math.PI/2;         // circle the knight
        fo.x+=(Math.cos(tang)*fo.spd*0.7 + vx/dist*0.25)*f; fo.y+=(Math.sin(tang)*fo.spd*0.7 + vy/dist*0.25)*f;
      } else { fo.x+=vx/dist*fo.spd*1.7*f; fo.y+=vy/dist*fo.spd*1.7*f; }  // lunge
      fo.dir=Math.abs(vx)>Math.abs(vy)?(vx<0?'left':'right'):(vy<0?'up':'down');
    } else { fo.x+=vx/dist*fo.spd*f; fo.y+=vy/dist*fo.spd*f; }
    fo.x=Math.max(16,Math.min(cw-32,fo.x)); fo.y=Math.max(28,Math.min(chh-24,fo.y));
    if(dist<13 && fo.cd<=0 && tourney.inv<=0){
      tourney.php-=fo.dmg; fo.cd=50; tourney.inv=40;
      if(tourney.php<=0){ exitTourney(false,false); return; }
    }
  });
  if(tourney.active && tourney.foes.every(f=>!f.alive)){
    if(tourney.mode==='waves' && tourney.round<3){ tourney.round++; tourneyWave();
      showBanner('Wave '+tourney.round+'!',1000); }
    else if(tourney.mode==='ladder' && tourney.round<TOURNEY_LADDER_ROUNDS){ tourney.rest=true; }
    else exitTourney(true,false);
  }
}
